          - "'<string>de.wersdoerfer.daybook.weeknotes-reconcile</string>' in reconcile_plist_text"
          - "'<string>/etc/daybook-sessions/reconcile-weeknotes.sh</string>' in reconcile_plist_text"
          - "'<string>/Users/jochen/projects/daybook</string>' in reconcile_plist_text"
          - "'<key>ProcessType</key>' in reconcile_plist_text"
          - "'<string>Background</string>' in reconcile_plist_text"
          - "'<key>RunAtLoad</key>' in reconcile_plist_text"
          - "'<false/>' in reconcile_plist_text"
