---
# Test playbook for daybook_sessions_deploy role templates
# Run with: ansible-playbook tests/test_daybook_sessions_deploy.yml -i tests/inventory/test.yml

- name: Test Daybook Sessions Deploy Role Components
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    role_path: "{{ playbook_dir }}/../roles/daybook_sessions_deploy"
    rendered_env: "/tmp/test-daybook-sessions.env"
    rendered_launcher: "/tmp/test-daybook-sessions-launcher.sh"
    rendered_plist: "/tmp/test-daybook-sessions.plist"
    rendered_user_plist: "/tmp/test-daybook-sessions-user.plist"
    rendered_archive_env: "/tmp/test-daybook-archive-quotes.env"
    rendered_archive_launcher: "/tmp/test-daybook-archive-quotes.sh"
    rendered_archive_plist: "/tmp/test-daybook-archive-quotes.plist"
    rendered_headed_archive_plist: "/tmp/test-daybook-archive-quotes-headed.plist"

  tasks:
    - name: Verify role files exist
      block:
        - name: Check defaults file
          ansible.builtin.stat:
            path: "{{ role_path }}/defaults/main.yml"
          register: defaults_file

        - name: Check tasks file
          ansible.builtin.stat:
            path: "{{ role_path }}/tasks/main.yml"
          register: tasks_file

        - name: Check environment template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/sessions.env.j2"
          register: env_template_file

        - name: Check launchd template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/sessions.launchd.plist.j2"
          register: launchd_template_file

        - name: Check launcher template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/ship-sessions.sh.j2"
          register: launcher_template_file

        - name: Check archive quote env template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/archive-quotes.env.j2"
          register: archive_quotes_env_template_file

        - name: Check archive quote launcher template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/classify-archive-quotes.sh.j2"
          register: archive_quotes_launcher_template_file

        - name: Check archive quote launchd template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/archive-quotes.launchd.plist.j2"
          register: archive_quotes_launchd_template_file

        - name: Assert required files exist
          ansible.builtin.assert:
            that:
              - defaults_file.stat.exists
              - tasks_file.stat.exists
              - env_template_file.stat.exists
              - launchd_template_file.stat.exists
              - launcher_template_file.stat.exists
              - archive_quotes_env_template_file.stat.exists
              - archive_quotes_launcher_template_file.stat.exists
              - archive_quotes_launchd_template_file.stat.exists

    - name: Load role defaults
      ansible.builtin.include_vars:
        file: "{{ role_path }}/defaults/main.yml"

    - name: Assert safe public defaults
      ansible.builtin.assert:
        that:
          - daybook_sessions_repo_url == "https://github.com/ephes/daybook.git"
          - daybook_sessions_repo_ref == "CHANGEME"
          - daybook_sessions_repo_update | bool
          - daybook_sessions_launchd_scope == "system"
          - daybook_sessions_path == "s3://agent-sessions"
          - daybook_sessions_schedule_interval_seconds == 1800
          - "'trufflehog' in daybook_sessions_brew_packages"
          - daybook_sessions_aws_access_key_id == "CHANGEME"
          - daybook_sessions_aws_secret_access_key == "CHANGEME"
          - not daybook_archive_quote_classifier_enabled | bool
          - daybook_archive_quote_classifier_state == "s3://agent-sessions/archive-quote-classifier.json"
          - daybook_archive_quote_classifier_probe_timeout_seconds == 120
          - daybook_archive_quote_classifier_throttle_interval_seconds == 60
          - daybook_quotes_unused_path == "CHANGEME"
          - daybook_quotes_used_path == "CHANGEME"
          - daybook_archive_browser_executable == "/Applications/Helium.app/Contents/MacOS/Helium"
          - daybook_archive_browser_user_data_dir == "/Users/CHANGEME/.daybook/archive-quote-browser"
          - daybook_archive_browser_headless | bool
          - daybook_archive_browser_launch_timeout_seconds == 30
          - daybook_archive_browser_navigation_timeout_seconds == 30
          - daybook_archive_browser_render_wait_seconds == 1
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Refuse an existing unmarked browser profile')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Validate classifier filesystem access as the service user')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Verify pinned Daybook commit exists locally for no-fetch mode')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Check out pinned Daybook commit without fetching')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search("'status', '--porcelain', '--untracked-files=no'")
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search("'ls-files', '--others', '--exclude-standard'")
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('daybook_sessions_repo_ref.*regex_search')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('os.path.realpath')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('modification_time.*preserve')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search("daybook_archive_browser_headless or daybook_sessions_launchd_scope == 'user'")

    - name: Set template test values
      ansible.builtin.set_fact:
        daybook_sessions_service_user: "jochen"
        daybook_sessions_service_group: "staff"
        daybook_sessions_service_home: "/Users/jochen"
        daybook_sessions_repo_ref: "main"
        daybook_sessions_checkout_path: "/Users/jochen/projects/daybook"
        daybook_sessions_env_file: "/etc/daybook-sessions/sessions.env"
        daybook_sessions_launcher_path: "/etc/daybook-sessions/ship-sessions.sh"
        daybook_sessions_state_path: "/Users/jochen/.daybook/sessions-shipped.json"
        daybook_sessions_uv_bin: "/usr/local/bin/uv"
        daybook_sessions_aws_endpoint_url_s3: "https://s3.home.example"
        daybook_sessions_aws_access_key_id: "session-key"
        daybook_sessions_aws_secret_access_key: "session-secret"
        daybook_sessions_redact_files:
          - "/Users/jochen/projects/daybook/.envrc"
          - "/Users/jochen/projects/ops-control/.envrc"

    - name: Render environment template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.env.j2"
        dest: "{{ rendered_env }}"

    - name: Render launcher template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/ship-sessions.sh.j2"
        dest: "{{ rendered_launcher }}"

    - name: Render launchd template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.launchd.plist.j2"
        dest: "{{ rendered_plist }}"

    - name: Read rendered files
      ansible.builtin.slurp:
        path: "{{ item }}"
      loop:
        - "{{ rendered_env }}"
        - "{{ rendered_launcher }}"
        - "{{ rendered_plist }}"
      register: rendered_files

    - name: Assert rendered Daybook sessions config
      ansible.builtin.assert:
        that:
          - "'DAYBOOK_SESSIONS_PATH=s3://agent-sessions' in rendered_env_text"
          - "'DAYBOOK_SESSIONS_STATE=/Users/jochen/.daybook/sessions-shipped.json' in rendered_env_text"
          - "'DAYBOOK_REDACT_FILES=/Users/jochen/projects/daybook/.envrc:/Users/jochen/projects/ops-control/.envrc' in rendered_env_text"
          - "'AWS_ENDPOINT_URL_S3=https://s3.home.example' in rendered_env_text"
          - "'AWS_ACCESS_KEY_ID=session-key' in rendered_env_text"
          - "'AWS_SECRET_ACCESS_KEY=session-secret' in rendered_env_text"
          - rendered_launcher_text is search('set -a')
          - rendered_launcher_text is search('/usr/local/bin/uv run --frozen --no-dev daybook sessions ship')
          - "'<string>de.wersdoerfer.daybook.sessions</string>' in rendered_plist_text"
          - "'<key>StartInterval</key>' in rendered_plist_text"
          - "'<integer>1800</integer>' in rendered_plist_text"
          - "'<string>/etc/daybook-sessions/ship-sessions.sh</string>' in rendered_plist_text"
          - "'<key>UserName</key>' in rendered_plist_text"
      vars:
        rendered_env_text: "{{ rendered_files.results[0].content | b64decode }}"
        rendered_launcher_text: "{{ rendered_files.results[1].content | b64decode }}"
        rendered_plist_text: "{{ rendered_files.results[2].content | b64decode }}"

    - name: Switch template values to user LaunchAgent mode
      ansible.builtin.set_fact:
        daybook_sessions_launchd_scope: "user"

    - name: Render user LaunchAgent template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.launchd.plist.j2"
        dest: "{{ rendered_user_plist }}"

    - name: Read rendered user LaunchAgent
      ansible.builtin.slurp:
        path: "{{ rendered_user_plist }}"
      register: rendered_user_plist_file

    - name: Assert rendered user LaunchAgent omits service account keys
      ansible.builtin.assert:
        that:
          - "'<key>UserName</key>' not in rendered_user_plist_text"
          - "'<key>GroupName</key>' not in rendered_user_plist_text"
          - "'<string>/etc/daybook-sessions/ship-sessions.sh</string>' in rendered_user_plist_text"
      vars:
        rendered_user_plist_text: "{{ rendered_user_plist_file.content | b64decode }}"

    - name: Enable archive quote classifier template values
      ansible.builtin.set_fact:
        daybook_sessions_launchd_scope: "system"
        daybook_archive_quote_classifier_enabled: true
        daybook_archive_url: "https://archive.home.example"
        daybook_archive_token: "archive-token"
        daybook_archive_quote_classifier_cmd: "pi -p --no-tools"
        daybook_archive_quote_classifier_env_file: "/etc/daybook-sessions/archive-quotes.env"
        daybook_archive_quote_classifier_launcher_path: "/etc/daybook-sessions/classify-archive-quotes.sh"
        daybook_archive_quote_classifier_stdout_log: "/var/log/daybook-sessions/archive-quotes.log"
        daybook_archive_quote_classifier_stderr_log: "/var/log/daybook-sessions/archive-quotes.err.log"
        daybook_quotes_unused_path: "/Users/jochen/vault/Quotes Unused.md"
        daybook_quotes_used_path: "/Users/jochen/vault/Quotes Used.md"
        daybook_archive_browser_executable: "/Applications/Helium.app/Contents/MacOS/Helium"
        daybook_archive_browser_user_data_dir: "/Users/jochen/.daybook/archive-quote-browser"
        daybook_archive_browser_headless: true
        daybook_archive_browser_launch_timeout_seconds: 35
        daybook_archive_browser_navigation_timeout_seconds: 45
        daybook_archive_browser_render_wait_seconds: 2

    - name: Render archive quote classifier environment template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/archive-quotes.env.j2"
        dest: "{{ rendered_archive_env }}"

    - name: Render sessions environment with archive quote redaction enabled
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.env.j2"
        dest: "{{ rendered_env }}"

    - name: Render archive quote classifier launcher template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/classify-archive-quotes.sh.j2"
        dest: "{{ rendered_archive_launcher }}"

    - name: Render archive quote classifier launchd template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/archive-quotes.launchd.plist.j2"
        dest: "{{ rendered_archive_plist }}"

    - name: Read rendered archive quote classifier files
      ansible.builtin.slurp:
        path: "{{ item }}"
      loop:
        - "{{ rendered_archive_env }}"
        - "{{ rendered_env }}"
        - "{{ rendered_archive_launcher }}"
        - "{{ rendered_archive_plist }}"
      register: rendered_archive_files

    - name: Assert rendered archive quote classifier config
      ansible.builtin.assert:
        that:
          - "'DAYBOOK_ARCHIVE_URL=https://archive.home.example' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_TOKEN=archive-token' in rendered_archive_env_text"
          - '"DAYBOOK_QUOTE_CLASSIFIER_CMD=''pi -p --no-tools''" in rendered_archive_env_text'
          - '"DAYBOOK_QUOTES_UNUSED_PATH=''/Users/jochen/vault/Quotes Unused.md''" in rendered_archive_env_text'
          - '"DAYBOOK_QUOTES_USED_PATH=''/Users/jochen/vault/Quotes Used.md''" in rendered_archive_env_text'
          - "'DAYBOOK_ARCHIVE_BROWSER_EXECUTABLE=/Applications/Helium.app/Contents/MacOS/Helium' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_USER_DATA_DIR=/Users/jochen/.daybook/archive-quote-browser' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_HEADLESS=true' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_LAUNCH_TIMEOUT_SECONDS=35' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_NAVIGATION_TIMEOUT_SECONDS=45' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_RENDER_WAIT_SECONDS=2' in rendered_archive_env_text"
          - "'/etc/daybook-sessions/archive-quotes.env' in rendered_sessions_env_text"
          - rendered_archive_launcher_text is search('/usr/local/bin/uv run --frozen --no-dev daybook archive classify-quotes')
          - rendered_archive_launcher_text is search('export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1')
          - rendered_archive_launcher_text is search('source /etc/daybook-sessions/archive-quotes.env')
          - "'<string>de.wersdoerfer.daybook.archive-quotes</string>' in rendered_archive_plist_text"
          - "'<string>/etc/daybook-sessions/classify-archive-quotes.sh</string>' in rendered_archive_plist_text"
          - "'<key>StartCalendarInterval</key>' in rendered_archive_plist_text"
          - "'<string>Background</string>' in rendered_archive_plist_text"
          - "'<key>LowPriorityIO</key>' in rendered_archive_plist_text"
          - "'<key>LimitLoadToSessionType</key>' not in rendered_archive_plist_text"
          - "'<key>ThrottleInterval</key>' in rendered_archive_plist_text"
          - "'<integer>60</integer>' in rendered_archive_plist_text"
          - "'<key>UserName</key>' in rendered_archive_plist_text"
          - "'<key>HOME</key>' in rendered_archive_plist_text"
          - "'<string>/Users/jochen</string>' in rendered_archive_plist_text"
          - "'<key>XDG_CONFIG_HOME</key>' in rendered_archive_plist_text"
      vars:
        rendered_archive_env_text: "{{ rendered_archive_files.results[0].content | b64decode }}"
        rendered_sessions_env_text: "{{ rendered_archive_files.results[1].content | b64decode }}"
        rendered_archive_launcher_text: "{{ rendered_archive_files.results[2].content | b64decode }}"
        rendered_archive_plist_text: "{{ rendered_archive_files.results[3].content | b64decode }}"

    - name: Switch Archive classifier to headed user LaunchAgent mode
      ansible.builtin.set_fact:
        daybook_sessions_launchd_scope: "user"
        daybook_archive_browser_headless: false

    - name: Render headed user Archive quote classifier launchd template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/archive-quotes.launchd.plist.j2"
        dest: "{{ rendered_headed_archive_plist }}"

    - name: Read headed user Archive quote classifier plist
      ansible.builtin.slurp:
        path: "{{ rendered_headed_archive_plist }}"
      register: rendered_headed_archive_plist_file

    - name: Assert headed browser job is restricted to the Aqua GUI session
      ansible.builtin.assert:
        that:
          - "'<key>LimitLoadToSessionType</key>' in rendered_headed_archive_plist_text"
          - "'<string>Aqua</string>' in rendered_headed_archive_plist_text"
          - "'<key>UserName</key>' not in rendered_headed_archive_plist_text"
      vars:
        rendered_headed_archive_plist_text: "{{ rendered_headed_archive_plist_file.content | b64decode }}"

    - name: Clean up rendered files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ rendered_env }}"
        - "{{ rendered_launcher }}"
        - "{{ rendered_plist }}"
        - "{{ rendered_user_plist }}"
        - "{{ rendered_archive_env }}"
        - "{{ rendered_archive_launcher }}"
        - "{{ rendered_archive_plist }}"
        - "{{ rendered_headed_archive_plist }}"
