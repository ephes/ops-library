        reconcile_launcher_text: "{{ rendered_reconcile_files.results[1].content | b64decode }}"
        reconcile_plist_text: "{{ rendered_reconcile_files.results[2].content | b64decode }}"

    - name: Clean up rendered files
      ansible.builtin.file:
