        - src: "{{ role_path }}/templates/weeknotes-reconcile.launchd.plist.j2"
          dest: "{{ rendered_reconcile_plist }}"

    - name: Re-render dedicated weeknotes reconcile files for idempotence
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - src: "{{ role_path }}/templates/weeknotes-reconcile.env.j2"
          dest: "{{ rendered_reconcile_env }}"
        - src: "{{ role_path }}/templates/reconcile-weeknotes.sh.j2"
          dest: "{{ rendered_reconcile_launcher }}"
        - src: "{{ role_path }}/templates/weeknotes-reconcile.launchd.plist.j2"
          dest: "{{ rendered_reconcile_plist }}"
      register: rendered_reconcile_second_application

    - name: Assert second static reconcile application is idempotent
      ansible.builtin.assert:
        that:
          - rendered_reconcile_second_application.results | selectattr('changed') | list | length == 0

    - name: Read dedicated weeknotes reconcile files
