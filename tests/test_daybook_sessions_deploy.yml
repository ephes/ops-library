---
# Test playbook for daybook_sessions_deploy role templates
# Run with: ansible-playbook tests/test_daybook_sessions_deploy.yml -i tests/inventory/test.yml

- name: Test Daybook Sessions Deploy Role Components
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    role_path: "{{ playbook_dir }}/../roles/daybook_sessions_deploy"
    rendered_env: "/tmp/test-daybook-sessions.env"
    rendered_launcher: "/tmp/test-daybook-sessions-launcher.sh"
    rendered_plist: "/tmp/test-daybook-sessions.plist"
    rendered_user_plist: "/tmp/test-daybook-sessions-user.plist"
    rendered_archive_env: "/tmp/test-daybook-archive-quotes.env"
    rendered_archive_launcher: "/tmp/test-daybook-archive-quotes.sh"
    rendered_archive_plist: "/tmp/test-daybook-archive-quotes.plist"
    rendered_headed_archive_plist: "/tmp/test-daybook-archive-quotes-headed.plist"
    rendered_reconcile_env: "/tmp/test-daybook-weeknotes-reconcile.env"
    rendered_reconcile_launcher: "/tmp/test-daybook-weeknotes-reconcile.sh"
    rendered_reconcile_plist: "/tmp/test-daybook-weeknotes-reconcile.plist"

  tasks:
    - name: Verify role files exist
      block:
        - name: Check defaults file
          ansible.builtin.stat:
            path: "{{ role_path }}/defaults/main.yml"
          register: defaults_file

        - name: Check tasks file
          ansible.builtin.stat:
            path: "{{ role_path }}/tasks/main.yml"
          register: tasks_file

        - name: Check environment template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/sessions.env.j2"
          register: env_template_file

        - name: Check launchd template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/sessions.launchd.plist.j2"
          register: launchd_template_file

        - name: Check launcher template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/ship-sessions.sh.j2"
          register: launcher_template_file

        - name: Check archive quote env template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/archive-quotes.env.j2"
          register: archive_quotes_env_template_file

        - name: Check archive quote launcher template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/classify-archive-quotes.sh.j2"
          register: archive_quotes_launcher_template_file

        - name: Check archive quote launchd template
          ansible.builtin.stat:
            path: "{{ role_path }}/templates/archive-quotes.launchd.plist.j2"
          register: archive_quotes_launchd_template_file

        - name: Check weeknotes reconcile task and templates
          ansible.builtin.stat:
            path: "{{ item }}"
          loop:
            - "{{ role_path }}/tasks/weeknotes_reconcile.yml"
            - "{{ role_path }}/tasks/weeknotes_reconcile_auth.yml"
            - "{{ role_path }}/tasks/weeknotes_reconcile_launchd_state.yml"
            - "{{ role_path }}/templates/weeknotes-reconcile.env.j2"
            - "{{ role_path }}/templates/reconcile-weeknotes.sh.j2"
            - "{{ role_path }}/templates/weeknotes-reconcile.launchd.plist.j2"
          register: weeknotes_reconcile_files

        - name: Assert required files exist
          ansible.builtin.assert:
            that:
              - defaults_file.stat.exists
              - tasks_file.stat.exists
              - env_template_file.stat.exists
              - launchd_template_file.stat.exists
              - launcher_template_file.stat.exists
              - archive_quotes_env_template_file.stat.exists
              - archive_quotes_launcher_template_file.stat.exists
              - archive_quotes_launchd_template_file.stat.exists
              - weeknotes_reconcile_files.results | map(attribute='stat.exists') | select('equalto', false) | length == 0

    - name: Load role defaults
      ansible.builtin.include_vars:
        file: "{{ role_path }}/defaults/main.yml"

    - name: Assert safe public defaults
      ansible.builtin.assert:
        that:
          - daybook_sessions_repo_url == "https://github.com/ephes/daybook.git"
          - daybook_sessions_repo_ref == "CHANGEME"
          - daybook_sessions_repo_update | bool
          - daybook_sessions_launchd_scope == "system"
          - daybook_sessions_path == "s3://agent-sessions"
          - daybook_sessions_schedule_interval_seconds == 1800
          - "'trufflehog' in daybook_sessions_brew_packages"
          - daybook_sessions_aws_access_key_id == "CHANGEME"
          - daybook_sessions_aws_secret_access_key == "CHANGEME"
          - not daybook_archive_quote_classifier_enabled | bool
          - daybook_archive_quote_classifier_state == "s3://agent-sessions/archive-quote-classifier.json"
          - daybook_archive_quote_classifier_probe_timeout_seconds == 120
          - daybook_archive_quote_classifier_throttle_interval_seconds == 60
          - not daybook_quotes_enabled | bool
          - daybook_quotes_unused_path == "CHANGEME"
          - daybook_quotes_used_path == "CHANGEME"
          - daybook_quote_lifecycle_state == "s3://agent-sessions/weeknotes-quote-lifecycle.json"
          - daybook_archive_browser_executable == "/Applications/Helium.app/Contents/MacOS/Helium"
          - daybook_archive_browser_user_data_dir == "/Users/CHANGEME/.daybook/archive-quote-browser"
          - daybook_archive_browser_headless | bool
          - daybook_archive_browser_launch_timeout_seconds == 30
          - daybook_archive_browser_navigation_timeout_seconds == 30
          - daybook_archive_browser_render_wait_seconds == 1
          - not daybook_weeknotes_reconcile_enabled | bool
          - not daybook_weeknotes_reconcile_launchd_enabled | bool
          - daybook_weeknotes_reconcile_launchd_label == 'de.wersdoerfer.daybook.weeknotes-reconcile'
          - >-
            daybook_weeknotes_reconcile_start_calendar
            == [{'Hour': 7, 'Minute': 40}, {'Hour': 19, 'Minute': 40}]
          - daybook_weeknotes_reconcile_public_timeout_seconds == 1200
          - daybook_weeknotes_reconcile_family_timeout_seconds == 1200
          - not daybook_weeknotes_reconcile_pi_auth_rotate | bool
          - daybook_weeknotes_reconcile_pi_auth_source == '/Users/CHANGEME/.config/daybook-weeknotes-reconcile/auth.json'
          - daybook_weeknotes_reconcile_runtime_dir == '/Users/CHANGEME/.daybook/weeknotes-reconcile'
          - daybook_weeknotes_reconcile_state_path == '/Users/CHANGEME/.daybook/weeknotes-reconcile/state.json'
          - daybook_weeknotes_cast_token == 'CHANGEME'
          - daybook_weeknotes_home_token == 'CHANGEME'
          - daybook_weeknotes_public_blog_id == 'CHANGEME'
          - daybook_weeknotes_family_blog_id == 'CHANGEME'
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Refuse an existing unmarked browser profile')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Validate classifier browser filesystem access as the service user')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('one local or S3 backend')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('daybook_quote_lifecycle_state != daybook_quotes_unused_path')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('daybook_quote_lifecycle_state != daybook_quotes_used_path')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is not search('daybook_quotes_unused_path [|] dirname')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is not search('path:.*daybook_quotes_unused_path')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is not search('path:.*daybook_quote_lifecycle_state')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Verify pinned Daybook commit exists locally for no-fetch mode')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('Check out pinned Daybook commit without fetching')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search("'status', '--porcelain', '--untracked-files=no'")
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search("'ls-files', '--others', '--exclude-standard'")
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('daybook_sessions_repo_ref.*regex_search')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('os.path.realpath')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search('modification_time.*preserve')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/main.yml') is search("daybook_archive_browser_headless or daybook_sessions_launchd_scope == 'user'")
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('distinct positive audience')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('mode.*0700')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('mode.*0600')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile_auth.yml') is search('remote_src.*true')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile_auth.yml') is search('no_log.*true')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile_auth.yml') is search('force.*daybook_weeknotes_reconcile_pi_auth_rotate')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('Refuse auth rotation while reconcile unit is loaded')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('Persist disabled-by-default launchd state')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('Interpret persistent launchd disabled state')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('daybook_weeknotes_reconcile_launchd_final_is_disabled')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('not ansible_check_mode')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is search('check_mode.*false')
          - lookup('ansible.builtin.file', role_path ~ '/tasks/weeknotes_reconcile.yml') is not search('\n\\s+- kickstart')

    - name: Exercise legacy and current launchctl disabled-state parsing
      ansible.builtin.include_tasks: tasks/test_daybook_launchctl_disabled_case.yml
      loop:
        - name: initial legacy boolean disabled
          fact: daybook_weeknotes_reconcile_launchd_is_disabled
          output: 'disabled services = { "de.wersdoerfer.daybook.weeknotes-reconcile" => true }'
          expected: true
        - name: initial word-form disabled
          fact: daybook_weeknotes_reconcile_launchd_is_disabled
          output: 'disabled services = { "de.wersdoerfer.daybook.weeknotes-reconcile" => disabled }'
          expected: true
        - name: initial explicit enabled
          fact: daybook_weeknotes_reconcile_launchd_is_disabled
          output: 'disabled services = { "de.wersdoerfer.daybook.weeknotes-reconcile" => enabled }'
          expected: false
        - name: initial missing marker
          fact: daybook_weeknotes_reconcile_launchd_is_disabled
          output: 'disabled services = { }'
          expected: false
        - name: final legacy boolean disabled
          fact: daybook_weeknotes_reconcile_launchd_final_is_disabled
          output: 'disabled services = { "de.wersdoerfer.daybook.weeknotes-reconcile" => true }'
          expected: true
        - name: final word-form disabled
          fact: daybook_weeknotes_reconcile_launchd_final_is_disabled
          output: 'disabled services = { "de.wersdoerfer.daybook.weeknotes-reconcile" => disabled }'
          expected: true
        - name: final explicit enabled
          fact: daybook_weeknotes_reconcile_launchd_final_is_disabled
          output: 'disabled services = { "de.wersdoerfer.daybook.weeknotes-reconcile" => enabled }'
          expected: false
        - name: final missing marker
          fact: daybook_weeknotes_reconcile_launchd_final_is_disabled
          output: 'disabled services = { }'
          expected: false
      loop_control:
        label: "{{ item.name }}"

    - name: Exercise missing dedicated reconcile variable validation
      block:
        - name: Run dedicated reconcile tasks with safe placeholder defaults in check mode
          ansible.builtin.include_tasks:
            file: "{{ role_path }}/tasks/weeknotes_reconcile.yml"
            apply:
              check_mode: true

        - name: Fail if dedicated reconcile placeholders passed validation
          ansible.builtin.fail:
            msg: "Dedicated reconcile CHANGEME defaults must fail closed."
      rescue:
        - name: Assert dedicated reconcile stopped at validation
          ansible.builtin.assert:
            that:
              - ansible_failed_task.name is search('Validate dedicated draft-only worker configuration')

    - name: Exercise valid dedicated reconcile variables without touching runtime
      block:
        - name: Run dedicated reconcile tasks until missing auth source guard
          ansible.builtin.include_tasks: "{{ role_path }}/tasks/weeknotes_reconcile.yml"
          vars:
            daybook_sessions_launchd_scope: system
            daybook_sessions_service_user: test-runner
            daybook_sessions_service_group: staff
            daybook_sessions_service_home: /Users/test-runner
            daybook_weeknotes_reconcile_pi_auth_source_root: /Users/test-runner/.config/daybook-weeknotes-reconcile
            daybook_weeknotes_reconcile_pi_auth_source: /Users/test-runner/.config/daybook-weeknotes-reconcile/auth.json
            daybook_weeknotes_reconcile_runtime_dir: /Users/test-runner/.daybook/weeknotes-reconcile
            daybook_weeknotes_reconcile_state_path: /Users/test-runner/.daybook/weeknotes-reconcile/state.json
            daybook_weeknotes_reconcile_pi_agent_dir: /Users/test-runner/.daybook/weeknotes-reconcile/pi-agent
            daybook_weeknotes_path: s3://weeknotes-test
            daybook_archive_url: https://archive.test.example/
            daybook_weeknotes_cast_base_url: https://cast.test.example/blogs/
            daybook_weeknotes_cast_token: test-cast-token
            daybook_weeknotes_home_url: https://weeknotes.test.example/
            daybook_weeknotes_home_token: test-home-token
            daybook_weeknotes_public_blog_id: "4"
            daybook_weeknotes_family_blog_id: "9"
            daybook_quotes_unused_path: s3://quotes-test/unused.md
            daybook_quotes_used_path: s3://quotes-test/used.md
            daybook_quote_lifecycle_state: s3://quotes-test/state.json

        - name: Fail if missing auth source guard did not stop the test
          ansible.builtin.fail:
            msg: "The missing dedicated auth source must fail before filesystem mutation."
      rescue:
        - name: Assert valid variables reached the auth metadata guard
          ansible.builtin.assert:
            that:
              - ansible_failed_task.name is search('Validate resolved auth and runtime containment')

    - name: Assert quote lifecycle location safety rules
      ansible.builtin.assert:
        that:
          - (canonical_quote_uri | regex_search(safe_markdown_location_pattern)) is not none
          - (canonical_state_uri | regex_search(safe_state_location_pattern)) is not none
          - (canonical_local_quote | regex_search(safe_markdown_location_pattern)) is not none
          - (canonical_local_state | regex_search(safe_state_location_pattern)) is not none
          - (unsafe_quote_uri_query | regex_search(safe_markdown_location_pattern)) is none
          - (unsafe_quote_uri_parent | regex_search(safe_markdown_location_pattern)) is not none
          - (unsafe_quote_uri_parent | regex_search('/[.][.]?/')) is not none
          - (unsafe_state_markdown | regex_search(safe_state_location_pattern)) is none
          - (unsafe_quote_json | regex_search(safe_markdown_location_pattern)) is none
          - canonical_quote_uri.startswith('s3://')
          - canonical_used_uri.startswith('s3://')
          - canonical_state_uri.startswith('s3://')
          - canonical_local_quote.startswith('/')
          - canonical_local_used.startswith('/')
          - canonical_local_state.startswith('/')
          - not canonical_local_quote.startswith('s3://')
          - canonical_state_uri != canonical_quote_uri
          - canonical_state_uri != canonical_used_uri
      vars:
        safe_markdown_location_pattern: '^(?:s3://[a-z0-9](?:[a-z0-9.-]{1,61}[a-z0-9])?)?/[A-Za-z0-9_ .-]+(?:/[A-Za-z0-9_ .-]+)*[.]md$'
        safe_state_location_pattern: '^(?:s3://[a-z0-9](?:[a-z0-9.-]{1,61}[a-z0-9])?)?/[A-Za-z0-9_ .-]+(?:/[A-Za-z0-9_ .-]+)*[.]json$'
        canonical_quote_uri: 's3://obsidian/Arbeit/Quotes Ungenutzt.md'
        canonical_used_uri: 's3://obsidian/Arbeit/Quotes Benutzt.md'
        canonical_state_uri: 's3://agent-sessions/weeknotes-quote-lifecycle.json'
        canonical_local_quote: '/Users/example/Quotes Ungenutzt.md'
        canonical_local_used: '/Users/example/Quotes Benutzt.md'
        canonical_local_state: '/Users/example/.daybook/weeknotes-quote-lifecycle.json'
        unsafe_quote_uri_query: 's3://obsidian/Arbeit/Quotes.md?typo=1'
        unsafe_quote_uri_parent: 's3://obsidian/Arbeit/../Quotes.md'
        unsafe_state_markdown: 's3://agent-sessions/weeknotes-quote-lifecycle.md'
        unsafe_quote_json: '/Users/example/quote.json'

    - name: Exercise role quote lifecycle validation cases
      ansible.builtin.include_tasks: tasks/test_daybook_quote_validation_case.yml
      loop:
        - name: compatible S3 backend
          unused: 's3://obsidian/Arbeit/Quotes Ungenutzt.md'
          used: 's3://obsidian/Arbeit/Quotes Benutzt.md'
          state: 's3://agent-sessions/weeknotes-quote-lifecycle.json'
          expected_failure: 'runtime | Ensure uv is available'
        - name: compatible local backend
          unused: '/Users/example/Quotes Ungenutzt.md'
          used: '/Users/example/Quotes Benutzt.md'
          state: '/Users/example/.daybook/weeknotes-quote-lifecycle.json'
          expected_failure: 'runtime | Ensure uv is available'
        - name: mixed local and S3 backends
          unused: '/Users/example/Quotes Ungenutzt.md'
          used: '/Users/example/Quotes Benutzt.md'
          state: 's3://agent-sessions/weeknotes-quote-lifecycle.json'
          expected_failure: 'validate | Ensure required Daybook sessions variables are configured'
        - name: missing lifecycle state
          unused: 's3://obsidian/Arbeit/Quotes Ungenutzt.md'
          used: 's3://obsidian/Arbeit/Quotes Benutzt.md'
          state: ''
          expected_failure: 'validate | Ensure required Daybook sessions variables are configured'
        - name: lifecycle state collision with unused Markdown
          unused: 's3://obsidian/Arbeit/Quotes Ungenutzt.md'
          used: 's3://obsidian/Arbeit/Quotes Benutzt.md'
          state: 's3://obsidian/Arbeit/Quotes Ungenutzt.md'
          expected_failure: 'validate | Ensure required Daybook sessions variables are configured'
      loop_control:
        loop_var: daybook_quote_validation_case
        label: "{{ daybook_quote_validation_case.name }}"

    - name: Set template test values
      ansible.builtin.set_fact:
        daybook_sessions_service_user: "jochen"
        daybook_sessions_service_group: "staff"
        daybook_sessions_service_home: "/Users/jochen"
        daybook_sessions_repo_ref: "main"
        daybook_sessions_checkout_path: "/Users/jochen/projects/daybook"
        daybook_sessions_env_file: "/etc/daybook-sessions/sessions.env"
        daybook_sessions_launcher_path: "/etc/daybook-sessions/ship-sessions.sh"
        daybook_sessions_state_path: "/Users/jochen/.daybook/sessions-shipped.json"
        daybook_sessions_uv_bin: "/usr/local/bin/uv"
        daybook_sessions_aws_endpoint_url_s3: "https://s3.home.example"
        daybook_sessions_aws_access_key_id: "session-key"
        daybook_sessions_aws_secret_access_key: "session-secret"
        daybook_sessions_redact_files:
          - "/Users/jochen/projects/daybook/.envrc"
          - "/Users/jochen/projects/ops-control/.envrc"

    - name: Render environment template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.env.j2"
        dest: "{{ rendered_env }}"

    - name: Render launcher template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/ship-sessions.sh.j2"
        dest: "{{ rendered_launcher }}"

    - name: Render launchd template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.launchd.plist.j2"
        dest: "{{ rendered_plist }}"

    - name: Read rendered files
      ansible.builtin.slurp:
        path: "{{ item }}"
      loop:
        - "{{ rendered_env }}"
        - "{{ rendered_launcher }}"
        - "{{ rendered_plist }}"
      register: rendered_files

    - name: Assert rendered Daybook sessions config
      ansible.builtin.assert:
        that:
          - "'DAYBOOK_SESSIONS_PATH=s3://agent-sessions' in rendered_env_text"
          - "'DAYBOOK_SESSIONS_STATE=/Users/jochen/.daybook/sessions-shipped.json' in rendered_env_text"
          - "'DAYBOOK_REDACT_FILES=/Users/jochen/projects/daybook/.envrc:/Users/jochen/projects/ops-control/.envrc' in rendered_env_text"
          - "'AWS_ENDPOINT_URL_S3=https://s3.home.example' in rendered_env_text"
          - "'AWS_ACCESS_KEY_ID=session-key' in rendered_env_text"
          - "'AWS_SECRET_ACCESS_KEY=session-secret' in rendered_env_text"
          - "'DAYBOOK_QUOTES_UNUSED_PATH=' not in rendered_env_text"
          - "'DAYBOOK_QUOTES_USED_PATH=' not in rendered_env_text"
          - "'DAYBOOK_QUOTE_LIFECYCLE_STATE=' not in rendered_env_text"
          - rendered_launcher_text is search('set -a')
          - rendered_launcher_text is search('/usr/local/bin/uv run --frozen --no-dev daybook sessions ship')
          - "'<string>de.wersdoerfer.daybook.sessions</string>' in rendered_plist_text"
          - "'<key>StartInterval</key>' in rendered_plist_text"
          - "'<integer>1800</integer>' in rendered_plist_text"
          - "'<string>/etc/daybook-sessions/ship-sessions.sh</string>' in rendered_plist_text"
          - "'<key>UserName</key>' in rendered_plist_text"
      vars:
        rendered_env_text: "{{ rendered_files.results[0].content | b64decode }}"
        rendered_launcher_text: "{{ rendered_files.results[1].content | b64decode }}"
        rendered_plist_text: "{{ rendered_files.results[2].content | b64decode }}"

    - name: Switch template values to user LaunchAgent mode
      ansible.builtin.set_fact:
        daybook_sessions_launchd_scope: "user"

    - name: Render user LaunchAgent template
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.launchd.plist.j2"
        dest: "{{ rendered_user_plist }}"

    - name: Read rendered user LaunchAgent
      ansible.builtin.slurp:
        path: "{{ rendered_user_plist }}"
      register: rendered_user_plist_file

    - name: Assert rendered user LaunchAgent omits service account keys
      ansible.builtin.assert:
        that:
          - "'<key>UserName</key>' not in rendered_user_plist_text"
          - "'<key>GroupName</key>' not in rendered_user_plist_text"
          - "'<string>/etc/daybook-sessions/ship-sessions.sh</string>' in rendered_user_plist_text"
      vars:
        rendered_user_plist_text: "{{ rendered_user_plist_file.content | b64decode }}"

    - name: Enable quote lifecycle without the classifier
      ansible.builtin.set_fact:
        daybook_quotes_enabled: true
        daybook_quotes_unused_path: "s3://obsidian/Arbeit/Quotes Ungenutzt.md"
        daybook_quotes_used_path: "s3://obsidian/Arbeit/Quotes Benutzt.md"

    - name: Render sessions environment for handoff-only quote lifecycle
      ansible.builtin.template:
        src: "{{ role_path }}/templates/sessions.env.j2"
        dest: "{{ rendered_env }}"

    - name: Read handoff-only sessions environment
      ansible.builtin.slurp:
        path: "{{ rendered_env }}"
      register: rendered_handoff_only_env

    - name: Assert handoff-only sessions environment contains canonical quotes
      ansible.builtin.assert:
        that:
          - '"DAYBOOK_QUOTES_UNUSED_PATH=''s3://obsidian/Arbeit/Quotes Ungenutzt.md''" in rendered_handoff_only_env_text'
          - '"DAYBOOK_QUOTES_USED_PATH=''s3://obsidian/Arbeit/Quotes Benutzt.md''" in rendered_handoff_only_env_text'
          - "'DAYBOOK_QUOTE_LIFECYCLE_STATE=s3://agent-sessions/weeknotes-quote-lifecycle.json' in rendered_handoff_only_env_text"
      vars:
