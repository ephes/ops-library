          - "'DAYBOOK_PI_PUBLIC_TIMEOUT_SECONDS=1200' in reconcile_env_text"
          - "'DAYBOOK_PI_FAMILY_TIMEOUT_SECONDS=1200' in reconcile_env_text"
          - "'DAYBOOK_WEEKNOTES_RECONCILE_STATE=/Users/jochen/.daybook/weeknotes-reconcile/state.json' in reconcile_env_text"
