        daybook_weeknotes_family_blog_id: "9"

    - name: Render dedicated weeknotes reconcile files
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - src: "{{ role_path }}/templates/weeknotes-reconcile.env.j2"
          dest: "{{ rendered_reconcile_env }}"
        - src: "{{ role_path }}/templates/reconcile-weeknotes.sh.j2"
