    - name: Assert rendered archive quote classifier config
      ansible.builtin.assert:
        that:
          - "'DAYBOOK_ARCHIVE_URL=https://archive.home.example' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_TOKEN=archive-token' in rendered_archive_env_text"
          - '"DAYBOOK_QUOTE_CLASSIFIER_CMD=''pi -p --no-tools''" in rendered_archive_env_text'
          - '"DAYBOOK_QUOTES_UNUSED_PATH=''s3://obsidian/Arbeit/Quotes Ungenutzt.md''" in rendered_archive_env_text'
          - '"DAYBOOK_QUOTES_USED_PATH=''s3://obsidian/Arbeit/Quotes Benutzt.md''" in rendered_archive_env_text'
          - "'DAYBOOK_QUOTE_LIFECYCLE_STATE=s3://agent-sessions/weeknotes-quote-lifecycle.json' in rendered_archive_env_text"
          - "'DAYBOOK_QUOTE_CLASSIFIER_STATE=s3://agent-sessions/archive-quote-classifier.json' in rendered_archive_env_text"
          - '"DAYBOOK_QUOTES_UNUSED_PATH=''s3://obsidian/Arbeit/Quotes Ungenutzt.md''" in rendered_sessions_env_text'
          - '"DAYBOOK_QUOTES_USED_PATH=''s3://obsidian/Arbeit/Quotes Benutzt.md''" in rendered_sessions_env_text'
          - "'DAYBOOK_QUOTE_LIFECYCLE_STATE=s3://agent-sessions/weeknotes-quote-lifecycle.json' in rendered_sessions_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_EXECUTABLE=/Applications/Helium.app/Contents/MacOS/Helium' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_USER_DATA_DIR=/Users/jochen/.daybook/archive-quote-browser' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_HEADLESS=true' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_LAUNCH_TIMEOUT_SECONDS=35' in rendered_archive_env_text"
          - "'DAYBOOK_ARCHIVE_BROWSER_NAVIGATION_TIMEOUT_SECONDS=45' in rendered_archive_env_text"
