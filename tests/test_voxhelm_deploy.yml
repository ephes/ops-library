---
# Test playbook for voxhelm_deploy role templates
# Run with: ansible-playbook tests/test_voxhelm_deploy.yml -i tests/inventory/test.yml

- name: Test Voxhelm Deploy Role Templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    role_path: "{{ playbook_dir }}/../roles/voxhelm_deploy"
    rendered_env: "/tmp/test-voxhelm.env"
    rendered_start: "/tmp/test-voxhelm-start.sh"
    rendered_worker: "/tmp/test-voxhelm-worker.sh"
    rendered_wyoming: "/tmp/test-voxhelm-wyoming.sh"

  tasks:
    - name: Load role defaults
      ansible.builtin.include_vars:
        file: "{{ role_path }}/defaults/main.yml"

    - name: Assert sync excludes protect runtime state
      ansible.builtin.assert:
        that:
          - "'db.sqlite3' in voxhelm_sync_excludes"
          - "'var' in voxhelm_sync_excludes"
          - "voxhelm_python_version == '3.14.5'"

    - name: Resolve uv sync args without diarization
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uv_sync_args.yml"
      vars:
        voxhelm_diarization_backend: "none"

    - name: Assert uv sync args omit diarization extra when backend is disabled
      ansible.builtin.assert:
        that:
          - voxhelm_uv_extras_resolved == []
          - voxhelm_uv_extra_args_resolved == []
          - voxhelm_uv_sync_args == ['sync', '--frozen', '--no-dev']

    - name: Resolve uv sync args with pyannote diarization
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uv_sync_args.yml"
      vars:
        voxhelm_diarization_backend: "pyannote"

    - name: Assert uv sync args include diarization extra for pyannote
      ansible.builtin.assert:
        that:
          - voxhelm_uv_extras_resolved == ['diarization']
          - voxhelm_uv_extra_args_resolved == ['--extra', 'diarization']
          - voxhelm_uv_sync_args == ['sync', '--frozen', '--no-dev', '--extra', 'diarization']

    - name: Set template test values
      ansible.builtin.set_fact:
        voxhelm_django_secret_key: "test-secret"
        voxhelm_bearer_tokens_env: "archive=test-token"
        voxhelm_diarization_backend: "pyannote"
        voxhelm_pyannote_model: "pyannote/speaker-diarization-3.1"
        voxhelm_huggingface_token: "hf_test"
        voxhelm_artifact_backend: "filesystem"

    - name: Render environment template with test values
      ansible.builtin.template:
        src: "{{ role_path }}/templates/voxhelm.env.j2"
        dest: "{{ rendered_env }}"

    - name: Render API start script
      ansible.builtin.template:
        src: "{{ role_path }}/templates/start.sh.j2"
        dest: "{{ rendered_start }}"

    - name: Render worker start script
      ansible.builtin.template:
        src: "{{ role_path }}/templates/worker.sh.j2"
        dest: "{{ rendered_worker }}"

    - name: Render Wyoming STT start script
      ansible.builtin.template:
        src: "{{ role_path }}/templates/wyoming-stt.sh.j2"
        dest: "{{ rendered_wyoming }}"

    - name: Read rendered files
      ansible.builtin.slurp:
        path: "{{ item }}"
      loop:
        - "{{ rendered_env }}"
        - "{{ rendered_start }}"
        - "{{ rendered_worker }}"
        - "{{ rendered_wyoming }}"
      register: rendered_files

    - name: Assert rendered files include M2 Wyoming wiring
      ansible.builtin.assert:
        that:
          - "'DJANGO_SETTINGS_MODULE=' in rendered_env_text"
          - "'VOXHELM_STT_BACKEND=' in rendered_env_text"
          - "'VOXHELM_STT_FALLBACK_BACKEND=' in rendered_env_text"
          - "'VOXHELM_WHISPERCPP_MODEL=' in rendered_env_text"
          - "'VOXHELM_STT_DEBUG_LOGGING=' in rendered_env_text"
          - "'VOXHELM_DIARIZATION_BACKEND=pyannote' in rendered_env_text"
          - "'VOXHELM_PYANNOTE_MODEL=pyannote/speaker-diarization-3.1' in rendered_env_text"
          - "'VOXHELM_PYANNOTE_DEVICE=auto' in rendered_env_text"
          - "'VOXHELM_HUGGINGFACE_TOKEN=hf_test' in rendered_env_text"
          - "'HF_TOKEN=hf_test' in rendered_env_text"
          - "'VOXHELM_WYOMING_STT_PORT=' in rendered_env_text"
          - "'VOXHELM_WYOMING_STT_LANGUAGES=' in rendered_env_text"
          - "'VOXHELM_WYOMING_STT_PROMPT=' in rendered_env_text"
          - "'VOXHELM_WYOMING_STT_NORMALIZE_TRANSCRIPT=' in rendered_env_text"
          - "'VOXHELM_LANE_SCHEDULER_ENABLED=' in rendered_env_text"
          - "'VOXHELM_LANE_SCHEDULER_DIR=' in rendered_env_text"
          - "'VOXHELM_LANE_SCHEDULER_STALE_SECONDS=' in rendered_env_text"
          - "'VOXHELM_TASKS_BACKEND=' in rendered_env_text"
          - "'VOXHELM_TRANSCRIPTION_EXECUTION_MODE=' in rendered_env_text"
          - "'VOXHELM_WORKER_TOKENS=' in rendered_env_text"
          - "'VOXHELM_REMOTE_WORKER_LEASE_SECONDS=' in rendered_env_text"
          - "'VOXHELM_REMOTE_WORKER_POLL_SECONDS=' in rendered_env_text"
          - "'VOXHELM_REMOTE_WORKER_MAX_ATTEMPTS=' in rendered_env_text"
          - "'VOXHELM_ARTIFACT_BACKEND=' in rendered_env_text"
          - "'config.asgi:application' in rendered_start_text"
          - "'manage.py db_worker' in rendered_worker_text"
          - "'--queue-name' in rendered_worker_text"
          - "'voxhelm-wyoming-stt' in rendered_wyoming_text"
      vars:
        rendered_env_text: "{{ rendered_files.results[0].content | b64decode }}"
        rendered_start_text: "{{ rendered_files.results[1].content | b64decode }}"
        rendered_worker_text: "{{ rendered_files.results[2].content | b64decode }}"
        rendered_wyoming_text: "{{ rendered_files.results[3].content | b64decode }}"

    - name: Validate remote_pull mode rejects missing worker token
      block:
        - name: Include validate tasks with incomplete remote_pull config
          ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate.yml"
          vars:
            ansible_facts:
              os_family: Darwin
            voxhelm_source_path: "/tmp/voxhelm"
            voxhelm_django_secret_key: "test-secret"
            voxhelm_bearer_tokens_env: "archive=test-token"
            voxhelm_bootstrap_operator_username: "operator"
            voxhelm_bootstrap_operator_password: "operator-password"
            voxhelm_app_port: 8787
            voxhelm_uv_bin: "/usr/local/bin/uv"
            voxhelm_tts_backend: "piper"
            voxhelm_piper_voices:
              - "en_US-lessac-medium"
            voxhelm_piper_default_voice: "en_US-lessac-medium"
            voxhelm_transcription_execution_mode: "remote_pull"
            voxhelm_worker_tokens_env: ""
            voxhelm_remote_worker_lease_seconds: 1800
            voxhelm_remote_worker_poll_seconds: 5
            voxhelm_remote_worker_max_attempts: 3
            voxhelm_artifact_backend: "s3"
            voxhelm_artifact_bucket: "voxhelm"
            voxhelm_artifact_s3_endpoint_url: "https://s3.home.example"
            voxhelm_artifact_s3_access_key_id: "s3-key"
            voxhelm_artifact_s3_secret_access_key: "s3-secret"
            voxhelm_diarization_backend: "none"
        - name: Mark remote_pull validation unexpectedly passed
          ansible.builtin.set_fact:
            voxhelm_remote_pull_validation_failed: false
      rescue:
        - name: Mark remote_pull validation failed as expected
          ansible.builtin.set_fact:
            voxhelm_remote_pull_validation_failed: true

    - name: Assert remote_pull validation failed without worker token
      ansible.builtin.assert:
        that:
          - voxhelm_remote_pull_validation_failed | default(false)

    - name: Validate remote_pull mode accepts complete worker and S3 config
      block:
        - name: Include validate tasks with complete remote_pull config
          ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate.yml"
          vars:
            ansible_facts:
              os_family: Darwin
            voxhelm_source_path: "/tmp/voxhelm"
            voxhelm_django_secret_key: "test-secret"
            voxhelm_bearer_tokens_env: "archive=test-token"
            voxhelm_bootstrap_operator_username: "operator"
            voxhelm_bootstrap_operator_password: "operator-password"
            voxhelm_app_port: 8787
            voxhelm_uv_bin: "/usr/local/bin/uv"
            voxhelm_tts_backend: "piper"
            voxhelm_piper_voices:
              - "en_US-lessac-medium"
            voxhelm_piper_default_voice: "en_US-lessac-medium"
            voxhelm_transcription_execution_mode: "remote_pull"
            voxhelm_worker_tokens_env: "atlas=atlas-token"
            voxhelm_remote_worker_lease_seconds: 1800
            voxhelm_remote_worker_poll_seconds: 5
            voxhelm_remote_worker_max_attempts: 3
            voxhelm_artifact_backend: "s3"
            voxhelm_artifact_bucket: "voxhelm"
            voxhelm_artifact_s3_endpoint_url: "https://s3.home.example"
            voxhelm_artifact_s3_access_key_id: "s3-key"
            voxhelm_artifact_s3_secret_access_key: "s3-secret"
            voxhelm_diarization_backend: "none"
        - name: Mark complete remote_pull validation passed
          ansible.builtin.set_fact:
            voxhelm_remote_pull_complete_validation_passed: true
      rescue:
        - name: Mark complete remote_pull validation failed
          ansible.builtin.set_fact:
            voxhelm_remote_pull_complete_validation_passed: false

    - name: Assert complete remote_pull validation passed
      ansible.builtin.assert:
        that:
          - voxhelm_remote_pull_complete_validation_passed | default(false)

    - name: Clean up rendered files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ rendered_env }}"
        - "{{ rendered_start }}"
        - "{{ rendered_worker }}"
        - "{{ rendered_wyoming }}"
