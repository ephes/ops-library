---
- name: service_env | Render API environment file
  ansible.builtin.template:
    src: opsgate-api.env.j2
    dest: "{{ opsgate_config_dir }}/opsgate-api.env"
    owner: root
    group: "{{ control_service_group }}"
    mode: "0640"
  register: opsgate_api_env_template
  no_log: true

- name: service_env | Render runner environment file
  ansible.builtin.template:
    src: opsgate-runner.env.j2
    dest: "{{ opsgate_config_dir }}/opsgate-runner.env"
    owner: root
    group: "{{ ops_group }}"
    mode: "0640"
  register: opsgate_runner_env_template
  no_log: true
