---
- name: ops_credentials | Configure ops git identity
  ansible.builtin.template:
    src: ops.gitconfig.j2
    dest: "{{ ops_home_dir }}/.gitconfig"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0640"

- name: ops_credentials | Install ops SSH private key
  ansible.builtin.copy:
    dest: "{{ ops_home_dir }}/.ssh/id_ed25519"
    content: "{{ opsgate_ops_ssh_private_key | trim }}\n"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0600"
  when: opsgate_ops_ssh_private_key | trim | length > 0
  no_log: true

- name: ops_credentials | Install ops SSH public key
  ansible.builtin.copy:
    dest: "{{ ops_home_dir }}/.ssh/id_ed25519.pub"
    content: "{{ opsgate_ops_ssh_public_key | trim }}\n"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0644"
  when: opsgate_ops_ssh_public_key | trim | length > 0
  no_log: true

- name: ops_credentials | Install ops GitHub SSH private key
  ansible.builtin.copy:
    dest: "{{ opsgate_ops_github_ssh_private_key_path }}"
    content: "{{ opsgate_ops_github_ssh_private_key | trim }}\n"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0600"
  when: opsgate_ops_github_ssh_private_key | trim | length > 0
  no_log: true

- name: ops_credentials | Install ops GitHub SSH public key
  ansible.builtin.copy:
    dest: "{{ opsgate_ops_github_ssh_public_key_path }}"
    content: "{{ opsgate_ops_github_ssh_public_key | trim }}\n"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0644"
  when: opsgate_ops_github_ssh_public_key | trim | length > 0
  no_log: true

- name: ops_credentials | Render ops SSH config
  ansible.builtin.template:
    src: ops.ssh.config.j2
    dest: "{{ opsgate_ops_ssh_config_path }}"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0600"

- name: ops_credentials | Install ops SOPS age key
  ansible.builtin.copy:
    dest: "{{ ops_home_dir }}/.config/sops/age/keys.txt"
    content: "{{ opsgate_ops_age_private_key | trim }}\n"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0600"
  when: opsgate_ops_age_private_key | trim | length > 0
  no_log: true

- name: ops_credentials | Install GitHub token credential helper entry
  ansible.builtin.copy:
    dest: "{{ ops_home_dir }}/.git-credentials"
    content: "https://{{ opsgate_ops_github_username | urlencode }}:{{ opsgate_ops_github_token | urlencode }}@github.com\n"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: "0600"
  when:
    - opsgate_ops_github_username | trim | length > 0
    - opsgate_ops_github_token | trim | length > 0
  no_log: true
