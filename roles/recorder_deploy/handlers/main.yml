---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart recorder
  ansible.builtin.systemd:
    name: "{{ recorder_service_name }}"
    state: restarted

- name: reload traefik
  ansible.builtin.systemd:
    name: traefik
    state: reloaded
  failed_when: false
