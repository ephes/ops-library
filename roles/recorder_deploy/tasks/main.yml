---
- name: Validate recorder inputs
  ansible.builtin.import_tasks: validate.yml

- name: Install recorder dependencies
  ansible.builtin.import_tasks: packages.yml

- name: Ensure recorder user and group exist
  ansible.builtin.import_tasks: user.yml

- name: Create recorder directories
  ansible.builtin.import_tasks: directories.yml

- name: Install recorder binary
  ansible.builtin.import_tasks: binary.yml

- name: Render recorder environment file
  ansible.builtin.import_tasks: config.yml

- name: Install recorder systemd unit
  ansible.builtin.import_tasks: systemd.yml

- name: Configure Traefik exposure
  ansible.builtin.import_tasks: traefik.yml
  when: recorder_traefik_enabled | bool

- name: Ensure recorder service state
  ansible.builtin.import_tasks: service.yml

- name: Run recorder health check
  ansible.builtin.import_tasks: health.yml
  when: recorder_healthcheck_enabled | bool
