---
- name: Ensure Traefik dynamic config directory exists
  ansible.builtin.file:
    path: "{{ recorder_traefik_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render Traefik configuration for recorder
  ansible.builtin.template:
    src: recorder-traefik.yml.j2
    dest: "{{ recorder_traefik_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: reload traefik
