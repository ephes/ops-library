---
galaxy_info:
  role_name: recorder_deploy
  namespace: local
  author: ops-library
  description: >-
    Deploy the Recorder application backend (a single static Go binary,
    recorderd) as a systemd unit behind Traefik. SQLite for state, MinIO for
    media, optional LiveKit live path. Models on navidrome_deploy but installs a
    locally cross-compiled binary rather than an upstream release.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions: [bookworm]
    - name: Ubuntu
      versions: [jammy, noble]
  galaxy_tags: [recorder, go, systemd, traefik, sqlite]
dependencies: []
