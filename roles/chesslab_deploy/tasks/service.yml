---
- name: service | Render and enable chesslab systemd unit
  ansible.builtin.include_role:
    name: local.ops_library.webapp_deploy_internal
    tasks_from: systemd_service
  vars:
    webapp_deploy_internal_service_template_src: "templates/chesslab.service.j2"
    webapp_deploy_internal_service_unit_dest: /etc/systemd/system/chesslab.service
    webapp_deploy_internal_service_name: chesslab
    webapp_deploy_internal_service_notify_handlers:
      - reload systemd
      - restart chesslab
