---
- name: Skip logyard_vector_deploy when disabled
  ansible.builtin.debug:
    msg: "logyard_vector_deploy skipped (logyard_vector_enabled=false)."
  when: not logyard_vector_enabled | bool

- name: Deploy Vector producer for Logyard ingest
  when: logyard_vector_enabled | bool
  block:
    - name: Validate required Logyard Vector variables
      ansible.builtin.assert:
        that:
          - logyard_vector_ingest_endpoint is defined
          - logyard_vector_ingest_endpoint | length > 0
          - logyard_vector_host_id | length > 0
          - logyard_vector_environment | length > 0
          - logyard_vector_source_type == "journald"
        fail_msg: >-
          Missing required logyard_vector_* configuration. Ensure ingest endpoint, host id,
          environment, and journald source settings are set.

    - name: Install Vector package prerequisites
      ansible.builtin.include_role:
        name: local.ops_library.vector_apt_install
      vars:
        vector_apt_install_package_name: "{{ logyard_vector_package_name }}"
        vector_apt_install_repo_url: "{{ logyard_vector_repo_url }}"
        vector_apt_install_repo_channel: "{{ logyard_vector_repo_channel }}"
        vector_apt_install_repo_version: "{{ logyard_vector_repo_version }}"
        vector_apt_install_repo_key_url: "{{ logyard_vector_repo_key_url }}"
        vector_apt_install_repo_key_tmp: "{{ logyard_vector_repo_key_tmp }}"
        vector_apt_install_repo_keyring_path: "{{ logyard_vector_repo_keyring_path }}"
        vector_apt_install_repo_list_file: "{{ logyard_vector_repo_list_file }}"

    - name: Ensure Vector data directory exists
      ansible.builtin.file:
        path: "{{ logyard_vector_data_dir }}"
        state: directory
        owner: vector
        group: vector
        mode: "0750"

    - name: Ensure Vector config directory exists
      ansible.builtin.file:
        path: "{{ logyard_vector_config_dir }}"
        state: directory
        owner: root
        group: vector
        mode: "0750"

    - name: Ensure Vector reads config fragments from config directory
      ansible.builtin.lineinfile:
        path: "{{ logyard_vector_env_file }}"
        regexp: '^VECTOR_CONFIG_DIR='
        line: "VECTOR_CONFIG_DIR={{ logyard_vector_config_dir }}"
        create: true
        owner: root
        group: root
        mode: "0644"
      notify: Restart Logyard Vector Service

    - name: Check existing shared Vector global config
      ansible.builtin.stat:
        path: "{{ logyard_vector_global_config_path }}"
      register: logyard_vector_global_config_stat

    - name: Read existing shared Vector global config
      ansible.builtin.slurp:
        path: "{{ logyard_vector_global_config_path }}"
      register: logyard_vector_global_config_raw
      when: logyard_vector_global_config_stat.stat.exists

    - name: Assert shared Vector global config matches requested data directory
      ansible.builtin.assert:
        that:
          - existing_logyard_vector_global_data_dir == logyard_vector_data_dir
        fail_msg: >-
          Existing shared Vector global config uses data_dir={{ existing_logyard_vector_global_data_dir }},
          but logyard_vector_data_dir={{ logyard_vector_data_dir }}. Align the shared Vector data_dir
          before deploying.
      vars:
        existing_logyard_vector_global_data_dir: >-
          {{
            ((logyard_vector_global_config_raw.content | b64decode | from_yaml).data_dir
            | default(logyard_vector_data_dir, true))
            if logyard_vector_global_config_stat.stat.exists
            else logyard_vector_data_dir
          }}

    - name: Remove legacy monolithic Vector config
      ansible.builtin.file:
        path: "/etc/vector/vector.yaml"
        state: absent

    - name: Stage and validate Logyard Vector config fragment
      block:
        - name: Create temporary Vector validation directory
          ansible.builtin.tempfile:
            state: directory
            prefix: logyard-vector-validate-
          register: logyard_vector_validation_dir

        - name: Find existing Vector config fragments
          ansible.builtin.find:
            paths: "{{ logyard_vector_config_dir }}"
            file_type: file
            patterns:
              - "*.yaml"
              - "*.yml"
              - "*.toml"
              - "*.json"
          register: logyard_vector_existing_configs

        - name: Copy existing Vector config fragments into validation directory
          ansible.builtin.copy:
            remote_src: true
            src: "{{ item.path }}"
            dest: "{{ logyard_vector_validation_dir.path }}/{{ item.path | basename }}"
            owner: root
            group: root
            mode: "0644"
          loop: "{{ logyard_vector_existing_configs.files }}"
          when:
            - item.path != logyard_vector_config_path
            - item.path != logyard_vector_global_config_path

        - name: Render candidate shared Vector global config
          ansible.builtin.copy:
            dest: "{{ logyard_vector_validation_dir.path }}/{{ logyard_vector_global_config_path | basename }}"
            content: |
              data_dir: {{ logyard_vector_data_dir | to_json }}
            owner: root
            group: root
            mode: "0644"

        - name: Render candidate Logyard Vector fragment
          ansible.builtin.template:
            src: vector.yaml.j2
            dest: "{{ logyard_vector_validation_dir.path }}/{{ logyard_vector_config_path | basename }}"
            owner: root
            group: root
            mode: "0644"

        - name: Validate staged Vector configuration directory
          ansible.builtin.command:
            argv:
              - vector
              - validate
              - --config-dir
              - "{{ logyard_vector_validation_dir.path }}"
          changed_when: false

        - name: Deploy shared Vector global config
          ansible.builtin.copy:
            dest: "{{ logyard_vector_global_config_path }}"
            content: |
              data_dir: {{ logyard_vector_data_dir | to_json }}
            owner: root
            group: vector
            mode: "0640"
          notify: Restart Logyard Vector Service

        - name: Deploy Vector config fragment for Logyard ingest
          ansible.builtin.template:
            src: vector.yaml.j2
            dest: "{{ logyard_vector_config_path }}"
            owner: root
            group: vector
            mode: "0640"
          notify: Restart Logyard Vector Service
      always:
        - name: Clean up temporary Vector validation directory
          ansible.builtin.file:
            path: "{{ logyard_vector_validation_dir.path }}"
            state: absent
          when: logyard_vector_validation_dir is defined and logyard_vector_validation_dir.path is defined

    - name: Flush Vector restart handler
      ansible.builtin.meta: flush_handlers

    - name: Ensure Vector service is enabled and running
      ansible.builtin.systemd:
        name: "{{ logyard_vector_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
