---
# wagtail_deploy/handlers/main.yml
# Handlers for the wagtail_deploy role.

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart wagtail
  ansible.builtin.systemd:
    name: "{{ wagtail_service_name }}"
    state: restarted

- name: restart wagtail db worker
  ansible.builtin.systemd:
    name: "{{ wagtail_db_worker_unit_name }}"
    state: restarted
  when: wagtail_db_worker_enabled | bool
