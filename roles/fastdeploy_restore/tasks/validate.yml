---
- name: "Resolve FastDeploy restore artifact and snapshot"
  ansible.builtin.include_role:
    name: local.ops_library.restore_pilot_internal
    tasks_from: host_local_validate
  vars:
    restore_pilot_internal_role_label: FastDeploy
    restore_pilot_internal_archive: "{{ fastdeploy_restore_archive }}"
    restore_pilot_internal_archive_search_root: "{{ fastdeploy_restore_archive_search_root }}"
    restore_pilot_internal_latest_exclude_regex: "/{{ fastdeploy_restore_safety_backup_prefix }}-"
    restore_pilot_internal_stage_dir: "{{ fastdeploy_restore_stage_dir }}"
    restore_pilot_internal_stage_owner: "{{ fastdeploy_restore_postgres_become_user }}"
    restore_pilot_internal_stage_group: "{{ fastdeploy_restore_postgres_become_user }}"
    restore_pilot_internal_stage_mode: "0750"
    restore_pilot_internal_validate_checksums: "{{ fastdeploy_restore_validate_checksums }}"
    restore_pilot_internal_resolved_artifact_path_var: fastdeploy_restore_resolved_artifact_path
    restore_pilot_internal_resolved_is_archive_var: fastdeploy_restore_resolved_is_archive
    restore_pilot_internal_snapshot_dir_var: fastdeploy_restore_snapshot_dir
    restore_pilot_internal_extracted_archive_var: fastdeploy_restore_extracted_archive
    restore_pilot_internal_metadata_var: fastdeploy_restore_metadata

- name: "Set metadata-derived restore facts"
  ansible.builtin.include_tasks: metadata_facts.yml

- name: "Ensure deploy user SOPS key exists (required for real restore)"
  ansible.builtin.stat:
    path: "{{ fastdeploy_restore_sops_key_path }}"
  register: fastdeploy_restore_sops_key_stat
  when:
    - fastdeploy_restore_require_sops_key
    - not fastdeploy_restore_dry_run

- name: "Fail when SOPS key is missing"
  ansible.builtin.fail:
    msg: "SOPS key {{ fastdeploy_restore_sops_key_path }} is missing. Restore cannot continue."
  when:
    - fastdeploy_restore_require_sops_key
    - not fastdeploy_restore_dry_run
    - not fastdeploy_restore_sops_key_stat.stat.exists
