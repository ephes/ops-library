---
- name: "Run FastDeploy restore scaffold"
  ansible.builtin.include_role:
    name: local.ops_library.restore_pilot_internal
    tasks_from: scaffold
  vars:
    restore_pilot_internal_timestamp_var: fastdeploy_restore_timestamp
    restore_pilot_internal_operation_successful_var: fastdeploy_restore_operation_successful
    restore_pilot_internal_extra_init_facts:
      fastdeploy_restore_stage_dir: "{{ fastdeploy_restore_temp_dir }}/fastdeploy-restore-{{ ansible_date_time.iso8601_basic_short }}"
      fastdeploy_restore_snapshot_dir: ""
      fastdeploy_restore_extracted_archive: false
      fastdeploy_restore_resolved_artifact_path: ""
      fastdeploy_restore_safety_snapshot_dir: ""
      fastdeploy_restore_rollback_executed: false
    restore_pilot_internal_validate_tasks_file: validate.yml
    restore_pilot_internal_prepare_tasks_file: safety_backup.yml
    restore_pilot_internal_prepare_enabled: "{{ (not fastdeploy_restore_dry_run) and (fastdeploy_restore_create_safety_backup | bool) }}"
    restore_pilot_internal_restore_tasks_file: restore.yml
    restore_pilot_internal_restore_enabled: "{{ not fastdeploy_restore_dry_run }}"
    restore_pilot_internal_verify_tasks_file: verify.yml
    restore_pilot_internal_verify_enabled: "{{ not fastdeploy_restore_dry_run }}"
    restore_pilot_internal_rollback_tasks_file: rollback.yml
    restore_pilot_internal_rescue_fail_message: "FastDeploy restore failed. Check prior log output for details."
    restore_pilot_internal_cleanup_tasks_file: cleanup.yml
