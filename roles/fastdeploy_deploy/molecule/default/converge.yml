---
- name: Converge
  hosts: all
  become: true

  pre_tasks:
    - name: Ensure apt helpers and curl are present
      ansible.builtin.apt:
        name:
          - python3-apt
          - python3-debian
          - curl
          - ca-certificates
        state: present
        update_cache: true

    - name: Install dummy Traefik unit for Molecule
      ansible.builtin.copy:
        dest: /etc/systemd/system/traefik.service
        mode: "0644"
        content: |
          [Unit]
          Description=Dummy Traefik for Molecule

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/true
          ExecReload=/bin/true

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd after dummy Traefik unit
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start dummy Traefik service
      ansible.builtin.systemd:
        name: traefik
        enabled: true
        state: started

  vars:
    fastdeploy_deploy_method: git
    fastdeploy_git_repo: "https://github.com/ephes/fastdeploy.git"
    fastdeploy_git_version: main
    fastdeploy_secret_key: "molecule-fastdeploy-secret-key"
    fastdeploy_initial_password_hash: "$2b$12$C/.9mKCNt2uQ6Xo8XOSYpOZ.7YT1Do1B4ezgmO6ijLJrVN6a8GNm6"
    fastdeploy_postgres_password: "molecule-postgres-password"
    fastdeploy_postgres_version: "16"
    fastdeploy_postgres_repo_enabled: false
    fastdeploy_basic_auth_enabled: false
    fastdeploy_traefik_enabled: true
    fastdeploy_build_frontend: false

  roles:
    - role: fastdeploy_deploy
