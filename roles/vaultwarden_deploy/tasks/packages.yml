---
# Install Vaultwarden packages

- name: packages | Install Vaultwarden packages
  ansible.builtin.apt:
    name:
      - vaultwarden
      - vaultwarden-web-vault
    state: present
  notify: restart vaultwarden
  when: not vaultwarden_skip_install | default(false)

- name: packages | Ensure Vaultwarden data directory exists
  ansible.builtin.file:
    path: /var/lib/vaultwarden/data
    state: directory
    owner: vaultwarden
    group: vaultwarden
    mode: "0750"

- name: packages | Ensure Vaultwarden log directory exists
  ansible.builtin.file:
    path: /var/log/vaultwarden
    state: directory
    owner: vaultwarden
    group: vaultwarden
    mode: "0750"
