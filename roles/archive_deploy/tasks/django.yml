---
- name: django | Render archive environment file
  ansible.builtin.template:
    src: archive.env.j2
    dest: "{{ archive_env_path }}"
    owner: "{{ archive_user }}"
    group: "{{ archive_group }}"
    mode: "0600"
  notify:
    - restart archive
    - restart archive metadata worker

- name: django | Run archive migrations
  ansible.builtin.command:
    cmd: "{{ archive_venv_bin }}/python manage.py migrate --noinput"
  args:
    chdir: "{{ archive_django_path }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ archive_django_settings_module }}"
    DJANGO_SECRET_KEY: "{{ archive_django_secret_key }}"
    DJANGO_ALLOWED_HOSTS: "{{ archive_django_allowed_hosts | join(',') }}"
    DJANGO_CSRF_TRUSTED_ORIGINS: "{{ archive_django_csrf_trusted_origins | join(',') }}"
    DJANGO_DB_PATH: "{{ archive_db_path }}"
    DJANGO_STATIC_ROOT: "{{ archive_static_root }}"
    ARCHIVE_API_TOKEN: "{{ archive_api_token }}"
    ARCHIVE_SUMMARY_API_KEY: "{{ archive_summary_api_key }}"
    ARCHIVE_SUMMARY_API_BASE: "{{ archive_summary_api_base }}"
    ARCHIVE_SUMMARY_MODEL: "{{ archive_summary_model }}"
    ARCHIVE_TRANSCRIPTION_API_KEY: "{{ archive_transcription_api_key }}"
    ARCHIVE_TRANSCRIPTION_API_BASE: "{{ archive_transcription_api_base }}"
    ARCHIVE_TRANSCRIPTION_MODEL: "{{ archive_transcription_model }}"
    ARCHIVE_MEDIA_STORAGE_BACKEND: "{{ archive_media_storage_backend }}"
    ARCHIVE_MEDIA_STORAGE_LOCATION: "{{ archive_media_storage_location }}"
    ARCHIVE_MEDIA_STORAGE_BASE_URL: "{{ archive_media_storage_base_url }}"
    ARCHIVE_MEDIA_STORAGE_BUCKET_NAME: "{{ archive_media_storage_bucket_name }}"
    ARCHIVE_MEDIA_STORAGE_ENDPOINT_URL: "{{ archive_media_storage_endpoint_url }}"
    ARCHIVE_MEDIA_STORAGE_REGION_NAME: "{{ archive_media_storage_region_name }}"
    ARCHIVE_MEDIA_STORAGE_ACCESS_KEY_ID: "{{ archive_media_storage_access_key_id }}"
    ARCHIVE_MEDIA_STORAGE_SECRET_ACCESS_KEY: "{{ archive_media_storage_secret_access_key }}"
    ARCHIVE_MEDIA_STORAGE_ADDRESSING_STYLE: "{{ archive_media_storage_addressing_style }}"
  become: true
  become_user: "{{ archive_user }}"

- name: django | Collect archive static files
  ansible.builtin.command:
    cmd: "{{ archive_venv_bin }}/python manage.py collectstatic --noinput"
  args:
    chdir: "{{ archive_django_path }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ archive_django_settings_module }}"
    DJANGO_SECRET_KEY: "{{ archive_django_secret_key }}"
    DJANGO_ALLOWED_HOSTS: "{{ archive_django_allowed_hosts | join(',') }}"
    DJANGO_CSRF_TRUSTED_ORIGINS: "{{ archive_django_csrf_trusted_origins | join(',') }}"
    DJANGO_DB_PATH: "{{ archive_db_path }}"
    DJANGO_STATIC_ROOT: "{{ archive_static_root }}"
    ARCHIVE_API_TOKEN: "{{ archive_api_token }}"
    ARCHIVE_SUMMARY_API_KEY: "{{ archive_summary_api_key }}"
    ARCHIVE_SUMMARY_API_BASE: "{{ archive_summary_api_base }}"
    ARCHIVE_SUMMARY_MODEL: "{{ archive_summary_model }}"
    ARCHIVE_TRANSCRIPTION_API_KEY: "{{ archive_transcription_api_key }}"
    ARCHIVE_TRANSCRIPTION_API_BASE: "{{ archive_transcription_api_base }}"
    ARCHIVE_TRANSCRIPTION_MODEL: "{{ archive_transcription_model }}"
    ARCHIVE_MEDIA_STORAGE_BACKEND: "{{ archive_media_storage_backend }}"
    ARCHIVE_MEDIA_STORAGE_LOCATION: "{{ archive_media_storage_location }}"
    ARCHIVE_MEDIA_STORAGE_BASE_URL: "{{ archive_media_storage_base_url }}"
    ARCHIVE_MEDIA_STORAGE_BUCKET_NAME: "{{ archive_media_storage_bucket_name }}"
    ARCHIVE_MEDIA_STORAGE_ENDPOINT_URL: "{{ archive_media_storage_endpoint_url }}"
    ARCHIVE_MEDIA_STORAGE_REGION_NAME: "{{ archive_media_storage_region_name }}"
    ARCHIVE_MEDIA_STORAGE_ACCESS_KEY_ID: "{{ archive_media_storage_access_key_id }}"
    ARCHIVE_MEDIA_STORAGE_SECRET_ACCESS_KEY: "{{ archive_media_storage_secret_access_key }}"
    ARCHIVE_MEDIA_STORAGE_ADDRESSING_STYLE: "{{ archive_media_storage_addressing_style }}"
  become: true
  become_user: "{{ archive_user }}"

- name: django | Ensure archive admin user exists
  ansible.builtin.command:
    argv:
      - "{{ archive_venv_bin }}/python"
      - manage.py
      - ensure_admin_user
      - --username
      - "{{ archive_admin_username }}"
      - --password
      - "{{ archive_admin_password }}"
      - --email
      - "{{ archive_admin_email }}"
  args:
    chdir: "{{ archive_django_path }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ archive_django_settings_module }}"
    DJANGO_SECRET_KEY: "{{ archive_django_secret_key }}"
    DJANGO_ALLOWED_HOSTS: "{{ archive_django_allowed_hosts | join(',') }}"
    DJANGO_CSRF_TRUSTED_ORIGINS: "{{ archive_django_csrf_trusted_origins | join(',') }}"
    DJANGO_DB_PATH: "{{ archive_db_path }}"
    DJANGO_STATIC_ROOT: "{{ archive_static_root }}"
    ARCHIVE_API_TOKEN: "{{ archive_api_token }}"
    ARCHIVE_SUMMARY_API_KEY: "{{ archive_summary_api_key }}"
    ARCHIVE_SUMMARY_API_BASE: "{{ archive_summary_api_base }}"
    ARCHIVE_SUMMARY_MODEL: "{{ archive_summary_model }}"
    ARCHIVE_TRANSCRIPTION_API_KEY: "{{ archive_transcription_api_key }}"
    ARCHIVE_TRANSCRIPTION_API_BASE: "{{ archive_transcription_api_base }}"
    ARCHIVE_TRANSCRIPTION_MODEL: "{{ archive_transcription_model }}"
    ARCHIVE_MEDIA_STORAGE_BACKEND: "{{ archive_media_storage_backend }}"
    ARCHIVE_MEDIA_STORAGE_LOCATION: "{{ archive_media_storage_location }}"
    ARCHIVE_MEDIA_STORAGE_BASE_URL: "{{ archive_media_storage_base_url }}"
    ARCHIVE_MEDIA_STORAGE_BUCKET_NAME: "{{ archive_media_storage_bucket_name }}"
    ARCHIVE_MEDIA_STORAGE_ENDPOINT_URL: "{{ archive_media_storage_endpoint_url }}"
    ARCHIVE_MEDIA_STORAGE_REGION_NAME: "{{ archive_media_storage_region_name }}"
    ARCHIVE_MEDIA_STORAGE_ACCESS_KEY_ID: "{{ archive_media_storage_access_key_id }}"
    ARCHIVE_MEDIA_STORAGE_SECRET_ACCESS_KEY: "{{ archive_media_storage_secret_access_key }}"
    ARCHIVE_MEDIA_STORAGE_ADDRESSING_STYLE: "{{ archive_media_storage_addressing_style }}"
  become: true
  become_user: "{{ archive_user }}"
