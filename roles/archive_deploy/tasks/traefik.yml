---
- name: traefik | Render archive Traefik config
  ansible.builtin.include_role:
    name: local.ops_library.webapp_deploy_internal
    tasks_from: traefik_config
  vars:
    webapp_deploy_internal_traefik_template_src: "templates/archive.traefik.yml.j2"
    webapp_deploy_internal_traefik_dest: /etc/traefik/dynamic/archive.yml
    webapp_deploy_internal_traefik_notify_handlers:
      - reload traefik
