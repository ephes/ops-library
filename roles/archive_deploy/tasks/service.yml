---
- name: service | Render and enable archive systemd unit
  ansible.builtin.include_role:
    name: local.ops_library.webapp_deploy_internal
    tasks_from: systemd_service
  vars:
    webapp_deploy_internal_service_template_src: "templates/archive.service.j2"
    webapp_deploy_internal_service_unit_dest: /etc/systemd/system/archive.service
    webapp_deploy_internal_service_name: archive
    webapp_deploy_internal_service_notify_handlers:
      - reload systemd
      - restart archive

- name: service | Render archive metadata worker systemd service
  ansible.builtin.template:
    src: archive-metadata-worker.service.j2
    dest: /etc/systemd/system/archive-metadata-worker.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart archive metadata worker

- name: service | Render archive quote classifier systemd service
  ansible.builtin.template:
    src: archive-quote-classifier.service.j2
    dest: /etc/systemd/system/archive-quote-classifier.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd

- name: service | Render archive quote classifier systemd timer
  ansible.builtin.template:
    src: archive-quote-classifier.timer.j2
    dest: /etc/systemd/system/archive-quote-classifier.timer
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart archive quote classifier timer

- name: service | Enable and start archive service
  ansible.builtin.systemd:
    name: archive
    enabled: true
    state: started
    daemon_reload: true

- name: service | Enable and start archive metadata worker service
  ansible.builtin.systemd:
    name: archive-metadata-worker
    enabled: true
    state: started
    daemon_reload: true

- name: service | Enable and start archive quote classifier timer
  ansible.builtin.systemd:
    name: archive-quote-classifier.timer
    enabled: true
    state: started
    daemon_reload: true
  when: archive_quote_classifier_enabled | bool

- name: service | Disable archive quote classifier timer
  ansible.builtin.systemd:
    name: archive-quote-classifier.timer
    enabled: false
    state: stopped
    daemon_reload: true
  when: not (archive_quote_classifier_enabled | bool)
