---
- name: service | Render archive systemd service
  ansible.builtin.template:
    src: archive.service.j2
    dest: /etc/systemd/system/archive.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart archive

- name: service | Enable and start archive service
  ansible.builtin.systemd:
    name: archive
    enabled: true
    state: started
    daemon_reload: true
