---
- name: validate | Ensure Voxhelm remote worker target is macOS
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Darwin'
    fail_msg: "voxhelm_remote_worker_deploy only supports macOS targets."
  when: voxhelm_remote_worker_enabled | bool

- name: validate | Ensure required remote worker variables are configured
  ansible.builtin.assert:
    that:
      - voxhelm_remote_worker_service_user | string | trim | length > 0
      - voxhelm_remote_worker_service_user != "CHANGEME"
      - voxhelm_remote_worker_service_group | string | trim | length > 0
      - voxhelm_remote_worker_service_home | string | trim | length > 0
      - voxhelm_remote_worker_base_url | string | trim | length > 0
      - voxhelm_remote_worker_id | string | trim | length > 0
      - voxhelm_remote_worker_token | string | trim | length > 0
      - voxhelm_remote_worker_token != "CHANGEME"
      - voxhelm_remote_worker_allowed_url_hosts is sequence
      - voxhelm_remote_worker_allowed_url_hosts is not string
      - voxhelm_remote_worker_uv_bin | string | trim | length > 0
      - voxhelm_remote_worker_python_version | string | trim | length > 0
      - voxhelm_remote_worker_public_index_url == "https://pypi.org/simple"
      - voxhelm_remote_worker_package_name == "voxhelm"
      - voxhelm_remote_worker_package_version | string | trim | length > 0
      - voxhelm_remote_worker_package_extras is sequence
      - voxhelm_remote_worker_package_extras is not string
      - voxhelm_remote_worker_poll_seconds | int > 0
      - voxhelm_remote_worker_http_timeout_seconds | int > 0
      - voxhelm_remote_worker_heartbeat_interval_seconds | int > 0
      - voxhelm_remote_worker_log_level in ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"]
      - voxhelm_remote_worker_launcher_path | string | trim | length > 0
      - voxhelm_remote_worker_artifact_backend | string | trim | lower == "s3"
      - voxhelm_remote_worker_artifact_bucket | string | trim | length > 0
      - voxhelm_remote_worker_artifact_s3_endpoint_url | string | trim | length > 0
      - voxhelm_remote_worker_artifact_s3_access_key_id | string | trim | length > 0
      - voxhelm_remote_worker_artifact_s3_secret_access_key | string | trim | length > 0
    fail_msg: >-
      Voxhelm remote worker deployment is missing required configuration. It
      must install the pinned voxhelm package from public PyPI and have worker
      auth plus shared S3 artifact credentials.
  when: voxhelm_remote_worker_enabled | bool

- name: validate | Ensure pyannote remote worker secrets are configured
  ansible.builtin.assert:
    that:
      - voxhelm_remote_worker_pyannote_model | string | trim | length > 0
      - voxhelm_remote_worker_huggingface_token | string | trim | length > 0
      - voxhelm_remote_worker_huggingface_token != "CHANGEME"
    fail_msg: >-
      Voxhelm remote worker pyannote diarization is enabled, but the pyannote
      model or Hugging Face token is missing.
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_diarization_backend | string | trim | lower == "pyannote"

- name: runtime | Ensure uv is available
  ansible.builtin.command:
    argv:
      - "{{ voxhelm_remote_worker_uv_bin }}"
      - --version
  environment:
    PATH: "{{ voxhelm_remote_worker_launchd_path }}"
  changed_when: false
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Check Homebrew at /opt/homebrew/bin/brew
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: voxhelm_remote_worker_brew_opt
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Check Homebrew at /usr/local/bin/brew
  ansible.builtin.stat:
    path: /usr/local/bin/brew
  register: voxhelm_remote_worker_brew_usr
  when:
    - voxhelm_remote_worker_enabled | bool
    - not (voxhelm_remote_worker_brew_opt.stat.exists | default(false))

- name: runtime | Resolve Homebrew binary path
  ansible.builtin.set_fact:
    voxhelm_remote_worker_brew_bin_resolved: >-
      {{
        (voxhelm_remote_worker_brew_bin | length > 0)
        | ternary(
          voxhelm_remote_worker_brew_bin,
          (
            (voxhelm_remote_worker_brew_opt.stat.exists | default(false))
            | ternary('/opt/homebrew/bin/brew', '/usr/local/bin/brew')
          )
        )
      }}
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Stat resolved Homebrew binary
  ansible.builtin.stat:
    path: "{{ voxhelm_remote_worker_brew_bin_resolved }}"
  register: voxhelm_remote_worker_brew_bin_stat
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Validate Homebrew binary and owner
  ansible.builtin.assert:
    that:
      - voxhelm_remote_worker_brew_bin_resolved | length > 0
      - voxhelm_remote_worker_brew_bin_stat.stat.exists | default(false)
      - voxhelm_remote_worker_brew_user | length > 0 or ansible_user_id != 'root'
    fail_msg: >-
      Homebrew binary not found, or voxhelm_remote_worker_brew_user is missing
      while Ansible is running as root.
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_brew_packages | length > 0

- name: runtime | Update Homebrew formulae
  ansible.builtin.command: "{{ voxhelm_remote_worker_brew_bin_resolved }} update"
  register: voxhelm_remote_worker_brew_update_result
  changed_when: "'Already up-to-date' not in (voxhelm_remote_worker_brew_update_result.stdout | default(''))"
  become: "{{ voxhelm_remote_worker_brew_user | length > 0 }}"
  become_user: "{{ voxhelm_remote_worker_brew_user | default(omit) }}"
  become_flags: "-i"
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_brew_packages | length > 0
    - voxhelm_remote_worker_brew_update | bool

- name: runtime | Check required Homebrew packages
  ansible.builtin.command: "{{ voxhelm_remote_worker_brew_bin_resolved }} list --versions {{ item }}"
  register: voxhelm_remote_worker_brew_package_checks
  changed_when: false
  failed_when: false
  loop: "{{ voxhelm_remote_worker_brew_packages }}"
  become: "{{ voxhelm_remote_worker_brew_user | length > 0 }}"
  become_user: "{{ voxhelm_remote_worker_brew_user | default(omit) }}"
  become_flags: "-i"
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_brew_packages | length > 0

- name: runtime | Install missing Homebrew packages
  ansible.builtin.command: "{{ voxhelm_remote_worker_brew_bin_resolved }} install {{ item.item }}"
  register: voxhelm_remote_worker_brew_install
  changed_when: voxhelm_remote_worker_brew_install.rc == 0
  become: "{{ voxhelm_remote_worker_brew_user | length > 0 }}"
  become_user: "{{ voxhelm_remote_worker_brew_user | default(omit) }}"
  become_flags: "-i"
  loop: "{{ voxhelm_remote_worker_brew_package_checks.results | default([]) }}"
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_brew_packages | length > 0
    - item.rc != 0

- name: runtime | Ensure remote worker service user exists
  ansible.builtin.command:
    argv:
      - /usr/bin/id
      - -u
      - "{{ voxhelm_remote_worker_service_user }}"
  changed_when: false
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Ensure remote worker directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ voxhelm_remote_worker_config_dir }}"
      owner: root
      group: "{{ voxhelm_remote_worker_service_group }}"
      mode: "0750"
    - path: "{{ voxhelm_remote_worker_log_dir }}"
      owner: root
      group: wheel
      mode: "0755"
    - path: "{{ voxhelm_remote_worker_work_dir }}"
      owner: "{{ voxhelm_remote_worker_service_user }}"
      group: "{{ voxhelm_remote_worker_service_group }}"
      mode: "0750"
    - path: "{{ voxhelm_remote_worker_model_cache_dir }}"
      owner: "{{ voxhelm_remote_worker_service_user }}"
      group: "{{ voxhelm_remote_worker_service_group }}"
      mode: "0750"
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Ensure launchd log files exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: "{{ voxhelm_remote_worker_service_user }}"
    group: "{{ voxhelm_remote_worker_service_group }}"
    mode: "0644"
  loop:
    - "{{ voxhelm_remote_worker_stdout_log }}"
    - "{{ voxhelm_remote_worker_stderr_log }}"
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Check configured whisper.cpp model source
  ansible.builtin.stat:
    path: "{{ voxhelm_remote_worker_whispercpp_model_source }}"
  register: voxhelm_remote_worker_whispercpp_model_source_stat
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_whispercpp_model_source | string | trim | length > 0

- name: runtime | Validate configured whisper.cpp model source
  ansible.builtin.assert:
    that:
      - voxhelm_remote_worker_whispercpp_model_source_stat.stat.exists | default(false)
    fail_msg: >-
      voxhelm_remote_worker_whispercpp_model_source is configured but does not
      exist on the target host.
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_whispercpp_model_source | string | trim | length > 0

- name: runtime | Check worker whisper.cpp model cache entry
  ansible.builtin.stat:
    path: "{{ voxhelm_remote_worker_model_cache_dir }}/{{ voxhelm_remote_worker_whispercpp_model }}"
    follow: false
  register: voxhelm_remote_worker_whispercpp_model_cache_stat
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_whispercpp_model_source | string | trim | length > 0

- name: runtime | Link configured whisper.cpp model into worker cache
  ansible.builtin.file:
    src: "{{ voxhelm_remote_worker_whispercpp_model_source }}"
    dest: "{{ voxhelm_remote_worker_model_cache_dir }}/{{ voxhelm_remote_worker_whispercpp_model }}"
    state: link
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_whispercpp_model_source | string | trim | length > 0
    - not (voxhelm_remote_worker_whispercpp_model_cache_stat.stat.exists | default(false))

- name: runtime | Resolve public PyPI package spec
  ansible.builtin.import_tasks: package_spec.yml
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Check public PyPI install transcript
  ansible.builtin.stat:
    path: "{{ voxhelm_remote_worker_install_transcript_path }}"
  register: voxhelm_remote_worker_install_transcript_stat
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Read public PyPI install transcript
  ansible.builtin.slurp:
    path: "{{ voxhelm_remote_worker_install_transcript_path }}"
  register: voxhelm_remote_worker_install_transcript_slurp
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_install_transcript_stat.stat.exists | default(false)

- name: runtime | Resolve public PyPI install transcript text
  ansible.builtin.set_fact:
    voxhelm_remote_worker_install_transcript_text: >-
      {{
        (
          voxhelm_remote_worker_install_transcript_slurp.content
          | default('')
          | b64decode
        )
        if (voxhelm_remote_worker_install_transcript_stat.stat.exists | default(false))
        else ''
      }}
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Inspect installed uv tools
  ansible.builtin.command:
    argv:
      - "{{ voxhelm_remote_worker_uv_bin }}"
      - tool
      - list
      - --show-version-specifiers
      - --show-extras
      - --show-python
  environment:
    PATH: "{{ voxhelm_remote_worker_launchd_path }}"
  register: voxhelm_remote_worker_tool_list
  changed_when: false
  become: true
  become_user: "{{ voxhelm_remote_worker_service_user }}"
  become_flags: "-i"
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Decide whether Voxhelm remote worker install is needed
  ansible.builtin.set_fact:
    voxhelm_remote_worker_install_needed: >-
      {{
        (voxhelm_remote_worker_force_install | bool)
        or ((voxhelm_remote_worker_package_name ~ ' v' ~ voxhelm_remote_worker_package_version)
            not in (voxhelm_remote_worker_tool_list.stdout | default('')))
        or (('package=' ~ voxhelm_remote_worker_package_spec)
            not in (voxhelm_remote_worker_install_transcript_text | default('')))
      }}
  when: voxhelm_remote_worker_enabled | bool

- name: runtime | Install Voxhelm remote worker from public PyPI
  ansible.builtin.command:
    argv: "{{ voxhelm_remote_worker_install_argv }}"
  environment:
    PATH: "{{ voxhelm_remote_worker_launchd_path }}"
    UV_NO_SOURCES: "1"
  register: voxhelm_remote_worker_install
  changed_when: voxhelm_remote_worker_install_needed | bool
  become: true
  become_user: "{{ voxhelm_remote_worker_service_user }}"
  become_flags: "-i"
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_install_needed | bool

- name: runtime | Write public PyPI install transcript
  ansible.builtin.copy:
    dest: "{{ voxhelm_remote_worker_install_transcript_path }}"
    owner: root
    group: "{{ voxhelm_remote_worker_service_group }}"
    mode: "0640"
    content: |
      command={{ voxhelm_remote_worker_install_argv | join(' ') }}
      index={{ voxhelm_remote_worker_public_index_url }}
      package={{ voxhelm_remote_worker_package_spec }}
      install_needed={{ voxhelm_remote_worker_install_needed }}
      installed_tools:
      {{ voxhelm_remote_worker_tool_list.stdout | default('') | indent(2, true) }}
      stdout:
      {{ voxhelm_remote_worker_install.stdout | default('') | indent(2, true) }}
      stderr:
      {{ voxhelm_remote_worker_install.stderr | default('') | indent(2, true) }}
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_install_needed | bool

- name: config | Render Voxhelm remote worker environment file
  ansible.builtin.template:
    src: worker.env.j2
    dest: "{{ voxhelm_remote_worker_env_file }}"
    owner: root
    group: "{{ voxhelm_remote_worker_service_group }}"
    mode: "0640"
  register: voxhelm_remote_worker_env_template
  no_log: true
  when: voxhelm_remote_worker_enabled | bool

- name: config | Render Voxhelm remote worker launchd launcher
  ansible.builtin.template:
    src: worker-launcher.sh.j2
    dest: "{{ voxhelm_remote_worker_launcher_path }}"
    owner: root
    group: "{{ voxhelm_remote_worker_service_group }}"
    mode: "0755"
  register: voxhelm_remote_worker_launcher_template
  when: voxhelm_remote_worker_enabled | bool

- name: launchd | Render Voxhelm remote worker plist
  ansible.builtin.template:
    src: worker.launchd.plist.j2
    dest: "{{ voxhelm_remote_worker_launchd_plist_path }}"
    owner: root
    group: wheel
    mode: "0644"
  register: voxhelm_remote_worker_launchd_template
  when: voxhelm_remote_worker_enabled | bool

- name: launchd | Check remote worker launchd unit status
  ansible.builtin.command: "launchctl print system/{{ voxhelm_remote_worker_launchd_label }}"
  register: voxhelm_remote_worker_launchd_status
  changed_when: false
  failed_when: false
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_launchd_manage_state | bool

- name: launchd | Unload existing remote worker unit before bootstrap
  ansible.builtin.command: "launchctl bootout system {{ voxhelm_remote_worker_launchd_plist_path }}"
  changed_when: false
  failed_when: false
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_launchd_manage_state | bool
    - voxhelm_remote_worker_launchd_template.changed
    - voxhelm_remote_worker_launchd_status.rc == 0

- name: launchd | Bootstrap remote worker unit
  ansible.builtin.command: "launchctl bootstrap system {{ voxhelm_remote_worker_launchd_plist_path }}"
  register: voxhelm_remote_worker_launchd_bootstrap
  changed_when: voxhelm_remote_worker_launchd_bootstrap.rc == 0
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_launchd_manage_state | bool
    - voxhelm_remote_worker_launchd_template.changed or voxhelm_remote_worker_launchd_status.rc != 0

- name: launchd | Enable remote worker unit
  ansible.builtin.command: "launchctl enable system/{{ voxhelm_remote_worker_launchd_label }}"
  register: voxhelm_remote_worker_launchd_enable
  changed_when: voxhelm_remote_worker_launchd_enable.rc == 0
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_launchd_manage_state | bool
    - voxhelm_remote_worker_launchd_template.changed or voxhelm_remote_worker_launchd_status.rc != 0

- name: launchd | Start or restart remote worker unit
  ansible.builtin.command: "launchctl kickstart -k system/{{ voxhelm_remote_worker_launchd_label }}"
  register: voxhelm_remote_worker_launchd_kickstart
  changed_when: voxhelm_remote_worker_launchd_kickstart.rc == 0
  when:
    - voxhelm_remote_worker_enabled | bool
    - voxhelm_remote_worker_launchd_manage_state | bool
    - voxhelm_remote_worker_launchd_start_service | bool
    - >-
      voxhelm_remote_worker_launchd_template.changed
      or voxhelm_remote_worker_env_template.changed
      or (voxhelm_remote_worker_launcher_template.changed | default(false))
      or (voxhelm_remote_worker_install.changed | default(false))
      or voxhelm_remote_worker_launchd_status.rc != 0
      or 'state = running' not in (voxhelm_remote_worker_launchd_status.stdout | default(''))
