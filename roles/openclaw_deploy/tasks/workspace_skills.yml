---
- name: workspace_skills | Ensure managed skills root exists
  ansible.builtin.file:
    path: "{{ openclaw_agent_workspace_dir }}/skills"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"

- name: workspace_skills | Ensure managed skill directories exist
  ansible.builtin.file:
    path: "{{ openclaw_agent_workspace_dir }}/skills/{{ item.name }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  loop: "{{ openclaw_workspace_skills }}"
  loop_control:
    label: "{{ item.name }}"

- name: workspace_skills | Ensure managed file parent directories exist
  ansible.builtin.file:
    path: >-
      {{
        openclaw_agent_workspace_dir
        ~ '/skills/'
        ~ item.0.name
        ~ '/'
        ~ (item.1.dest | dirname)
      }}
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  loop: "{{ openclaw_workspace_skills | subelements('files') }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1.dest | dirname }}"

- name: workspace_skills | Deploy managed skill files
  ansible.builtin.copy:
    src: "{{ item.1.src }}"
    dest: >-
      {{ openclaw_agent_workspace_dir }}/skills/{{ item.0.name }}/{{ item.1.dest }}
    owner: "1000"
    group: "1000"
    mode: "{{ item.1.mode | default('0640') }}"
  loop: "{{ openclaw_workspace_skills | subelements('files') }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1.dest }}"
  register: _openclaw_workspace_skill_files_write
