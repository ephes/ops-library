---
- name: config | Check if gateway config exists
  ansible.builtin.stat:
    path: "{{ openclaw_data_dir }}/openclaw.json"
  register: openclaw_config_stat

- name: config | Build managed plugin patch inputs
  ansible.builtin.set_fact:
    _openclaw_managed_plugin_entries: >-
      {{
        {
          "telegram": { "enabled": openclaw_telegram_enabled | bool },
          "whatsapp": { "enabled": false }
        }
        | combine(
            (
              {
                openclaw_codex_plugin_id: { "enabled": true }
              }
              if (openclaw_codex_plugin_enabled | bool)
              else {}
            ),
            recursive=True
          )
        | combine(
            (
              {
                openclaw_opsgate_extension_id: {
                  "enabled": true
                }
              }
              if (openclaw_opsgate_enabled | bool)
              else {}
            ),
            recursive=True
          )
      }}
    _openclaw_managed_plugin_load_paths: >-
      {{
        [openclaw_opsgate_container_extension_dir]
        if (openclaw_opsgate_enabled | bool)
        else []
      }}
    _openclaw_managed_plugin_allow: >-
      {{
        (
          ([openclaw_codex_plugin_id] if (openclaw_codex_plugin_enabled | bool) else [])
          +
          ([openclaw_opsgate_extension_id] if (openclaw_opsgate_enabled | bool) else [])
        )
        | unique
        | list
      }}

- name: config | Build gateway access patch
  ansible.builtin.set_fact:
    _openclaw_gateway_access_patch: >-
      {{
        {
          "gateway": {
            "mode": "local",
            "bind": ("lan" if (openclaw_traefik_enabled | bool) else "loopback"),
            "trustedProxies": openclaw_gateway_trusted_proxies,
            "allowRealIpFallback": openclaw_gateway_allow_real_ip_fallback | bool
          }
        }
        | combine(
            (
              {
                "gateway": {
                  "auth": {
                    "rateLimit": {
                      "maxAttempts": openclaw_gateway_auth_rate_limit_max_attempts | int,
                      "windowMs": openclaw_gateway_auth_rate_limit_window_ms | int,
                      "lockoutMs": openclaw_gateway_auth_rate_limit_lockout_ms | int,
                      "exemptLoopback": openclaw_gateway_auth_rate_limit_exempt_loopback | bool
                    }
                  }
                }
              }
              if (openclaw_gateway_auth_rate_limit_enabled | bool)
              else {}
            ),
            recursive=True
          )
        | combine(
            (
              {
                "gateway": {
                  "controlUi": {
                    "allowedOrigins": [("https://" ~ openclaw_traefik_host)]
                  }
                }
              }
              if (openclaw_traefik_enabled | bool)
              else {}
            ),
            recursive=True
          )
      }}
  when: openclaw_gateway_config | length == 0

- name: config | Build optional model policy patch
  ansible.builtin.set_fact:
    _openclaw_model_policy_patch: >-
      {{
        {
          "agents": {
            "defaults": {
              "model": {
                "primary": openclaw_agent_model_primary | trim,
                "fallbacks": openclaw_agent_model_fallbacks | map('trim') | list
              }
            }
          }
        }
      }}
  when:
    - openclaw_gateway_config | length == 0
    - openclaw_agent_model_primary | trim | length > 0

- name: config | Build optional OpenAI auth-order patch
  ansible.builtin.set_fact:
    _openclaw_openai_auth_order_patch: >-
      {{
        {
          "auth": {
            "order": {
              "openai": openclaw_openai_auth_order | map('trim') | list
            }
          }
        }
      }}
  when:
    - openclaw_gateway_config | length == 0
    - openclaw_openai_auth_order | length > 0

- name: config | Build gateway config from individual variables
  ansible.builtin.set_fact:
    _openclaw_built_config: >-
      {{
        {
          "channels": {
            "telegram": {
              "enabled": openclaw_telegram_enabled | bool,
              "dmPolicy": openclaw_telegram_dm_policy,
              "allowFrom": openclaw_telegram_allow_from,
              "streaming": {
                "mode": openclaw_telegram_streaming_mode,
                "preview": {
                  "toolProgress": openclaw_telegram_streaming_preview_tool_progress | bool,
                  "commandText": openclaw_telegram_streaming_preview_command_text
                }
              }
            }
          },
          "session": {
            "dmScope": openclaw_session_dm_scope
          },
          "plugins": {
            "entries": _openclaw_managed_plugin_entries
          }
        }
        | combine(
            (
              {
                "plugins": {
                  "allow": _openclaw_managed_plugin_allow
                }
              }
              if (_openclaw_managed_plugin_allow | length > 0)
              else {}
            ),
            recursive=True
          )
        | combine(
            (
              {
                "plugins": {
                  "load": {
                    "paths": _openclaw_managed_plugin_load_paths
                  }
                }
              }
              if (_openclaw_managed_plugin_load_paths | length > 0)
              else {}
            ),
            recursive=True
          )
        | combine(_openclaw_gateway_access_patch, recursive=True)
        | combine(_openclaw_model_policy_patch | default({}), recursive=True)
        | combine(_openclaw_openai_auth_order_patch | default({}), recursive=True)
      }}
  when: openclaw_gateway_config | length == 0

- name: config | Render OpenClaw gateway config (seed)
  ansible.builtin.template:
    src: openclaw-config.json.j2
    dest: "{{ openclaw_data_dir }}/openclaw.json"
    owner: "1000"
    group: "1000"
    mode: "{{ openclaw_gateway_config_mode }}"
  no_log: true
  when: not openclaw_config_stat.stat.exists or (openclaw_force_config | bool)
  notify: restart openclaw

- name: config | Ensure WhatsApp plugin is disabled in existing config
  when: openclaw_config_stat.stat.exists and not (openclaw_force_config | bool)
  no_log: true
  block:
    - name: config | Read existing gateway config
      ansible.builtin.slurp:
        src: "{{ openclaw_data_dir }}/openclaw.json"
      register: _openclaw_existing_config_raw

    - name: config | Parse existing gateway config
      ansible.builtin.set_fact:
        _openclaw_existing_config: "{{ _openclaw_existing_config_raw.content | b64decode | from_json }}"

    - name: config | Build runtime config patch
      ansible.builtin.set_fact:
        _openclaw_runtime_patch: >-
          {{
              {
                "plugins": {
                  "entries": _openclaw_managed_plugin_entries
                },
                "channels": {
                  "telegram": {
                    "streaming": {
                      "mode": openclaw_telegram_streaming_mode,
                      "preview": {
                        "toolProgress": openclaw_telegram_streaming_preview_tool_progress | bool,
                        "commandText": openclaw_telegram_streaming_preview_command_text
                      }
                    }
                  }
                },
                "session": {
                  "dmScope": openclaw_session_dm_scope
                },
                "gateway": {
                  "mode": "local",
                  "bind": ("lan" if (openclaw_traefik_enabled | bool) else "loopback"),
                  "trustedProxies": openclaw_gateway_trusted_proxies,
                  "allowRealIpFallback": openclaw_gateway_allow_real_ip_fallback | bool
                }
              }
            | combine(
                (
                  {
                    "gateway": {
                      "auth": {
                        "rateLimit": {
                          "maxAttempts": openclaw_gateway_auth_rate_limit_max_attempts | int,
                          "windowMs": openclaw_gateway_auth_rate_limit_window_ms | int,
                          "lockoutMs": openclaw_gateway_auth_rate_limit_lockout_ms | int,
                          "exemptLoopback": openclaw_gateway_auth_rate_limit_exempt_loopback | bool
                        }
                      }
                    }
                  }
                  if (openclaw_gateway_auth_rate_limit_enabled | bool)
                  else {}
                ),
                recursive=True
              )
            | combine(
                (
                  {
                    "plugins": {
                      "allow": (
                        (
                          (_openclaw_existing_config.plugins.allow | default([]))
                          if ((_openclaw_existing_config.plugins | default({})) is mapping)
                          else []
                        )
                        + _openclaw_managed_plugin_allow
                      )
                      | map('string')
                      | map('trim')
                      | reject('equalto', '')
                      | unique
                      | list
                    }
                  }
                  if (_openclaw_managed_plugin_allow | length > 0)
                  else {}
                ),
                recursive=True
              )
            | combine(
                (
                  {
                    "gateway": {
                      "controlUi": {
                        "allowedOrigins": [("https://" ~ openclaw_traefik_host)]
                      }
                    }
                  }
                  if (openclaw_traefik_enabled | bool)
                  else {}
                ),
                recursive=True
              )
            | combine(
                (
                  {
                    "plugins": {
                      "load": {
                        "paths": (
                          (
                            (
                              (((_openclaw_existing_config.plugins | default({})).load | default({})).paths | default([]))
                              if (
                                (_openclaw_existing_config.plugins | default({})) is mapping
                                and (((_openclaw_existing_config.plugins | default({})).load | default({})) is mapping)
                              )
                              else []
                            )
                            + _openclaw_managed_plugin_load_paths
                          )
                          | map('string')
                          | map('trim')
                          | reject('equalto', '')
                          | unique
                          | list
                        )
                      }
                    }
                  }
                  if (_openclaw_managed_plugin_load_paths | length > 0)
                  else {}
                ),
                recursive=True
              )
            | combine(_openclaw_model_policy_patch | default({}), recursive=True)
            | combine(_openclaw_openai_auth_order_patch | default({}), recursive=True)
          }}

    - name: config | Merge runtime config patch
      ansible.builtin.set_fact:
        _openclaw_patched_config: "{{ _openclaw_existing_config | combine(_openclaw_runtime_patch, recursive=True) }}"

    - name: config | Persist runtime config patch
      ansible.builtin.copy:
        content: "{{ _openclaw_patched_config | to_nice_json }}\n"
        dest: "{{ openclaw_data_dir }}/openclaw.json"
        owner: "1000"
        group: "1000"
        mode: "{{ openclaw_gateway_config_mode }}"
      when: _openclaw_patched_config != _openclaw_existing_config
      notify: restart openclaw

- name: config | Normalize legacy Telegram streaming aliases
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import os
        import sys
        from pathlib import Path

        path = Path(sys.argv[1])
        valid_modes = {"off", "partial", "block", "progress"}
        changed = False

        def resolve_mode(value):
            if value is True:
                return "partial"
            if value is False:
                return "off"
            if isinstance(value, str):
                normalized = value.strip().lower()
                if normalized in valid_modes:
                    return normalized
            return "partial"

        def ensure_dict(value):
            return value if isinstance(value, dict) else {}

        def normalize_entry(entry):
            entry_changed = False
            if not isinstance(entry, dict):
                return False

            raw_streaming = entry.get("streaming")
            raw_stream_mode = entry.get("streamMode")
            streaming = ensure_dict(raw_streaming).copy()

            if raw_stream_mode is not None and "mode" not in streaming:
                streaming["mode"] = resolve_mode(raw_stream_mode)
                entry_changed = True
            elif raw_streaming is not None and not isinstance(raw_streaming, dict):
                streaming["mode"] = resolve_mode(raw_streaming)
                entry_changed = True

            if "streamMode" in entry:
                entry.pop("streamMode", None)
                entry_changed = True

            if "chunkMode" in entry and "chunkMode" not in streaming:
                streaming["chunkMode"] = entry.pop("chunkMode")
                entry_changed = True

            block = ensure_dict(streaming.get("block")).copy()
            if "blockStreaming" in entry and "enabled" not in block:
                block["enabled"] = entry.pop("blockStreaming")
                entry_changed = True
            if "blockStreamingCoalesce" in entry and "coalesce" not in block:
                block["coalesce"] = entry.pop("blockStreamingCoalesce")
                entry_changed = True
            if block:
                streaming["block"] = block

            preview = ensure_dict(streaming.get("preview")).copy()
            if "draftChunk" in entry and "chunk" not in preview:
                preview["chunk"] = entry.pop("draftChunk")
                entry_changed = True
            if preview:
                streaming["preview"] = preview

            if entry_changed:
                entry["streaming"] = streaming
            return entry_changed

        data = json.loads(path.read_text(encoding="utf-8"))
        telegram = ensure_dict(ensure_dict(data.get("channels")).get("telegram"))
        changed = normalize_entry(telegram) or changed

        accounts = ensure_dict(telegram.get("accounts"))
        for account in accounts.values():
            changed = normalize_entry(account) or changed

        if changed:
            path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
            os.chmod(path, int(sys.argv[2], 8))

        print(json.dumps({"changed": changed}))
      - "{{ openclaw_data_dir }}/openclaw.json"
      - "{{ openclaw_gateway_config_mode }}"
  register: _openclaw_telegram_streaming_normalize
  changed_when: >-
    (_openclaw_telegram_streaming_normalize.stdout | default('') | from_json).changed | default(false)
  notify: restart openclaw

- name: config | Render SOUL.md (system prompt)
  ansible.builtin.copy:
    content: "{{ openclaw_reply_system_prompt }}"
    dest: "{{ openclaw_agent_workspace_dir }}/SOUL.md"
    owner: "1000"
    group: "1000"
    mode: "0644"
  notify: restart openclaw
  when: openclaw_reply_system_prompt | length > 0

- name: config | Render USER.md (shared user profile)
  ansible.builtin.copy:
    content: "{{ openclaw_user_profile }}"
    dest: "{{ openclaw_agent_workspace_dir }}/USER.md"
    owner: "1000"
    group: "1000"
    mode: "0644"
  notify: restart openclaw
  when: openclaw_user_profile | length > 0
