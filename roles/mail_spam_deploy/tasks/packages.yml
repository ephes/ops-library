---
# Install rspamd packages

- name: packages | Ensure apt transport dependencies are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
    state: present
    update_cache: true

- name: packages | Ensure apt keyring directory exists
  ansible.builtin.file:
    path: "{{ mail_spam_rspamd_repo_keyring | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: packages | Install rspamd repository key
  ansible.builtin.get_url:
    url: "{{ mail_spam_rspamd_repo_key_url }}"
    dest: "{{ mail_spam_rspamd_repo_keyring }}"
    owner: root
    group: root
    mode: "0644"

- name: packages | Remove legacy unscoped rspamd repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/rspamd.list
    regexp: "^deb\\s+{{ mail_spam_rspamd_legacy_repo_url | regex_escape() }}\\s+{{ ansible_distribution_release }}\\s+main$"
    state: absent
  when: mail_spam_rspamd_legacy_repo_url != mail_spam_rspamd_repo_url

- name: packages | Add rspamd repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ mail_spam_rspamd_repo_keyring }}] {{ mail_spam_rspamd_repo_url }} {{ ansible_distribution_release }} main"
    state: present
    filename: rspamd

- name: packages | Check legacy rspamd apt-key entry
  ansible.builtin.command:
    cmd: apt-key list --keyid-format=long
  register: _mail_spam_rspamd_legacy_key_list
  changed_when: false
  failed_when: false
  when: mail_spam_rspamd_cleanup_legacy_key | bool

- name: packages | Remove legacy rspamd apt-key entry
  ansible.builtin.command:
    cmd: "apt-key del {{ mail_spam_rspamd_repo_legacy_key_id }}"
  when:
    - mail_spam_rspamd_cleanup_legacy_key | bool
    - _mail_spam_rspamd_legacy_key_list.stdout is search(mail_spam_rspamd_repo_legacy_key_id)

- name: packages | Install rspamd packages
  ansible.builtin.apt:
    name: "{{ mail_spam_packages }}"
    state: present
    update_cache: true

- name: packages | Ensure Redis is installed for rspamd
  ansible.builtin.apt:
    name: redis-server
    state: present
  when: mail_spam_install_redis | bool
