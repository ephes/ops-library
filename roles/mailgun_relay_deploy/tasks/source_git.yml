---
- name: source_git | Install git
  ansible.builtin.package:
    name: git
    state: present

- name: source_git | Clone or update mailgun-relay repository
  ansible.builtin.git:
    repo: "{{ mailgun_relay_git_repo }}"
    dest: "{{ mailgun_relay_site_path }}"
    version: "{{ mailgun_relay_git_version }}"
    force: true
  become: true
  become_user: "{{ mailgun_relay_user }}"
  notify:
    - restart mailgun-relay

- name: source_git | Ensure ownership for repository files
  ansible.builtin.file:
    path: "{{ mailgun_relay_site_path }}"
    owner: "{{ mailgun_relay_user }}"
    group: "{{ mailgun_relay_group }}"
    recurse: true
