---
- name: service | Render and enable systemd unit
  ansible.builtin.include_role:
    name: local.ops_library.webapp_deploy_internal
    tasks_from: systemd_service
  vars:
    webapp_deploy_internal_service_template_src: "templates/weeknotes-home.service.j2"
    webapp_deploy_internal_service_unit_dest: "{{ weeknotes_home_systemd_unit_path }}"
    webapp_deploy_internal_service_name: "{{ weeknotes_home_systemd_unit_name }}"
    webapp_deploy_internal_service_notify_handlers:
      - reload systemd
      - restart weeknotes home
