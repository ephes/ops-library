---
- name: reload traefik
  ansible.builtin.service:
    name: traefik
    state: reloaded
  failed_when: false
  register: voxhelm_ingress_traefik_reload

- name: warn when Traefik reload failed
  ansible.builtin.debug:
    msg: "Traefik reload failed (rc={{ voxhelm_ingress_traefik_reload.rc | default('n/a') }}). Check Traefik logs and dynamic config."
  when: (voxhelm_ingress_traefik_reload.rc | default(0)) != 0

- name: restart traefik when reload unsupported
  ansible.builtin.service:
    name: traefik
    state: restarted
  when:
    - voxhelm_ingress_traefik_reload.rc is defined
    - voxhelm_ingress_traefik_reload.rc != 0
