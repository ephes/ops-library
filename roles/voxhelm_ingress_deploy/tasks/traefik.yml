---
- name: traefik | Ensure Traefik dynamic config directory exists
  ansible.builtin.file:
    path: "{{ voxhelm_ingress_traefik_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: traefik | Render Traefik configuration for Voxhelm ingress
  ansible.builtin.template:
    src: voxhelm-traefik.yml.j2
    dest: "{{ voxhelm_ingress_traefik_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: reload traefik
