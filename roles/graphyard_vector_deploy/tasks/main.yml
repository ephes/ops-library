---
- name: Skip graphyard_vector_deploy when disabled
  ansible.builtin.debug:
    msg: "graphyard_vector_deploy skipped (graphyard_vector_enabled=false)."
  when: not graphyard_vector_enabled | bool

- name: Deploy Vector producer for Graphyard ingest
  when: graphyard_vector_enabled | bool
  block:
    - name: Validate required Graphyard ingest variables
      ansible.builtin.assert:
        that:
          - graphyard_vector_ingest_url is defined
          - graphyard_vector_ingest_url | length > 0
          - graphyard_vector_ingest_url != "CHANGEME"
          - graphyard_vector_ingest_token is defined
          - graphyard_vector_ingest_token | length > 0
          - graphyard_vector_ingest_token != "CHANGEME"
          - graphyard_vector_host_id is defined
          - graphyard_vector_host_id | length > 0
          - graphyard_vector_service_id is defined
          - graphyard_vector_service_id | length > 0
          - graphyard_vector_collectors | length > 0
          - graphyard_vector_metric_prefixes | length > 0
        fail_msg: |
          Missing required graphyard_vector_* configuration.

          Required:
          - graphyard_vector_ingest_url (non-empty, not CHANGEME)
          - graphyard_vector_ingest_token (non-empty, not CHANGEME)
          - graphyard_vector_host_id
          - graphyard_vector_service_id
          - graphyard_vector_collectors
          - graphyard_vector_metric_prefixes

    - name: Validate Graphyard Vector platform settings
      ansible.builtin.assert:
        that:
          - graphyard_vector_install_method in ['apt', 'homebrew']
          - graphyard_vector_service_manager in ['systemd', 'launchd']
          - not (graphyard_vector_install_method == 'homebrew' and ansible_facts['os_family'] != 'Darwin')
          - not (graphyard_vector_service_manager == 'launchd' and ansible_facts['os_family'] != 'Darwin')
        fail_msg: >-
          graphyard_vector_install_method/service_manager are invalid for this host.
          Use apt+systemd on Linux or homebrew+launchd on Darwin.

    - name: Validate Homebrew user when running as root on Darwin
      ansible.builtin.assert:
        that:
          - graphyard_vector_brew_user | length > 0
        fail_msg: >-
          graphyard_vector_brew_user must be set when Ansible connects as root on Darwin
          because Homebrew refuses to run as root.
      when:
        - ansible_facts['os_family'] == 'Darwin'
        - graphyard_vector_install_method == 'homebrew'
        - ansible_user_id == 'root'

    - name: Install Vector package prerequisites
      ansible.builtin.include_role:
        name: local.ops_library.vector_apt_install
      vars:
        vector_apt_install_package_name: "{{ graphyard_vector_package_name }}"
        vector_apt_install_repo_url: "{{ graphyard_vector_repo_url }}"
        vector_apt_install_repo_channel: "{{ graphyard_vector_repo_channel }}"
        vector_apt_install_repo_version: "{{ graphyard_vector_repo_version }}"
        vector_apt_install_repo_key_url: "{{ graphyard_vector_repo_key_url }}"
        vector_apt_install_repo_key_tmp: "{{ graphyard_vector_repo_key_tmp }}"
        vector_apt_install_repo_keyring_path: "{{ graphyard_vector_repo_keyring_path }}"
        vector_apt_install_repo_list_file: "{{ graphyard_vector_repo_list_file }}"
      when: graphyard_vector_install_method == 'apt'

    - name: Resolve Homebrew path when not provided
      when:
        - graphyard_vector_install_method == 'homebrew'
        - graphyard_vector_brew_bin | length == 0
      block:
        - name: Check Homebrew at /opt/homebrew/bin/brew
          ansible.builtin.stat:
            path: /opt/homebrew/bin/brew
          register: graphyard_vector_brew_opt

        - name: Check Homebrew at /usr/local/bin/brew
          ansible.builtin.stat:
            path: /usr/local/bin/brew
          register: graphyard_vector_brew_usr

        - name: Set resolved Homebrew binary
          ansible.builtin.set_fact:
            graphyard_vector_brew_bin_resolved: >-
              {{
                (graphyard_vector_brew_opt.stat.exists | default(false))
                | ternary('/opt/homebrew/bin/brew',
                  (graphyard_vector_brew_usr.stat.exists | default(false))
                  | ternary('/usr/local/bin/brew', '')
                )
              }}

    - name: Use provided Homebrew binary path
      ansible.builtin.set_fact:
        graphyard_vector_brew_bin_resolved: "{{ graphyard_vector_brew_bin }}"
      when:
        - graphyard_vector_install_method == 'homebrew'
        - graphyard_vector_brew_bin | length > 0

    - name: Validate Homebrew binary path
      ansible.builtin.assert:
        that:
          - graphyard_vector_brew_bin_resolved is defined
          - graphyard_vector_brew_bin_resolved | length > 0
        fail_msg: "Homebrew binary not found. Set graphyard_vector_brew_bin to the brew path."
      when: graphyard_vector_install_method == 'homebrew'

    - name: Update Homebrew metadata when requested
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} update"
      register: graphyard_vector_brew_update_cmd
      changed_when: >-
        graphyard_vector_brew_update_cmd.rc == 0 and
        'Already up-to-date.' not in
        ((graphyard_vector_brew_update_cmd.stdout | default('')) ~ '\n' ~
        (graphyard_vector_brew_update_cmd.stderr | default('')))
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when:
        - graphyard_vector_install_method == 'homebrew'
        - graphyard_vector_brew_update | bool

    - name: List configured Homebrew taps
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} tap"
      register: graphyard_vector_brew_taps
      changed_when: false
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when: graphyard_vector_install_method == 'homebrew'

    - name: Add Vector Homebrew tap
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} tap vectordotdev/brew"
      register: graphyard_vector_brew_tap_add
      changed_when: graphyard_vector_brew_tap_add.rc == 0
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when:
        - graphyard_vector_install_method == 'homebrew'
        - "'vectordotdev/brew' not in (graphyard_vector_brew_taps.stdout_lines | default([]))"

    - name: Check whether Vector is already installed via Homebrew
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} list --versions {{ graphyard_vector_brew_package }}"
      register: graphyard_vector_brew_list
      changed_when: false
      failed_when: false
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when: graphyard_vector_install_method == 'homebrew'

    - name: Install Vector via Homebrew on Darwin
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} install {{ graphyard_vector_brew_package }}"
      register: graphyard_vector_brew_install
      changed_when: graphyard_vector_brew_install.rc == 0
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when:
        - graphyard_vector_install_method == 'homebrew'
        - graphyard_vector_brew_list.rc != 0 or (graphyard_vector_brew_list.stdout | trim) == ""

    - name: List Homebrew service status
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} services list"
      register: graphyard_vector_brew_services
      changed_when: false
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when:
        - graphyard_vector_install_method == 'homebrew'
        - graphyard_vector_disable_brew_service | bool

    - name: Stop Homebrew-managed Vector service to avoid duplicate producers
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} services stop {{ graphyard_vector_brew_service_name }}"
      register: graphyard_vector_brew_service_stop
      changed_when: graphyard_vector_brew_service_stop.rc == 0
      failed_when: false
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when:
        - graphyard_vector_install_method == 'homebrew'
        - graphyard_vector_disable_brew_service | bool
        - graphyard_vector_brew_service_status not in ['', 'none', 'stopped']
      vars:
        graphyard_vector_brew_service_status: >-
          {{
            (
              graphyard_vector_brew_services.stdout_lines | default([])
              | select('match', '^' ~ graphyard_vector_brew_service_name ~ '\\s+')
              | map(
                  'regex_replace',
                  '^' ~ graphyard_vector_brew_service_name ~ '\\s+([^\\s]+).*$',
                  '\\1'
                )
              | list
              | first
            ) | default('')
          }}

    - name: Resolve Homebrew prefix
      ansible.builtin.command: "{{ graphyard_vector_brew_bin_resolved }} --prefix"
      register: graphyard_vector_brew_prefix_cmd
      changed_when: false
      become: "{{ graphyard_vector_brew_user | length > 0 }}"
      become_user: "{{ graphyard_vector_brew_user | default(omit) }}"
      become_flags: "-i"
      when: graphyard_vector_install_method == 'homebrew'

    - name: Set Vector binary path for Darwin
      ansible.builtin.set_fact:
        graphyard_vector_binary_path_resolved: >-
          {{
            (graphyard_vector_binary_path | length > 0)
            | ternary(graphyard_vector_binary_path, graphyard_vector_brew_prefix_cmd.stdout ~ '/bin/vector')
          }}
      when: graphyard_vector_install_method == 'homebrew'

    - name: Set Vector binary path for apt/systemd hosts
      ansible.builtin.set_fact:
        graphyard_vector_binary_path_resolved: >-
          {{ (graphyard_vector_binary_path | length > 0) | ternary(graphyard_vector_binary_path, 'vector') }}
      when: graphyard_vector_install_method == 'apt'

    - name: Ensure Vector data directory exists
      ansible.builtin.file:
        path: "{{ graphyard_vector_data_dir }}"
        state: directory
        owner: "{{ graphyard_vector_runtime_user }}"
        group: "{{ graphyard_vector_runtime_group }}"
        mode: "0750"

    - name: Ensure Vector config directory exists
      ansible.builtin.file:
        path: "{{ graphyard_vector_config_dir }}"
        state: directory
        owner: root
        group: "{{ graphyard_vector_runtime_group }}"
        mode: "0750"

    - name: Ensure Vector reads config fragments from config directory
      ansible.builtin.lineinfile:
        path: "{{ graphyard_vector_env_file }}"
        regexp: '^VECTOR_CONFIG_DIR='
        line: "VECTOR_CONFIG_DIR={{ graphyard_vector_config_dir }}"
        create: true
        owner: root
        group: root
        mode: "0644"
      notify: Restart Graphyard Vector Service
      when: graphyard_vector_service_manager == 'systemd'

    - name: Ensure launchd log directory exists
      ansible.builtin.file:
        path: "{{ graphyard_vector_log_dir }}"
        state: directory
        owner: root
        group: wheel
        mode: "0755"
      when: graphyard_vector_service_manager == 'launchd'

    - name: Render newsyslog rotation config for Graphyard Vector logs
      ansible.builtin.template:
        src: vector.newsyslog.conf.j2
        dest: "{{ graphyard_vector_newsyslog_conf_path }}"
        owner: root
        group: wheel
        mode: "0644"
      when:
        - graphyard_vector_service_manager == 'launchd'
        - graphyard_vector_log_rotation_enabled | bool

    - name: Render launchd plist for Graphyard Vector
      ansible.builtin.template:
        src: vector.launchd.plist.j2
        dest: "{{ graphyard_vector_launchd_plist_path }}"
        owner: root
        group: wheel
        mode: "0644"
      register: graphyard_vector_launchd_plist
      when: graphyard_vector_service_manager == 'launchd'

    - name: Reload launchd service when plist changes
      ansible.builtin.command: "launchctl bootout system {{ graphyard_vector_launchd_plist_path }}"
      changed_when: false
      failed_when: false
      when:
        - graphyard_vector_service_manager == 'launchd'
        - graphyard_vector_launchd_plist is changed

    - name: Bootstrap launchd service when plist changes
      ansible.builtin.command: "launchctl bootstrap system {{ graphyard_vector_launchd_plist_path }}"
      register: graphyard_vector_launchd_bootstrap
      changed_when: graphyard_vector_launchd_bootstrap.rc == 0
      when:
        - graphyard_vector_service_manager == 'launchd'
        - graphyard_vector_launchd_plist is changed

    - name: Enable launchd service when plist changes
      ansible.builtin.command: "launchctl enable system/{{ graphyard_vector_launchd_label }}"
      register: graphyard_vector_launchd_enable
      changed_when: graphyard_vector_launchd_enable.rc == 0
      when:
        - graphyard_vector_service_manager == 'launchd'
        - graphyard_vector_launchd_plist is changed

    - name: Check existing shared Vector global config
      ansible.builtin.stat:
        path: "{{ graphyard_vector_global_config_path }}"
      register: graphyard_vector_global_config_stat

    - name: Read existing shared Vector global config
      ansible.builtin.slurp:
        path: "{{ graphyard_vector_global_config_path }}"
      register: graphyard_vector_global_config_raw
      when: graphyard_vector_global_config_stat.stat.exists

    - name: Assert shared Vector global config matches requested data directory
      ansible.builtin.assert:
        that:
          - existing_graphyard_vector_global_data_dir == graphyard_vector_data_dir
        fail_msg: >-
          Existing shared Vector global config uses data_dir={{ existing_graphyard_vector_global_data_dir }},
          but graphyard_vector_data_dir={{ graphyard_vector_data_dir }}. Align the shared Vector data_dir
          before deploying.
      vars:
        existing_graphyard_vector_global_data_dir: >-
          {{
            ((graphyard_vector_global_config_raw.content | b64decode | from_yaml).data_dir
            | default(graphyard_vector_data_dir, true))
            if graphyard_vector_global_config_stat.stat.exists
            else graphyard_vector_data_dir
          }}

    - name: Remove legacy monolithic Vector config
      ansible.builtin.file:
        path: "/etc/vector/vector.yaml"
        state: absent

    - name: Stage and validate Graphyard Vector config fragment
      block:
        - name: Create temporary Vector validation directory
          ansible.builtin.tempfile:
            state: directory
            prefix: graphyard-vector-validate-
          register: graphyard_vector_validation_dir

        - name: Find existing Vector config fragments
          ansible.builtin.find:
            paths: "{{ graphyard_vector_config_dir }}"
            file_type: file
            patterns:
              - "*.yaml"
              - "*.yml"
              - "*.toml"
              - "*.json"
          register: graphyard_vector_existing_configs

        - name: Copy existing Vector config fragments into validation directory
          ansible.builtin.copy:
            remote_src: true
            src: "{{ item.path }}"
            dest: "{{ graphyard_vector_validation_dir.path }}/{{ item.path | basename }}"
            owner: root
            group: "{{ graphyard_vector_validation_group }}"
            mode: "0644"
          loop: "{{ graphyard_vector_existing_configs.files }}"
          when:
            - item.path != graphyard_vector_config_path
            - item.path != graphyard_vector_global_config_path

        - name: Render candidate shared Vector global config
          ansible.builtin.copy:
            dest: "{{ graphyard_vector_validation_dir.path }}/{{ graphyard_vector_global_config_path | basename }}"
            content: |
              data_dir: {{ graphyard_vector_data_dir | to_json }}
            owner: root
            group: "{{ graphyard_vector_validation_group }}"
            mode: "0644"

        - name: Render candidate Graphyard Vector fragment
          ansible.builtin.template:
            src: vector.yaml.j2
            dest: "{{ graphyard_vector_validation_dir.path }}/{{ graphyard_vector_config_path | basename }}"
            owner: root
            group: "{{ graphyard_vector_validation_group }}"
            mode: "0644"

        - name: Validate staged Vector configuration directory
          ansible.builtin.command:
            argv:
              - "{{ graphyard_vector_binary_path_resolved }}"
              - validate
              - --config-dir
              - "{{ graphyard_vector_validation_dir.path }}"
          changed_when: false

        - name: Deploy shared Vector global config
          ansible.builtin.copy:
            dest: "{{ graphyard_vector_global_config_path }}"
            content: |
              data_dir: {{ graphyard_vector_data_dir | to_json }}
            owner: root
            group: "{{ graphyard_vector_runtime_group }}"
            mode: "0640"
          notify: Restart Graphyard Vector Service

        - name: Deploy Vector config fragment for Graphyard ingest
          ansible.builtin.template:
            src: vector.yaml.j2
            dest: "{{ graphyard_vector_config_path }}"
            owner: root
            group: "{{ graphyard_vector_runtime_group }}"
            mode: "0640"
          notify: Restart Graphyard Vector Service
      always:
        - name: Clean up temporary Vector validation directory
          ansible.builtin.file:
            path: "{{ graphyard_vector_validation_dir.path }}"
            state: absent
          when: graphyard_vector_validation_dir is defined and graphyard_vector_validation_dir.path is defined

    - name: Flush Vector restart handler
      ansible.builtin.meta: flush_handlers

    - name: Ensure Vector service is enabled and running
      ansible.builtin.systemd:
        name: "{{ graphyard_vector_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
      when: graphyard_vector_service_manager == 'systemd'

    - name: Check launchd service status
      ansible.builtin.command: "launchctl print system/{{ graphyard_vector_launchd_label }}"
      register: graphyard_vector_launchd_status
      changed_when: false
      failed_when: false
      when: graphyard_vector_service_manager == 'launchd'

    - name: Bootstrap launchd service when not loaded
      ansible.builtin.command: "launchctl bootstrap system {{ graphyard_vector_launchd_plist_path }}"
      register: graphyard_vector_launchd_bootstrap_missing
      changed_when: graphyard_vector_launchd_bootstrap_missing.rc == 0
      when:
        - graphyard_vector_service_manager == 'launchd'
        - graphyard_vector_launchd_status.rc != 0

    - name: Enable launchd service when not loaded
      ansible.builtin.command: "launchctl enable system/{{ graphyard_vector_launchd_label }}"
      register: graphyard_vector_launchd_enable_missing
      changed_when: graphyard_vector_launchd_enable_missing.rc == 0
      when:
        - graphyard_vector_service_manager == 'launchd'
        - graphyard_vector_launchd_status.rc != 0

    - name: Kickstart launchd service when not running
      ansible.builtin.command: "launchctl kickstart -k system/{{ graphyard_vector_launchd_label }}"
      register: graphyard_vector_launchd_kickstart_missing
      changed_when: graphyard_vector_launchd_kickstart_missing.rc == 0
      when:
        - graphyard_vector_service_manager == 'launchd'
        - graphyard_vector_launchd_status.rc != 0 or 'state = running' not in (graphyard_vector_launchd_status.stdout | default(''))
