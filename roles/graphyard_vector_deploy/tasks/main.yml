---
- name: Skip graphyard_vector_deploy when disabled
  ansible.builtin.debug:
    msg: "graphyard_vector_deploy skipped (graphyard_vector_enabled=false)."
  when: not graphyard_vector_enabled | bool

- name: Deploy Vector producer for Graphyard ingest
  when: graphyard_vector_enabled | bool
  block:
    - name: Validate required Graphyard ingest variables
      ansible.builtin.assert:
        that:
          - graphyard_vector_ingest_url is defined
          - graphyard_vector_ingest_url | length > 0
          - graphyard_vector_ingest_url != "CHANGEME"
          - graphyard_vector_ingest_token is defined
          - graphyard_vector_ingest_token | length > 0
          - graphyard_vector_ingest_token != "CHANGEME"
          - graphyard_vector_host_id is defined
          - graphyard_vector_host_id | length > 0
          - graphyard_vector_service_id is defined
          - graphyard_vector_service_id | length > 0
          - graphyard_vector_collectors | length > 0
          - graphyard_vector_metric_prefixes | length > 0
        fail_msg: |
          Missing required graphyard_vector_* configuration.

          Required:
          - graphyard_vector_ingest_url (non-empty, not CHANGEME)
          - graphyard_vector_ingest_token (non-empty, not CHANGEME)
          - graphyard_vector_host_id
          - graphyard_vector_service_id
          - graphyard_vector_collectors
          - graphyard_vector_metric_prefixes

    - name: Install Vector package prerequisites
      ansible.builtin.include_role:
        name: local.ops_library.vector_apt_install
      vars:
        vector_apt_install_package_name: "{{ graphyard_vector_package_name }}"
        vector_apt_install_repo_url: "{{ graphyard_vector_repo_url }}"
        vector_apt_install_repo_channel: "{{ graphyard_vector_repo_channel }}"
        vector_apt_install_repo_version: "{{ graphyard_vector_repo_version }}"
        vector_apt_install_repo_key_url: "{{ graphyard_vector_repo_key_url }}"
        vector_apt_install_repo_key_tmp: "{{ graphyard_vector_repo_key_tmp }}"
        vector_apt_install_repo_keyring_path: "{{ graphyard_vector_repo_keyring_path }}"
        vector_apt_install_repo_list_file: "{{ graphyard_vector_repo_list_file }}"

    - name: Ensure Vector data directory exists
      ansible.builtin.file:
        path: "{{ graphyard_vector_data_dir }}"
        state: directory
        owner: vector
        group: vector
        mode: "0750"

    - name: Ensure Vector config directory exists
      ansible.builtin.file:
        path: "{{ graphyard_vector_config_dir }}"
        state: directory
        owner: root
        group: vector
        mode: "0750"

    - name: Ensure Vector reads config fragments from config directory
      ansible.builtin.lineinfile:
        path: "{{ graphyard_vector_env_file }}"
        regexp: '^VECTOR_CONFIG_DIR='
        line: "VECTOR_CONFIG_DIR={{ graphyard_vector_config_dir }}"
        create: true
        owner: root
        group: root
        mode: "0644"
      notify: Restart Graphyard Vector Service

    - name: Check existing shared Vector global config
      ansible.builtin.stat:
        path: "{{ graphyard_vector_global_config_path }}"
      register: graphyard_vector_global_config_stat

    - name: Read existing shared Vector global config
      ansible.builtin.slurp:
        path: "{{ graphyard_vector_global_config_path }}"
      register: graphyard_vector_global_config_raw
      when: graphyard_vector_global_config_stat.stat.exists

    - name: Assert shared Vector global config matches requested data directory
      ansible.builtin.assert:
        that:
          - existing_graphyard_vector_global_data_dir == graphyard_vector_data_dir
        fail_msg: >-
          Existing shared Vector global config uses data_dir={{ existing_graphyard_vector_global_data_dir }},
          but graphyard_vector_data_dir={{ graphyard_vector_data_dir }}. Align the shared Vector data_dir
          before deploying.
      vars:
        existing_graphyard_vector_global_data_dir: >-
          {{
            ((graphyard_vector_global_config_raw.content | b64decode | from_yaml).data_dir
            | default(graphyard_vector_data_dir, true))
            if graphyard_vector_global_config_stat.stat.exists
            else graphyard_vector_data_dir
          }}

    - name: Remove legacy monolithic Vector config
      ansible.builtin.file:
        path: "/etc/vector/vector.yaml"
        state: absent

    - name: Stage and validate Graphyard Vector config fragment
      block:
        - name: Create temporary Vector validation directory
          ansible.builtin.tempfile:
            state: directory
            prefix: graphyard-vector-validate-
          register: graphyard_vector_validation_dir

        - name: Find existing Vector config fragments
          ansible.builtin.find:
            paths: "{{ graphyard_vector_config_dir }}"
            file_type: file
            patterns:
              - "*.yaml"
              - "*.yml"
              - "*.toml"
              - "*.json"
          register: graphyard_vector_existing_configs

        - name: Copy existing Vector config fragments into validation directory
          ansible.builtin.copy:
            remote_src: true
            src: "{{ item.path }}"
            dest: "{{ graphyard_vector_validation_dir.path }}/{{ item.path | basename }}"
            owner: root
            group: root
            mode: "0644"
          loop: "{{ graphyard_vector_existing_configs.files }}"
          when:
            - item.path != graphyard_vector_config_path
            - item.path != graphyard_vector_global_config_path

        - name: Render candidate shared Vector global config
          ansible.builtin.copy:
            dest: "{{ graphyard_vector_validation_dir.path }}/{{ graphyard_vector_global_config_path | basename }}"
            content: |
              data_dir: {{ graphyard_vector_data_dir | to_json }}
            owner: root
            group: root
            mode: "0644"

        - name: Render candidate Graphyard Vector fragment
          ansible.builtin.template:
            src: vector.yaml.j2
            dest: "{{ graphyard_vector_validation_dir.path }}/{{ graphyard_vector_config_path | basename }}"
            owner: root
            group: root
            mode: "0644"

        - name: Validate staged Vector configuration directory
          ansible.builtin.command:
            argv:
              - vector
              - validate
              - --config-dir
              - "{{ graphyard_vector_validation_dir.path }}"
          changed_when: false

        - name: Deploy shared Vector global config
          ansible.builtin.copy:
            dest: "{{ graphyard_vector_global_config_path }}"
            content: |
              data_dir: {{ graphyard_vector_data_dir | to_json }}
            owner: root
            group: vector
            mode: "0640"
          notify: Restart Graphyard Vector Service

        - name: Deploy Vector config fragment for Graphyard ingest
          ansible.builtin.template:
            src: vector.yaml.j2
            dest: "{{ graphyard_vector_config_path }}"
            owner: root
            group: vector
            mode: "0640"
          notify: Restart Graphyard Vector Service
      always:
        - name: Clean up temporary Vector validation directory
          ansible.builtin.file:
            path: "{{ graphyard_vector_validation_dir.path }}"
            state: absent
          when: graphyard_vector_validation_dir is defined and graphyard_vector_validation_dir.path is defined

    - name: Flush Vector restart handler
      ansible.builtin.meta: flush_handlers

    - name: Ensure Vector service is enabled and running
      ansible.builtin.systemd:
        name: "{{ graphyard_vector_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
