---
- name: Skip graphyard_vector_deploy when disabled
  ansible.builtin.debug:
    msg: "graphyard_vector_deploy skipped (graphyard_vector_enabled=false)."
  when: not graphyard_vector_enabled | bool

- name: Deploy Vector producer for Graphyard ingest
  when: graphyard_vector_enabled | bool
  block:
    - name: Validate required Graphyard ingest variables
      ansible.builtin.assert:
        that:
          - graphyard_vector_ingest_url is defined
          - graphyard_vector_ingest_url | length > 0
          - graphyard_vector_ingest_url != "CHANGEME"
          - graphyard_vector_ingest_token is defined
          - graphyard_vector_ingest_token | length > 0
          - graphyard_vector_ingest_token != "CHANGEME"
          - graphyard_vector_host_id is defined
          - graphyard_vector_host_id | length > 0
          - graphyard_vector_service_id is defined
          - graphyard_vector_service_id | length > 0
          - graphyard_vector_collectors | length > 0
          - graphyard_vector_metric_prefixes | length > 0
        fail_msg: |
          Missing required graphyard_vector_* configuration.

          Required:
          - graphyard_vector_ingest_url (non-empty, not CHANGEME)
          - graphyard_vector_ingest_token (non-empty, not CHANGEME)
          - graphyard_vector_host_id
          - graphyard_vector_service_id
          - graphyard_vector_collectors
          - graphyard_vector_metric_prefixes

    - name: Install apt prerequisites for Vector repository
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Ensure Vector keyring parent directory exists
      ansible.builtin.file:
        path: "{{ graphyard_vector_repo_keyring_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Vector repository key
      ansible.builtin.get_url:
        url: "{{ graphyard_vector_repo_key_url }}"
        dest: "{{ graphyard_vector_repo_key_tmp }}"
        owner: root
        group: root
        mode: "0644"
      register: _vector_repo_key

    - name: Check existing Vector apt keyring
      ansible.builtin.stat:
        path: "{{ graphyard_vector_repo_keyring_path }}"
      register: _vector_repo_keyring

    - name: Convert repository key to apt keyring format
      ansible.builtin.command:
        argv:
          - gpg
          - --dearmor
          - --yes
          - --output
          - "{{ graphyard_vector_repo_keyring_path }}"
          - "{{ graphyard_vector_repo_key_tmp }}"
      when: _vector_repo_key.changed or not _vector_repo_keyring.stat.exists

    - name: Ensure apt can read Vector keyring
      ansible.builtin.file:
        path: "{{ graphyard_vector_repo_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Add Vector apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by={{ graphyard_vector_repo_keyring_path }}] {{ graphyard_vector_repo_url }} {{ graphyard_vector_repo_channel }} {{ graphyard_vector_repo_version }}"
        filename: "{{ graphyard_vector_repo_list_file | basename | regex_replace('\\.list$', '') }}"
        state: present
      register: _vector_repo

    - name: Install Vector package
      ansible.builtin.apt:
        name: "{{ graphyard_vector_package_name }}"
        state: present
        update_cache: "{{ _vector_repo.changed or _vector_repo_key.changed }}"

    - name: Ensure Vector data directory exists
      ansible.builtin.file:
        path: "{{ graphyard_vector_data_dir }}"
        state: directory
        owner: vector
        group: vector
        mode: "0750"

    - name: Deploy Vector config for Graphyard ingest
      ansible.builtin.template:
        src: vector.yaml.j2
        dest: "{{ graphyard_vector_config_path }}"
        owner: root
        group: vector
        mode: "0640"
      notify: Restart Vector

    - name: Validate Vector configuration
      ansible.builtin.command:
        argv:
          - vector
          - validate
          - "{{ graphyard_vector_config_path }}"
      changed_when: false

    - name: Flush Vector restart handler
      ansible.builtin.meta: flush_handlers

    - name: Ensure Vector service is enabled and running
      ansible.builtin.systemd:
        name: "{{ graphyard_vector_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
