---
# graphyard_ingress_deploy defaults

graphyard_ingress_enabled: false

# Traefik dynamic config
graphyard_ingress_traefik_config_path: "/etc/traefik/dynamic/graphyard.yml"
graphyard_ingress_traefik_cert_resolver: ""  # empty -> use file-provider certs
graphyard_ingress_traefik_service_name: "traefik"

# Public hosts (IDN domains must be punycode in Traefik config)
graphyard_ingress_graphyard_host: "graphyard.example.com"
graphyard_ingress_grafana_host: "grafana.example.com"

# Local backends (keep ingest path local for Vector -> Graphyard)
graphyard_ingress_graphyard_backend_url: "http://127.0.0.1:8051"
graphyard_ingress_grafana_backend_url: "http://127.0.0.1:3300"

# Optional extra Traefik middlewares to append per router
graphyard_ingress_graphyard_middlewares: []
graphyard_ingress_grafana_middlewares: []

# Traefik dual-router authentication (same pattern as protected services)
graphyard_ingress_basic_auth_enabled: true
graphyard_ingress_basic_auth_user: "admin"
# REQUIRED when basic auth enabled (provide via ops-control secrets)
# graphyard_ingress_basic_auth_password: "CHANGEME"

# Internal networks (LAN + Tailscale) bypass Traefik basic auth
graphyard_ingress_internal_ip_ranges:
  - "192.168.0.0/16"       # RFC1918 private
  - "10.0.0.0/8"           # RFC1918 private
  - "172.16.0.0/12"        # RFC1918 private
  - "100.64.0.0/10"        # Tailscale CGNAT
  - "fd7a:115c:a1e0::/48"  # Tailscale IPv6
  - "fd50:3e45:c454:0::/64" # ULA IPv6

# Graphyard Django environment file management
graphyard_ingress_manage_graphyard_env: true
graphyard_ingress_env_path: "/etc/graphyard/graphyard.env"
graphyard_ingress_require_env_file: true
graphyard_ingress_graphyard_web_service_name: "graphyard-web"
graphyard_ingress_graphyard_agent_service_name: "graphyard-agent"

graphyard_ingress_django_allowed_hosts:
  - "127.0.0.1"
  - "localhost"
  - "{{ graphyard_ingress_graphyard_host }}"

graphyard_ingress_django_csrf_trusted_origins:
  - "http://127.0.0.1"
  - "http://localhost"
  - "https://{{ graphyard_ingress_graphyard_host }}"

# Optional: manage Django admin URL path (for example "admin/" or "hidden_admin/")
graphyard_ingress_django_admin_url: ""

# Used by Graphyard UI to build Grafana links
graphyard_ingress_grafana_public_url: "https://{{ graphyard_ingress_grafana_host }}"
