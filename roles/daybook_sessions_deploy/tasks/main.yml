---
- name: validate | Ensure Daybook sessions target is macOS
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Darwin'
    fail_msg: "daybook_sessions_deploy only supports macOS targets."
  when: daybook_sessions_enabled | bool

- name: validate | Ensure required Daybook sessions variables are configured
  ansible.builtin.assert:
    that:
      - daybook_sessions_service_user | string | trim | length > 0
      - daybook_sessions_service_user != "CHANGEME"
      - daybook_sessions_service_group | string | trim | length > 0
      - daybook_sessions_service_home | string | trim | length > 0
      - daybook_sessions_repo_url | string | trim | length > 0
      - daybook_sessions_repo_ref | string | trim | length > 0
      - daybook_sessions_repo_ref != "CHANGEME"
      - daybook_sessions_repo_update | type_debug == 'bool'
      - daybook_sessions_repo_update or (daybook_sessions_repo_ref | string | regex_search('^[0-9a-fA-F]{40}$')) is not none
      - daybook_sessions_checkout_path | string | trim | length > 0
      - daybook_sessions_config_dir | string | trim | length > 0
      - daybook_sessions_env_file | string | trim | length > 0
      - daybook_sessions_launcher_path | string | trim | length > 0
      - daybook_sessions_log_dir | string | trim | length > 0
      - daybook_sessions_stdout_log | string | trim | length > 0
      - daybook_sessions_stderr_log | string | trim | length > 0
      - daybook_sessions_state_path | string | trim | length > 0
      - daybook_sessions_uv_install_dir | string | trim | length > 0
      - daybook_sessions_uv_bin | string | trim | length > 0
      - daybook_sessions_python_version | string | trim | length > 0
      - daybook_sessions_uv_sync_args is sequence
      - daybook_sessions_uv_sync_args is not string
      - daybook_sessions_launchd_label | string | trim | length > 0
      - daybook_sessions_launchd_scope in ['system', 'user']
      - daybook_sessions_launchd_plist_path | string | trim | length > 0
      - daybook_sessions_schedule_interval_seconds | int > 0
      - daybook_sessions_launchd_path | string | trim | length > 0
      - daybook_archive_quote_classifier_enabled | type_debug == 'bool'
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_launchd_label | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_launchd_plist_path | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_launcher_path | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_env_file | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_stdout_log | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_stderr_log | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_throttle_interval_seconds | int > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_throttle_interval_seconds | int <= 3600
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_start_calendar is sequence
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_start_calendar is not string
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_start_calendar | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_since_days | int > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_limit | int > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_state | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_cmd | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_cmd != "CHANGEME"
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_probe_enabled | type_debug == 'bool'
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_probe_prompt | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_quote_classifier_probe_timeout_seconds | int > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_url | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_url != "CHANGEME"
      - not daybook_archive_quote_classifier_enabled or daybook_archive_token | string | trim | length > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_token != "CHANGEME"
      - daybook_quotes_enabled | type_debug == 'bool'
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quotes_unused_path | string | trim | length > 0
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quotes_unused_path != "CHANGEME"
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quotes_used_path | string | trim | length > 0
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quotes_used_path != "CHANGEME"
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quote_lifecycle_state | string | trim | length > 0
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quote_lifecycle_state != "CHANGEME"
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quotes_unused_path != daybook_quotes_used_path
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quote_lifecycle_state != daybook_quotes_unused_path
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or daybook_quote_lifecycle_state != daybook_quotes_used_path
      - >-
        not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled)
        or (daybook_quotes_unused_path | string | regex_search('^(?:s3://[a-z0-9](?:[a-z0-9.-]{1,61}[a-z0-9])?)?/[A-Za-z0-9_ .-]+(?:/[A-Za-z0-9_ .-]+)*[.]md$')) is not none
      - >-
        not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled)
        or (daybook_quotes_used_path | string | regex_search('^(?:s3://[a-z0-9](?:[a-z0-9.-]{1,61}[a-z0-9])?)?/[A-Za-z0-9_ .-]+(?:/[A-Za-z0-9_ .-]+)*[.]md$')) is not none
      - >-
        not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled)
        or (daybook_quote_lifecycle_state | string | regex_search('^(?:s3://[a-z0-9](?:[a-z0-9.-]{1,61}[a-z0-9])?)?/[A-Za-z0-9_ .-]+(?:/[A-Za-z0-9_ .-]+)*[.]json$')) is not none
      - >-
        not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled)
        or (
          (
            (daybook_quotes_unused_path | string).startswith('s3://')
            and (daybook_quotes_used_path | string).startswith('s3://')
            and (daybook_quote_lifecycle_state | string).startswith('s3://')
          )
          or (
            (daybook_quotes_unused_path | string).startswith('/')
            and (daybook_quotes_used_path | string).startswith('/')
            and (daybook_quote_lifecycle_state | string).startswith('/')
          )
        )
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or (daybook_quotes_unused_path | string | regex_search('/[.][.]?/')) is none
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or (daybook_quotes_used_path | string | regex_search('/[.][.]?/')) is none
      - not (daybook_quotes_enabled or daybook_archive_quote_classifier_enabled) or (daybook_quote_lifecycle_state | string | regex_search('/[.][.]?/')) is none
      - not daybook_archive_quote_classifier_enabled or (daybook_archive_browser_executable | string).startswith('/')
      - not daybook_archive_quote_classifier_enabled or (daybook_archive_browser_user_data_dir | string).startswith(daybook_sessions_service_home ~ '/.daybook/')
      - not daybook_archive_quote_classifier_enabled or (daybook_archive_browser_user_data_dir | dirname) == (daybook_sessions_service_home ~ '/.daybook')
      - not daybook_archive_quote_classifier_enabled or (daybook_archive_browser_user_data_dir | regex_replace('/+$', '')) != (daybook_sessions_service_home ~ '/.daybook')
      - not daybook_archive_quote_classifier_enabled or '/..' not in (daybook_archive_browser_user_data_dir ~ '/')
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_headless | type_debug == 'bool'
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_headless or daybook_sessions_launchd_scope == 'user'
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_launch_timeout_seconds | float > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_launch_timeout_seconds | float <= 300
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_navigation_timeout_seconds | float > 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_navigation_timeout_seconds | float <= 300
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_render_wait_seconds | float >= 0
      - not daybook_archive_quote_classifier_enabled or daybook_archive_browser_render_wait_seconds | float <= 60
      - daybook_sessions_brew_packages is sequence
      - daybook_sessions_brew_packages is not string
      - (daybook_sessions_path | string | trim | regex_search('^s3://')) is not none
      - daybook_sessions_aws_endpoint_url_s3 | string | trim | length > 0
      - daybook_sessions_aws_endpoint_url_s3 != "CHANGEME"
      - daybook_sessions_aws_access_key_id | string | trim | length > 0
      - daybook_sessions_aws_access_key_id != "CHANGEME"
      - daybook_sessions_aws_secret_access_key | string | trim | length > 0
      - daybook_sessions_aws_secret_access_key != "CHANGEME"
      - daybook_sessions_aws_region | string | trim | length > 0
      - daybook_sessions_aws_default_region | string | trim | length > 0
      - daybook_sessions_redact_files is sequence
      - daybook_sessions_redact_files is not string
      - daybook_sessions_remove_legacy_runner_paths is sequence
      - daybook_sessions_remove_legacy_runner_paths is not string
    fail_msg: >-
      Daybook sessions deployment is missing required configuration. Supply a
      service user, pinned daybook checkout ref, S3 session path, three distinct
      safe quote lifecycle locations on one local or S3 backend when enabled,
      and least-privilege MinIO credentials from the private control repo.
  when: daybook_sessions_enabled | bool

- name: validate | Validate Archive quote classifier calendar entries
  ansible.builtin.assert:
    that:
      - item is mapping
      - (item.Hour | default('') | string | regex_search('^[0-9]+$')) is not none
      - item.Hour | default(-1) | int >= 0
      - item.Hour | default(-1) | int <= 23
      - (item.Minute | default('') | string | regex_search('^[0-9]+$')) is not none
      - item.Minute | default(-1) | int >= 0
      - item.Minute | default(-1) | int <= 59
    fail_msg: >-
      Each Archive quote classifier calendar entry needs numeric Hour (0-23)
      and Minute (0-59) values.
  loop: "{{ daybook_archive_quote_classifier_start_calendar }}"
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Ensure uv is available
  ansible.builtin.command:
    argv:
      - "{{ daybook_sessions_uv_bin }}"
      - --version
  environment:
    PATH: "{{ daybook_sessions_launchd_path }}"
  changed_when: false
  when: daybook_sessions_enabled | bool

- name: runtime | Check Homebrew at /opt/homebrew/bin/brew
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: daybook_sessions_brew_opt
  when: daybook_sessions_enabled | bool

- name: runtime | Check Homebrew at /usr/local/bin/brew
  ansible.builtin.stat:
    path: /usr/local/bin/brew
  register: daybook_sessions_brew_usr
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_sessions_brew_opt.stat.exists | default(false))

- name: runtime | Resolve Homebrew binary path
  ansible.builtin.set_fact:
    daybook_sessions_brew_bin_resolved: >-
      {{
        (daybook_sessions_brew_bin | length > 0)
        | ternary(
          daybook_sessions_brew_bin,
          (
            (daybook_sessions_brew_opt.stat.exists | default(false))
            | ternary('/opt/homebrew/bin/brew', '/usr/local/bin/brew')
          )
        )
      }}
  when: daybook_sessions_enabled | bool

- name: runtime | Stat resolved Homebrew binary
  ansible.builtin.stat:
    path: "{{ daybook_sessions_brew_bin_resolved }}"
  register: daybook_sessions_brew_bin_stat
  when: daybook_sessions_enabled | bool

- name: runtime | Validate Homebrew binary and owner
  ansible.builtin.assert:
    that:
      - daybook_sessions_brew_bin_resolved | length > 0
      - daybook_sessions_brew_bin_stat.stat.exists | default(false)
      - daybook_sessions_brew_user | length > 0 or ansible_user_id != 'root'
    fail_msg: >-
      Homebrew binary not found, or daybook_sessions_brew_user is missing while
      Ansible is running as root.
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_brew_packages | length > 0

- name: runtime | Update Homebrew formulae
  ansible.builtin.command: "{{ daybook_sessions_brew_bin_resolved }} update"
  register: daybook_sessions_brew_update_result
  changed_when: "'Already up-to-date' not in (daybook_sessions_brew_update_result.stdout | default(''))"
  become: "{{ daybook_sessions_brew_user | length > 0 }}"
  become_user: "{{ daybook_sessions_brew_user | default(omit) }}"
  become_flags: "-i"
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_brew_packages | length > 0
    - daybook_sessions_brew_update | bool

- name: runtime | Check required Homebrew packages
  ansible.builtin.command: "{{ daybook_sessions_brew_bin_resolved }} list --versions {{ item }}"
  register: daybook_sessions_brew_package_checks
  changed_when: false
  failed_when: false
  loop: "{{ daybook_sessions_brew_packages }}"
  become: "{{ daybook_sessions_brew_user | length > 0 }}"
  become_user: "{{ daybook_sessions_brew_user | default(omit) }}"
  become_flags: "-i"
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_brew_packages | length > 0

- name: runtime | Install missing Homebrew packages
  ansible.builtin.command: "{{ daybook_sessions_brew_bin_resolved }} install {{ item.item }}"
  register: daybook_sessions_brew_install
  changed_when: daybook_sessions_brew_install.rc == 0
  loop: "{{ daybook_sessions_brew_package_checks.results | default([]) }}"
  become: "{{ daybook_sessions_brew_user | length > 0 }}"
  become_user: "{{ daybook_sessions_brew_user | default(omit) }}"
  become_flags: "-i"
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_brew_packages | length > 0
    - item.rc != 0

- name: runtime | Ensure Daybook sessions service user exists
  ansible.builtin.command:
    argv:
      - /usr/bin/id
      - -u
      - "{{ daybook_sessions_service_user }}"
  changed_when: false
  when: daybook_sessions_enabled | bool

- name: runtime | Inspect Archive quote classifier filesystem inputs
  ansible.builtin.stat:
    path: "{{ item }}"
    follow: false
  loop:
    - "{{ daybook_archive_browser_executable }}"
    - "{{ daybook_archive_browser_user_data_dir }}"
    - "{{ daybook_archive_browser_user_data_dir }}/.daybook-archive-browser-profile"
    - "{{ daybook_archive_browser_user_data_dir }}/.daybook-archive-browser.lock"
    - "{{ daybook_sessions_service_home }}/.daybook"
  register: daybook_archive_quote_classifier_path_stats
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Resolve Archive quote classifier filesystem inputs
  ansible.builtin.command:
    argv:
      - "{{ ansible_python_interpreter | default('/usr/bin/python3') }}"
      - -c
      - "import os, sys; print(os.path.realpath(sys.argv[1]))"
      - "{{ item }}"
  loop:
    - "{{ daybook_sessions_service_home }}/.daybook"
    - "{{ daybook_archive_browser_user_data_dir }}"
  register: daybook_archive_quote_classifier_realpaths
  changed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Validate Archive quote classifier filesystem inputs
  ansible.builtin.assert:
    that:
      - daybook_archive_quote_classifier_path_stats.results[0].stat.exists | default(false)
      - daybook_archive_quote_classifier_path_stats.results[0].stat.isreg | default(false)
      - not (daybook_archive_quote_classifier_path_stats.results[0].stat.islnk | default(false))
      - not (daybook_archive_quote_classifier_path_stats.results[1].stat.exists | default(false)) or daybook_archive_quote_classifier_path_stats.results[1].stat.isdir | default(false)
      - not (daybook_archive_quote_classifier_path_stats.results[1].stat.exists | default(false)) or not (daybook_archive_quote_classifier_path_stats.results[1].stat.islnk | default(false))
      - not (daybook_archive_quote_classifier_path_stats.results[1].stat.exists | default(false)) or daybook_archive_quote_classifier_path_stats.results[1].stat.pw_name == daybook_sessions_service_user
      - not (daybook_archive_quote_classifier_path_stats.results[2].stat.exists | default(false)) or (daybook_archive_quote_classifier_path_stats.results[2].stat.isreg | default(false) and not (daybook_archive_quote_classifier_path_stats.results[2].stat.islnk | default(false)) and daybook_archive_quote_classifier_path_stats.results[2].stat.pw_name == daybook_sessions_service_user)
      - not (daybook_archive_quote_classifier_path_stats.results[3].stat.exists | default(false)) or (daybook_archive_quote_classifier_path_stats.results[3].stat.isreg | default(false) and not (daybook_archive_quote_classifier_path_stats.results[3].stat.islnk | default(false)) and daybook_archive_quote_classifier_path_stats.results[3].stat.pw_name == daybook_sessions_service_user)
      - not (daybook_archive_quote_classifier_path_stats.results[4].stat.exists | default(false)) or daybook_archive_quote_classifier_path_stats.results[4].stat.isdir | default(false)
      - not (daybook_archive_quote_classifier_path_stats.results[4].stat.exists | default(false)) or not (daybook_archive_quote_classifier_path_stats.results[4].stat.islnk | default(false))
      - not (daybook_archive_quote_classifier_path_stats.results[4].stat.exists | default(false)) or daybook_archive_quote_classifier_path_stats.results[4].stat.pw_name == daybook_sessions_service_user
      - daybook_archive_quote_classifier_realpaths.results[1].stdout.startswith(daybook_archive_quote_classifier_realpaths.results[0].stdout ~ '/')
    fail_msg: >-
      Archive quote automation requires a real browser executable (not a
      symlink) and a real dedicated browser profile below the service user's
      ~/.daybook with safe service-user-owned control files. Quote storage is
      validated separately as safe local paths or exact S3 object URIs.
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Inspect existing dedicated Archive browser profile contents
  ansible.builtin.find:
    paths: "{{ daybook_archive_browser_user_data_dir }}"
    recurse: false
    hidden: true
    file_type: any
    excludes:
      - .daybook-archive-browser-profile
      - .daybook-archive-browser.lock
  register: daybook_archive_browser_profile_contents
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool
    - daybook_archive_quote_classifier_path_stats.results[1].stat.exists | default(false)

- name: runtime | Refuse an existing unmarked browser profile
  ansible.builtin.assert:
    that:
      - daybook_archive_browser_profile_contents.matched | default(0) == 0 or daybook_archive_quote_classifier_path_stats.results[2].stat.isreg | default(false)
    fail_msg: >-
      Refusing to use a non-empty unmarked browser profile. Configure a new
      directory below the service user's ~/.daybook; never use Helium's live
      user-data profile.
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool
    - daybook_archive_quote_classifier_path_stats.results[1].stat.exists | default(false)

- name: runtime | Ensure Daybook state parent for the browser profile exists
  ansible.builtin.file:
    path: "{{ daybook_sessions_service_home }}/.daybook"
    state: directory
    owner: "{{ daybook_sessions_service_user }}"
    group: "{{ daybook_sessions_service_group }}"
    mode: "0750"
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Ensure dedicated Archive browser profile directory exists
  ansible.builtin.file:
    path: "{{ daybook_archive_browser_user_data_dir }}"
    state: directory
    owner: "{{ daybook_sessions_service_user }}"
    group: "{{ daybook_sessions_service_group }}"
    mode: "0700"
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Validate classifier browser filesystem access as the service user
  ansible.builtin.command:
    argv:
      - /bin/test
      - "{{ item.flag }}"
      - "{{ item.path }}"
  loop:
    - flag: -x
      path: "{{ daybook_archive_browser_executable }}"
    - flag: -r
      path: "{{ daybook_archive_browser_user_data_dir }}"
    - flag: -w
      path: "{{ daybook_archive_browser_user_data_dir }}"
    - flag: -x
      path: "{{ daybook_archive_browser_user_data_dir }}"
  changed_when: false
  become: "{{ ansible_user_id != daybook_sessions_service_user }}"
  become_user: "{{ daybook_sessions_service_user }}"
  become_flags: "-i"
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Ensure Daybook sessions directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ daybook_sessions_config_dir }}"
      owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
      group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
      mode: "0755"
    - path: "{{ daybook_sessions_log_dir }}"
      owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
      group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
      mode: "0755"
    - path: "{{ daybook_sessions_launchd_plist_path | dirname }}"
      owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
      group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
      mode: "0755"
    - path: "{{ daybook_sessions_state_path | dirname }}"
      owner: "{{ daybook_sessions_service_user }}"
      group: "{{ daybook_sessions_service_group }}"
      mode: "0750"
    - path: "{{ daybook_sessions_checkout_path | dirname }}"
      owner: "{{ daybook_sessions_service_user }}"
      group: "{{ daybook_sessions_service_group }}"
      mode: "0755"
  when: daybook_sessions_enabled | bool

- name: runtime | Ensure archive quote classifier launchd directory exists
  ansible.builtin.file:
    path: "{{ daybook_archive_quote_classifier_launchd_plist_path | dirname }}"
    state: directory
    owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
    group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
    mode: "0755"
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: runtime | Ensure launchd log files exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: "{{ daybook_sessions_service_user }}"
    group: "{{ daybook_sessions_service_group }}"
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  loop: >-
    {{
      [daybook_sessions_stdout_log, daybook_sessions_stderr_log]
      + (
        [daybook_archive_quote_classifier_stdout_log, daybook_archive_quote_classifier_stderr_log]
        if daybook_archive_quote_classifier_enabled else []
      )
    }}
  when: daybook_sessions_enabled | bool

- name: source | Inspect pre-staged Daybook checkout for no-fetch mode
  ansible.builtin.stat:
    path: "{{ item }}"
    follow: false
  loop:
    - "{{ daybook_sessions_checkout_path }}"
    - "{{ daybook_sessions_checkout_path }}/.git"
  register: daybook_sessions_no_fetch_checkout_stats
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_sessions_repo_update | bool)

- name: source | Validate pre-staged Daybook checkout for no-fetch mode
  ansible.builtin.assert:
    that:
      - daybook_sessions_no_fetch_checkout_stats.results[0].stat.isdir | default(false)
      - not (daybook_sessions_no_fetch_checkout_stats.results[0].stat.islnk | default(false))
      - daybook_sessions_no_fetch_checkout_stats.results[0].stat.pw_name == daybook_sessions_service_user
      - (daybook_sessions_no_fetch_checkout_stats.results[1].stat.isdir | default(false)) or (daybook_sessions_no_fetch_checkout_stats.results[1].stat.isreg | default(false))
      - not (daybook_sessions_no_fetch_checkout_stats.results[1].stat.islnk | default(false))
      - daybook_sessions_no_fetch_checkout_stats.results[1].stat.pw_name == daybook_sessions_service_user
    fail_msg: >-
      No-fetch Daybook deployment requires an existing, service-user-owned Git
      checkout. Stage the pinned commit locally before deploying.
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_sessions_repo_update | bool)

- name: source | Verify pinned Daybook commit exists locally for no-fetch mode
  ansible.builtin.command:
    argv:
      - /usr/bin/git
      - cat-file
      - -e
      - "{{ daybook_sessions_repo_ref }}^{commit}"
    chdir: "{{ daybook_sessions_checkout_path }}"
  become: "{{ ansible_user_id != daybook_sessions_service_user }}"
  become_user: "{{ daybook_sessions_service_user }}"
  become_flags: "-i"
  changed_when: false
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_sessions_repo_update | bool)

- name: source | Inspect no-fetch Daybook checkout state
  ansible.builtin.command:
    argv: >-
      {{
        ['/usr/bin/git', 'rev-parse', 'HEAD']
        if item == 'revision'
        else (
          ['/usr/bin/git', 'status', '--porcelain', '--untracked-files=no']
          if item == 'tracked'
          else ['/usr/bin/git', 'ls-files', '--others', '--exclude-standard']
        )
      }}
    chdir: "{{ daybook_sessions_checkout_path }}"
  loop:
    - revision
    - tracked
    - untracked
  become: "{{ ansible_user_id != daybook_sessions_service_user }}"
  become_user: "{{ daybook_sessions_service_user }}"
  become_flags: "-i"
  register: daybook_sessions_no_fetch_git_state
  changed_when: false
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_sessions_repo_update | bool)

- name: source | Validate no-fetch checkout worktree cleanliness
  ansible.builtin.assert:
    that:
      - daybook_sessions_no_fetch_git_state.results[2].stdout | trim | length == 0
      - daybook_sessions_checkout_force | bool or daybook_sessions_no_fetch_git_state.results[1].stdout | trim | length == 0
    fail_msg: >-
      The pre-staged Daybook checkout has untracked files, or tracked changes
      while checkout_force is false. Remove untracked files and either clean the
      tracked worktree or allow the pinned checkout to reset tracked files.
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_sessions_repo_update | bool)

- name: source | Check out pinned Daybook commit without fetching
  ansible.builtin.command:
    argv: >-
      {{
        ['/usr/bin/git', 'checkout', '--detach']
        + (['--force'] if daybook_sessions_checkout_force | bool else [])
        + [daybook_sessions_repo_ref]
      }}
    chdir: "{{ daybook_sessions_checkout_path }}"
  become: "{{ ansible_user_id != daybook_sessions_service_user }}"
  become_user: "{{ daybook_sessions_service_user }}"
  become_flags: "-i"
  register: daybook_sessions_no_fetch_checkout
  changed_when: true
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_sessions_repo_update | bool)
    - >-
      daybook_sessions_no_fetch_git_state.results[0].stdout | trim | lower != daybook_sessions_repo_ref | lower
      or (daybook_sessions_checkout_force | bool and daybook_sessions_no_fetch_git_state.results[1].stdout | trim | length > 0)

- name: source | Clone or update Daybook checkout
  ansible.builtin.git:
    repo: "{{ daybook_sessions_repo_url }}"
    dest: "{{ daybook_sessions_checkout_path }}"
    version: "{{ daybook_sessions_repo_ref }}"
    force: "{{ daybook_sessions_checkout_force | bool }}"
    update: true
    accept_hostkey: true
  become: "{{ ansible_user_id != daybook_sessions_service_user }}"
  become_user: "{{ daybook_sessions_service_user }}"
  become_flags: "-i"
  register: daybook_sessions_source_checkout
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_repo_update | bool

- name: runtime | Sync Daybook dependencies with uv
  ansible.builtin.command:
    argv: "{{ [daybook_sessions_uv_bin] + daybook_sessions_uv_sync_args }}"
    chdir: "{{ daybook_sessions_checkout_path }}"
  environment:
    PATH: "{{ daybook_sessions_launchd_path }}"
    UV_PROJECT_ENVIRONMENT: "{{ daybook_sessions_checkout_path }}/.venv"
    PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
  become: "{{ ansible_user_id != daybook_sessions_service_user }}"
  become_user: "{{ daybook_sessions_service_user }}"
  become_flags: "-i"
  register: daybook_sessions_uv_sync
  changed_when: >-
    'Installed' in ((daybook_sessions_uv_sync.stdout | default('')) ~ (daybook_sessions_uv_sync.stderr | default('')))
    or 'Prepared' in ((daybook_sessions_uv_sync.stdout | default('')) ~ (daybook_sessions_uv_sync.stderr | default('')))
    or 'Removed' in ((daybook_sessions_uv_sync.stdout | default('')) ~ (daybook_sessions_uv_sync.stderr | default('')))
    or 'Uninstalled' in ((daybook_sessions_uv_sync.stdout | default('')) ~ (daybook_sessions_uv_sync.stderr | default('')))
    or 'Built' in ((daybook_sessions_uv_sync.stdout | default('')) ~ (daybook_sessions_uv_sync.stderr | default('')))
  when: daybook_sessions_enabled | bool

- name: runtime | Probe archive quote classifier command
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      printf '%s\n' {{ daybook_archive_quote_classifier_probe_prompt | quote }} |
      {{ daybook_archive_quote_classifier_cmd }}
    executable: /bin/bash
  environment:
    PATH: "{{ daybook_sessions_launchd_path }}"
    HOME: "{{ daybook_sessions_service_home }}"
    USER: "{{ daybook_sessions_service_user }}"
    LOGNAME: "{{ daybook_sessions_service_user }}"
    XDG_CONFIG_HOME: "{{ daybook_sessions_service_home }}/.config"
    XDG_CACHE_HOME: "{{ daybook_sessions_service_home }}/.cache"
    XDG_DATA_HOME: "{{ daybook_sessions_service_home }}/.local/share"
  become: "{{ ansible_user_id != daybook_sessions_service_user }}"
  become_user: "{{ daybook_sessions_service_user }}"
  become_flags: "-i"
  register: daybook_archive_quote_classifier_probe
  async: "{{ daybook_archive_quote_classifier_probe_timeout_seconds | int }}"
  poll: 1
  changed_when: false
  failed_when: daybook_archive_quote_classifier_probe.rc != 0 or daybook_archive_quote_classifier_probe.stdout | trim != 'OK'
  no_log: true
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool
    - daybook_archive_quote_classifier_probe_enabled | bool

- name: cleanup | Remove legacy by-hand Daybook session runner
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ daybook_sessions_remove_legacy_runner_paths }}"
  when: daybook_sessions_enabled | bool

- name: config | Render Daybook sessions environment file
  ansible.builtin.template:
    src: sessions.env.j2
    dest: "{{ daybook_sessions_env_file }}"
    owner: "{{ daybook_sessions_service_user }}"
    group: "{{ daybook_sessions_service_group }}"
    mode: "0600"
  register: daybook_sessions_env_template
  no_log: true
  when: daybook_sessions_enabled | bool

- name: config | Render archive quote classifier environment file
  ansible.builtin.template:
    src: archive-quotes.env.j2
    dest: "{{ daybook_archive_quote_classifier_env_file }}"
    owner: "{{ daybook_sessions_service_user }}"
    group: "{{ daybook_sessions_service_group }}"
    mode: "0600"
  register: daybook_archive_quote_classifier_env_template
  no_log: true
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: config | Render Daybook sessions launchd launcher
  ansible.builtin.template:
    src: ship-sessions.sh.j2
    dest: "{{ daybook_sessions_launcher_path }}"
    owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
    group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
    mode: "0755"
  register: daybook_sessions_launcher_template
  when: daybook_sessions_enabled | bool

- name: launchd | Render Daybook sessions plist
  ansible.builtin.template:
    src: sessions.launchd.plist.j2
    dest: "{{ daybook_sessions_launchd_plist_path }}"
    owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
    group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
    mode: "0644"
  register: daybook_sessions_launchd_template
  when: daybook_sessions_enabled | bool

- name: config | Render archive quote classifier launchd launcher
  ansible.builtin.template:
    src: classify-archive-quotes.sh.j2
    dest: "{{ daybook_archive_quote_classifier_launcher_path }}"
    owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
    group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
    mode: "0755"
  register: daybook_archive_quote_classifier_launcher_template
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: launchd | Render archive quote classifier plist
  ansible.builtin.template:
    src: archive-quotes.launchd.plist.j2
    dest: "{{ daybook_archive_quote_classifier_launchd_plist_path }}"
    owner: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('root', daybook_sessions_service_user) }}"
    group: "{{ (daybook_sessions_launchd_scope == 'system') | ternary('wheel', daybook_sessions_service_group) }}"
    mode: "0644"
  register: daybook_archive_quote_classifier_launchd_template
  when:
    - daybook_sessions_enabled | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: launchd | Resolve service user uid for user LaunchAgent
  ansible.builtin.command:
    argv:
      - /usr/bin/id
      - -u
      - "{{ daybook_sessions_service_user }}"
  register: daybook_sessions_service_uid
  changed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_sessions_launchd_scope == 'user'

- name: launchd | Resolve Daybook sessions system launchd domain
  ansible.builtin.set_fact:
    daybook_sessions_launchd_domain: system
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_sessions_launchd_scope == 'system'

- name: launchd | Resolve Daybook sessions user launchd domain
  ansible.builtin.set_fact:
    daybook_sessions_launchd_domain: "gui/{{ daybook_sessions_service_uid.stdout }}"
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_sessions_launchd_scope == 'user'

- name: launchd | Check disabled archive quote classifier launchd unit status
  ansible.builtin.command: "launchctl print {{ daybook_sessions_launchd_domain }}/{{ daybook_archive_quote_classifier_launchd_label }}"
  register: daybook_archive_quote_classifier_disabled_launchd_status
  changed_when: false
  failed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - not (daybook_archive_quote_classifier_enabled | bool)

- name: launchd | Unload disabled archive quote classifier unit
  ansible.builtin.command: "launchctl bootout {{ daybook_sessions_launchd_domain }} {{ daybook_archive_quote_classifier_launchd_plist_path }}"
  changed_when: false
  failed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - not (daybook_archive_quote_classifier_enabled | bool)
    - daybook_archive_quote_classifier_disabled_launchd_status.rc == 0

- name: config | Remove disabled archive quote classifier files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ daybook_archive_quote_classifier_launchd_plist_path }}"
    - "{{ daybook_archive_quote_classifier_launcher_path }}"
    - "{{ daybook_archive_quote_classifier_env_file }}"
  when:
    - daybook_sessions_enabled | bool
    - not (daybook_archive_quote_classifier_enabled | bool)

- name: launchd | Check Daybook sessions launchd unit status
  ansible.builtin.command: "launchctl print {{ daybook_sessions_launchd_domain }}/{{ daybook_sessions_launchd_label }}"
  register: daybook_sessions_launchd_status
  changed_when: false
  failed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool

- name: launchd | Unload existing Daybook sessions unit before bootstrap
  ansible.builtin.command: "launchctl bootout {{ daybook_sessions_launchd_domain }} {{ daybook_sessions_launchd_plist_path }}"
  changed_when: false
  failed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_sessions_launchd_template.changed
    - daybook_sessions_launchd_status.rc == 0

- name: launchd | Bootstrap Daybook sessions unit
  ansible.builtin.command: "launchctl bootstrap {{ daybook_sessions_launchd_domain }} {{ daybook_sessions_launchd_plist_path }}"
  register: daybook_sessions_launchd_bootstrap
  changed_when: daybook_sessions_launchd_bootstrap.rc == 0
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_sessions_launchd_template.changed or daybook_sessions_launchd_status.rc != 0

- name: launchd | Enable Daybook sessions unit
  ansible.builtin.command: "launchctl enable {{ daybook_sessions_launchd_domain }}/{{ daybook_sessions_launchd_label }}"
  register: daybook_sessions_launchd_enable
  changed_when: daybook_sessions_launchd_enable.rc == 0
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_sessions_launchd_template.changed or daybook_sessions_launchd_status.rc != 0

- name: launchd | Kickstart Daybook sessions unit after deploy changes
  ansible.builtin.command: "launchctl kickstart -k {{ daybook_sessions_launchd_domain }}/{{ daybook_sessions_launchd_label }}"
  register: daybook_sessions_launchd_kickstart
  changed_when: daybook_sessions_launchd_kickstart.rc == 0
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_sessions_launchd_start_service | bool
    - >-
      daybook_sessions_launchd_template.changed
      or daybook_sessions_env_template.changed
      or daybook_sessions_launcher_template.changed
      or (daybook_sessions_source_checkout.changed | default(false))
      or (daybook_sessions_no_fetch_checkout.changed | default(false))
      or daybook_sessions_uv_sync.changed
      or daybook_sessions_launchd_status.rc != 0

- name: launchd | Check archive quote classifier launchd unit status
  ansible.builtin.command: "launchctl print {{ daybook_sessions_launchd_domain }}/{{ daybook_archive_quote_classifier_launchd_label }}"
  register: daybook_archive_quote_classifier_launchd_status
  changed_when: false
  failed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_archive_quote_classifier_enabled | bool

- name: launchd | Unload existing archive quote classifier unit before bootstrap
  ansible.builtin.command: "launchctl bootout {{ daybook_sessions_launchd_domain }} {{ daybook_archive_quote_classifier_launchd_plist_path }}"
  changed_when: false
  failed_when: false
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_archive_quote_classifier_enabled | bool
    - daybook_archive_quote_classifier_launchd_template.changed
    - daybook_archive_quote_classifier_launchd_status.rc == 0

- name: launchd | Bootstrap archive quote classifier unit
  ansible.builtin.command: "launchctl bootstrap {{ daybook_sessions_launchd_domain }} {{ daybook_archive_quote_classifier_launchd_plist_path }}"
  register: daybook_archive_quote_classifier_launchd_bootstrap
  changed_when: daybook_archive_quote_classifier_launchd_bootstrap.rc == 0
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_archive_quote_classifier_enabled | bool
    - daybook_archive_quote_classifier_launchd_template.changed or daybook_archive_quote_classifier_launchd_status.rc != 0

- name: launchd | Enable archive quote classifier unit
  ansible.builtin.command: "launchctl enable {{ daybook_sessions_launchd_domain }}/{{ daybook_archive_quote_classifier_launchd_label }}"
  register: daybook_archive_quote_classifier_launchd_enable
  changed_when: daybook_archive_quote_classifier_launchd_enable.rc == 0
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_archive_quote_classifier_enabled | bool
    - daybook_archive_quote_classifier_launchd_template.changed or daybook_archive_quote_classifier_launchd_status.rc != 0

- name: launchd | Kickstart archive quote classifier unit after deploy changes
  ansible.builtin.command: "launchctl kickstart -k {{ daybook_sessions_launchd_domain }}/{{ daybook_archive_quote_classifier_launchd_label }}"
  register: daybook_archive_quote_classifier_launchd_kickstart
  changed_when: daybook_archive_quote_classifier_launchd_kickstart.rc == 0
  when:
    - daybook_sessions_enabled | bool
    - daybook_sessions_launchd_manage_state | bool
    - daybook_archive_quote_classifier_enabled | bool
    - daybook_archive_quote_classifier_run_at_load | bool
    - >-
      daybook_archive_quote_classifier_launchd_template.changed
      or daybook_archive_quote_classifier_launcher_template.changed
      or daybook_archive_quote_classifier_env_template.changed
      or daybook_sessions_env_template.changed
      or (daybook_sessions_source_checkout.changed | default(false))
      or (daybook_sessions_no_fetch_checkout.changed | default(false))
      or daybook_sessions_uv_sync.changed
      or daybook_archive_quote_classifier_launchd_status.rc != 0
