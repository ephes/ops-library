---
# Deploy the Daybook agent-session shipper as a periodic macOS launchd job.

daybook_sessions_enabled: true

daybook_sessions_service_user: "CHANGEME"
daybook_sessions_service_group: "staff"
daybook_sessions_service_home: "/Users/{{ daybook_sessions_service_user }}"

daybook_sessions_repo_url: "https://github.com/ephes/daybook.git"
daybook_sessions_repo_ref: "CHANGEME"
daybook_sessions_checkout_path: "{{ daybook_sessions_service_home }}/projects/daybook"
daybook_sessions_checkout_force: true
daybook_sessions_repo_update: true

daybook_sessions_config_dir: "/etc/daybook-sessions"
daybook_sessions_env_file: "{{ daybook_sessions_config_dir }}/sessions.env"
daybook_sessions_launcher_path: "{{ daybook_sessions_config_dir }}/ship-sessions.sh"
daybook_sessions_log_dir: "/var/log/daybook-sessions"
daybook_sessions_stdout_log: "{{ daybook_sessions_log_dir }}/ship.log"
daybook_sessions_stderr_log: "{{ daybook_sessions_log_dir }}/ship.err.log"
daybook_sessions_state_path: "{{ daybook_sessions_service_home }}/.daybook/sessions-shipped.json"

daybook_sessions_uv_install_dir: "/usr/local/bin"
daybook_sessions_uv_bin: "{{ daybook_sessions_uv_install_dir }}/uv"
daybook_sessions_python_version: "3.14"
daybook_sessions_uv_sync_args:
  - sync
  - --frozen
  - --no-dev
  - --python
  - "{{ daybook_sessions_python_version }}"

daybook_sessions_launchd_label: "de.wersdoerfer.daybook.sessions"
daybook_sessions_launchd_scope: "system"
daybook_sessions_launchd_plist_path: "/Library/LaunchDaemons/{{ daybook_sessions_launchd_label }}.plist"
daybook_sessions_launchd_manage_state: true
daybook_sessions_launchd_start_service: true
daybook_sessions_launchd_run_at_load: true
daybook_sessions_schedule_interval_seconds: 1800
daybook_sessions_launchd_path: "/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin"

daybook_archive_quote_classifier_enabled: false
daybook_archive_quote_classifier_launchd_label: "de.wersdoerfer.daybook.archive-quotes"
daybook_archive_quote_classifier_launchd_plist_path: "/Library/LaunchDaemons/{{ daybook_archive_quote_classifier_launchd_label }}.plist"
daybook_archive_quote_classifier_launcher_path: "{{ daybook_sessions_config_dir }}/classify-archive-quotes.sh"
daybook_archive_quote_classifier_env_file: "{{ daybook_sessions_config_dir }}/archive-quotes.env"
daybook_archive_quote_classifier_stdout_log: "{{ daybook_sessions_log_dir }}/archive-quotes.log"
daybook_archive_quote_classifier_stderr_log: "{{ daybook_sessions_log_dir }}/archive-quotes.err.log"
daybook_archive_quote_classifier_run_at_load: false
daybook_archive_quote_classifier_throttle_interval_seconds: 60
daybook_archive_quote_classifier_start_calendar:
  - Hour: 7
    Minute: 20
  - Hour: 19
    Minute: 20
daybook_archive_quote_classifier_since_days: 14
daybook_archive_quote_classifier_limit: 25
daybook_archive_quote_classifier_state: "s3://agent-sessions/archive-quote-classifier.json"
daybook_archive_quote_classifier_cmd: "CHANGEME"
daybook_archive_quote_classifier_probe_enabled: true
daybook_archive_quote_classifier_probe_prompt: "Return exactly OK."
daybook_archive_quote_classifier_probe_timeout_seconds: 120
daybook_archive_url: "CHANGEME"
daybook_archive_token: "CHANGEME"
daybook_quotes_enabled: false
daybook_quotes_unused_path: "CHANGEME"
daybook_quotes_used_path: "CHANGEME"
daybook_archive_browser_executable: "/Applications/Helium.app/Contents/MacOS/Helium"
daybook_archive_browser_user_data_dir: "{{ daybook_sessions_service_home }}/.daybook/archive-quote-browser"
daybook_archive_browser_headless: true
daybook_archive_browser_launch_timeout_seconds: 30
daybook_archive_browser_navigation_timeout_seconds: 30
daybook_archive_browser_render_wait_seconds: 1

daybook_sessions_brew_bin: ""
daybook_sessions_brew_user: ""
daybook_sessions_brew_update: false
daybook_sessions_brew_packages:
  - "trufflehog"

daybook_sessions_path: "s3://agent-sessions"
daybook_sessions_aws_endpoint_url_s3: "CHANGEME"
daybook_sessions_aws_access_key_id: "CHANGEME"
daybook_sessions_aws_secret_access_key: "CHANGEME"
daybook_sessions_aws_region: "us-east-1"
daybook_sessions_aws_default_region: "{{ daybook_sessions_aws_region }}"
daybook_sessions_redact_files: []

daybook_sessions_remove_legacy_runner_paths:
  - "{{ daybook_sessions_service_home }}/daybook-ship.sh"
