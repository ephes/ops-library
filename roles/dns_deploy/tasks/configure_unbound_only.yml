---
# Configure Unbound as standalone DNS server (unbound_only mode)

- name: Remove Pi-hole if present
  include_tasks: remove_pihole.yml
  when: dns_clean_install | default(false)

- name: Stop Pi-hole if running
  systemd:
    name: pihole-FTL
    state: stopped
    enabled: false
  failed_when: false
  ignore_errors: true

- name: Remove legacy DNAT rules from Pi-hole setup
  shell: |
    # Remove IPv4 DNAT rules if they exist
    iptables -t nat -D PREROUTING -s 100.64.0.0/10 -p udp --dport 53 -j DNAT --to-destination 127.0.0.1:5335 2>/dev/null || true
    iptables -t nat -D PREROUTING -s 100.64.0.0/10 -p tcp --dport 53 -j DNAT --to-destination 127.0.0.1:5335 2>/dev/null || true
    # Remove any other port 5335 DNAT rules
    iptables -t nat -D PREROUTING -p udp --dport 53 -j DNAT --to-destination 127.0.0.1:5335 2>/dev/null || true
    iptables -t nat -D PREROUTING -p tcp --dport 53 -j DNAT --to-destination 127.0.0.1:5335 2>/dev/null || true
    # Remove IPv6 rules if they exist
    ip6tables -t nat -D PREROUTING -s fd7a:115c:a1e0::/48 -p udp --dport 53 -j DNAT --to-destination [::1]:5335 2>/dev/null || true
    ip6tables -t nat -D PREROUTING -s fd7a:115c:a1e0::/48 -p tcp --dport 53 -j DNAT --to-destination [::1]:5335 2>/dev/null || true
    # Remove from persistent rules if present
    if [ -f /etc/iptables/rules.v4 ]; then
      sed -i '/5335/d' /etc/iptables/rules.v4
    fi
    if [ -f /etc/iptables/rules.v6 ]; then
      sed -i '/5335/d' /etc/iptables/rules.v6
    fi
  args:
    executable: /bin/bash
  register: dnat_cleanup
  changed_when: false

- name: Install Unbound package
  apt:
    name:
      - unbound
      - unbound-anchor
      - dns-root-data
      - dnsutils
    state: present
    update_cache: yes

- name: Stop systemd-resolved if present
  systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  failed_when: false
  ignore_errors: true

- name: Ensure Unbound directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: unbound
    group: unbound
    mode: '0755'
  loop:
    - "{{ dns_unbound_config_dir }}"
    - "{{ dns_unbound_blocklist_dir }}"

- name: Configure Unbound base settings for full DNS mode
  template:
    src: unbound-base-full.conf.j2
    dest: "{{ dns_unbound_config_dir }}/00-base.conf"
    owner: root
    group: root
    mode: '0644'
  register: unbound_base_config
  notify: restart unbound

- name: Configure Unbound split-DNS views
  template:
    src: unbound-split-dns.conf.j2
    dest: "{{ dns_unbound_config_dir }}/10-split-dns.conf"
    owner: root
    group: root
    mode: '0644'
  register: unbound_split_config
  notify: restart unbound

- name: Validate forward zones variable type
  assert:
    that:
      - dns_forward_zones is defined
      - dns_forward_zones is iterable
      - dns_forward_zones is sequence
      - dns_forward_zones is not string
      - dns_forward_zones is not mapping
    fail_msg: "dns_forward_zones must be a list, got {{ dns_forward_zones | type_debug }}"
    quiet: true

- name: Validate forward zones entries
  assert:
    that:
      - item is mapping
      - item.name is defined and item.name | length > 0
      - item.forward_addrs is defined and item.forward_addrs is sequence and item.forward_addrs | length > 0
    fail_msg: "Forward zone entry must be a dict with 'name' (string) and 'forward_addrs' (non-empty list)"
    quiet: true
  loop: "{{ dns_forward_zones }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when: dns_forward_zones | length > 0

- name: Validate local records variable type
  assert:
    that:
      - dns_local_records is defined
      - dns_local_records is iterable
      - dns_local_records is sequence
      - dns_local_records is not string
      - dns_local_records is not mapping
    fail_msg: "dns_local_records must be a list, got {{ dns_local_records | type_debug }}"
    quiet: true

- name: Validate local record entries
  assert:
    that:
      - item is mapping
      - item.name is defined and item.name | length > 0
      - item.type is defined and item.type | length > 0
      - item.type | upper in ['A', 'AAAA', 'CNAME', 'TXT', 'MX', 'PTR', 'SRV']
      - item.value is defined and item.value | length > 0
      - item.name | lower not in (dns_forward_zones | map(attribute='name') | map('lower') | list)
    fail_msg: >-
      Local record entry must be a dict with 'name', 'type', and 'value';
      supported types are A, AAAA, CNAME, TXT, MX, PTR, SRV; and record names
      must not exactly match a forwarded zone apex.
    quiet: true
  loop: "{{ dns_local_records }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when: dns_local_records | length > 0

- name: Validate local records do not contain duplicate name/type pairs
  vars:
    dns_local_record_keys: >-
      {{
        dns_local_records
        | map(attribute='name')
        | zip(dns_local_records | map(attribute='type') | map('upper'))
        | map('join', '|')
        | list
      }}
  assert:
    that:
      - dns_local_record_keys | length == (dns_local_record_keys | unique | length)
    fail_msg: "dns_local_records must not contain duplicate name/type combinations"
    quiet: true
  when: dns_local_records | length > 0

- name: Configure Unbound forward zones
  template:
    src: unbound-forward-zones.conf.j2
    dest: "{{ dns_unbound_config_dir }}/05-forward-zones.conf"
    owner: root
    group: root
    mode: '0644'
  when: dns_forward_zones | length > 0
  notify: restart unbound

- name: Remove forward zones config when not needed
  file:
    path: "{{ dns_unbound_config_dir }}/05-forward-zones.conf"
    state: absent
  when: dns_forward_zones | length == 0
  notify: restart unbound

- name: Configure Unbound local records
  template:
    src: unbound-local-records.conf.j2
    dest: "{{ dns_unbound_config_dir }}/06-local-records.conf"
    owner: root
    group: root
    mode: '0644'
  when: dns_local_records | length > 0
  notify: restart unbound

- name: Remove local records config when not needed
  file:
    path: "{{ dns_unbound_config_dir }}/06-local-records.conf"
    state: absent
  when: dns_local_records | length == 0
  notify: restart unbound

- name: Create allowlist configuration
  template:
    src: unbound-allowlist.conf.j2
    dest: "{{ dns_unbound_blocklist_dir }}/allowlist.conf"
    owner: unbound
    group: unbound
    mode: '0644'
  notify: restart unbound

- name: Create initial empty blocklist
  copy:
    content: "# Blocklist will be populated by update script\n"
    dest: "{{ dns_unbound_blocklist_dir }}/blocklist.conf"
    owner: unbound
    group: unbound
    mode: '0644'
    force: false
  notify: restart unbound

- name: Deploy blocklist update script
  template:
    src: update-blocklists.sh.j2
    dest: /usr/local/bin/update-blocklists.sh
    owner: root
    group: root
    mode: '0755'

- name: Deploy systemd service for blocklist updates
  template:
    src: unbound-blocklist.service.j2
    dest: /etc/systemd/system/unbound-blocklist.service
    owner: root
    group: root
    mode: '0644'

- name: Deploy systemd timer for blocklist updates
  template:
    src: unbound-blocklist.timer.j2
    dest: /etc/systemd/system/unbound-blocklist.timer
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and start blocklist timer
  systemd:
    name: unbound-blocklist.timer
    state: started
    enabled: yes

- name: Run initial blocklist update
  systemd:
    name: unbound-blocklist.service
    state: started
  register: blocklist_update
  failed_when: false  # Don't fail if blocklists are temporarily unavailable

- name: Check if Unbound service exists
  shell: systemctl list-units --all --type=service | grep -q unbound.service
  register: unbound_service_exists
  changed_when: false
  failed_when: false

- name: Start Unbound for first time if not running
  systemd:
    name: unbound
    state: started
    enabled: yes
  when: unbound_service_exists.rc != 0 or (unbound_base_config.changed or unbound_split_config.changed)

- name: Restart Unbound if already running and config changed
  systemd:
    name: unbound
    state: restarted
  when:
    - unbound_service_exists.rc == 0
    - unbound_base_config.changed or unbound_split_config.changed

- name: Ensure Unbound is running and enabled
  systemd:
    name: unbound
    state: started
    enabled: yes

- name: Manage /etc/resolv.conf for local DNS
  when: dns_update_resolv_conf | bool
  block:
    - name: Gather existing resolv.conf state
      stat:
        path: /etc/resolv.conf
      register: dns_resolv_conf

    - name: Remove stale resolv.conf symlink
      file:
        path: /etc/resolv.conf
        state: absent
      when: dns_resolv_conf.stat.islnk | default(false)

    - name: Deploy resolver configuration pointing to Unbound
      template:
        src: resolv.conf.j2
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: '0644'

- name: Wait for Unbound to be ready
  wait_for:
    port: 53
    host: 127.0.0.1
    delay: 2
    timeout: 30
