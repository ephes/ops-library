---
# Setup Python environment for Nyxmon

- name: python | Ensure uv binary is installed
  ansible.builtin.import_role:
    name: uv_install
  when: nyxmon_use_uv

- name: python | Ensure Python and pip are installed
  package:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
  when: not nyxmon_use_uv

- name: python | Ensure pyproject.toml exists when using source copy
  stat:
    path: "{{ nyxmon_site_path }}/pyproject.toml"
  register: nyxmon_pyproject
  when:
    - nyxmon_use_uv
    - nyxmon_use_source_pyproject

- name: python | Fail if pyproject.toml is missing
  fail:
    msg: "pyproject.toml was not found at {{ nyxmon_site_path }}. Set nyxmon_use_source_pyproject=false or ensure the file is synced."
  when:
    - nyxmon_use_uv
    - nyxmon_use_source_pyproject
    - not nyxmon_pyproject.stat.exists

- name: python | Ensure pyproject.toml ownership and mode
  file:
    path: "{{ nyxmon_site_path }}/pyproject.toml"
    owner: "{{ nyxmon_user }}"
    group: "{{ nyxmon_group }}"
    mode: '0644'
  when:
    - nyxmon_use_uv
    - nyxmon_use_source_pyproject

- name: python | Create pyproject.toml for site from template
  template:
    src: pyproject.toml.j2
    dest: "{{ nyxmon_site_path }}/pyproject.toml"
    owner: "{{ nyxmon_user }}"
    group: "{{ nyxmon_group }}"
    mode: '0644'
  when:
    - nyxmon_use_uv
    - not nyxmon_use_source_pyproject

- name: python | Remove stale uv.lock before syncing
  file:
    path: "{{ nyxmon_site_path }}/uv.lock"
    state: absent
  when: nyxmon_use_uv

- name: python | Build uv sync command arguments
  set_fact:
    nyxmon_uv_sync_cmd: >-
      uv sync --no-default-groups --no-dev{{ '' if nyxmon_use_source_pyproject else ' --upgrade-package nyxmon' }}
  when: nyxmon_use_uv

- name: python | Test if venv Python is usable
  command: "{{ nyxmon_venv_path }}/bin/python --version"
  register: venv_python_test
  become: true
  become_user: "{{ nyxmon_user }}"
  failed_when: false
  changed_when: false
  when: nyxmon_use_uv

- name: python | Extract current venv Python version
  set_fact:
    venv_python_current: "{{ venv_python_test.stdout | regex_replace('^Python (\\d+\\.\\d+).*$', '\\1') }}"
  when:
    - nyxmon_use_uv
    - venv_python_test.rc == 0

- name: python | Remove broken venv if Python is not usable
  file:
    path: "{{ nyxmon_venv_path }}"
    state: absent
  when:
    - nyxmon_use_uv
    - venv_python_test.rc != 0

- name: python | Remove venv if Python version doesn't match
  file:
    path: "{{ nyxmon_venv_path }}"
    state: absent
  when:
    - nyxmon_use_uv
    - venv_python_test.rc == 0
    - venv_python_current is defined
    - venv_python_current != nyxmon_python_version

- name: python | Create virtual environment using uv
  command: uv venv --python {{ nyxmon_python_version }} {{ nyxmon_venv_path }}
  args:
    creates: "{{ nyxmon_venv_path }}/bin/python"
  become: true
  become_user: "{{ nyxmon_user }}"
  when: nyxmon_use_uv

- name: python | Check if venv symlink exists
  stat:
    path: "{{ nyxmon_site_path }}/venv"
  register: venv_link
  when: nyxmon_use_uv

- name: python | Create venv symlink to .venv
  file:
    src: "{{ nyxmon_venv_path }}"
    dest: "{{ nyxmon_site_path }}/venv"
    state: link
    owner: "{{ nyxmon_user }}"
    group: "{{ nyxmon_group }}"
    force: true  # Replace if exists with wrong owner
  when: nyxmon_use_uv

- name: python | Create virtual environment using venv
  command: python3 -m venv {{ nyxmon_venv_path }}
  args:
    creates: "{{ nyxmon_venv_path }}/bin/python"
  become: true
  become_user: "{{ nyxmon_user }}"
  when: not nyxmon_use_uv

- name: python | Install dependencies using uv
  command: "{{ nyxmon_uv_sync_cmd }}"
  args:
    chdir: "{{ nyxmon_django_path }}"
  environment:
    VIRTUAL_ENV: "{{ nyxmon_venv_path }}"
  become: true
  become_user: "{{ nyxmon_user }}"
  when: nyxmon_use_uv
  register: uv_sync

- name: python | Install dependencies using pip
  pip:
    requirements: "{{ nyxmon_django_path }}/requirements.txt"
    virtualenv: "{{ nyxmon_venv_path }}"
    state: present
  become: true
  become_user: "{{ nyxmon_user }}"
  when: not nyxmon_use_uv
