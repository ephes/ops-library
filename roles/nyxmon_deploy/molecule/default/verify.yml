---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  vars:
    nyxmon_site_path: /home/nyxmon/site
    nyxmon_env_path: "{{ nyxmon_site_path }}/.env"
    nyxmon_service_unit: /etc/systemd/system/nyxmon.service
    nyxmon_monitoring_service_name: nyxmon-monitor
    nyxmon_monitoring_service_unit: "/etc/systemd/system/{{ nyxmon_monitoring_service_name }}.service"
    nyxmon_traefik_config: /etc/traefik/dynamic/nyxmon.yml
    nyxmon_venv_python: "{{ nyxmon_site_path }}/.venv/bin/python"
    nyxmon_opsgate_submit_base_url: "http://opsgate-api.internal:8711"
    nyxmon_opsgate_approval_base_url: "https://opsgate.example.test"

  tasks:
    - name: Verify | Site directory exists
      ansible.builtin.stat:
        path: "{{ nyxmon_site_path }}"
      register: nyxmon_site

    - name: Verify | Assert site directory present
      ansible.builtin.assert:
        that:
          - nyxmon_site.stat.exists
          - nyxmon_site.stat.isdir
        fail_msg: "Nyxmon site directory missing at {{ nyxmon_site_path }}"

    - name: Verify | .env exists
      ansible.builtin.stat:
        path: "{{ nyxmon_env_path }}"
      register: nyxmon_env

    - name: Verify | Assert .env present
      ansible.builtin.assert:
        that:
          - nyxmon_env.stat.exists
        fail_msg: "Nyxmon .env missing at {{ nyxmon_env_path }}"

    - name: Verify | Service unit exists
      ansible.builtin.stat:
        path: "{{ nyxmon_service_unit }}"
      register: nyxmon_unit

    - name: Verify | Assert service unit exists
      ansible.builtin.assert:
        that:
          - nyxmon_unit.stat.exists
        fail_msg: "nyxmon.service not found at {{ nyxmon_service_unit }}"

    - name: Verify | Traefik config exists
      ansible.builtin.stat:
        path: "{{ nyxmon_traefik_config }}"
      register: nyxmon_traefik

    - name: Verify | Assert Traefik config exists
      ansible.builtin.assert:
        that:
          - nyxmon_traefik.stat.exists
        fail_msg: "Nyxmon Traefik config missing at {{ nyxmon_traefik_config }}"

    - name: Verify | Monitoring service unit exists
      ansible.builtin.stat:
        path: "{{ nyxmon_monitoring_service_unit }}"
      register: nyxmon_monitor_unit

    - name: Verify | Assert monitoring service unit exists
      ansible.builtin.assert:
        that:
          - nyxmon_monitor_unit.stat.exists
        fail_msg: "Nyxmon monitoring unit missing at {{ nyxmon_monitoring_service_unit }}"

    - name: Verify | Read Nyxmon env file
      ansible.builtin.slurp:
        src: "{{ nyxmon_env_path }}"
      register: nyxmon_env_content

    - name: Verify | Assert OpsGate env wiring rendered
      ansible.builtin.assert:
        that:
          - nyxmon_env_text is regex('(?m)^OPSGATE_SUBMIT_BASE_URL=' ~ (nyxmon_opsgate_submit_base_url | regex_escape) ~ '$')
          - nyxmon_env_text is regex('(?m)^OPSGATE_APPROVAL_BASE_URL=' ~ (nyxmon_opsgate_approval_base_url | regex_escape) ~ '$')
        fail_msg: "Nyxmon .env is missing the expected OpsGate URLs"
      vars:
        nyxmon_env_text: "{{ nyxmon_env_content.content | b64decode }}"

    - name: Verify | Check monitoring service active
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - "{{ nyxmon_monitoring_service_name }}"
      changed_when: false
      register: nyxmon_monitor_service_state

    - name: Verify | Assert monitoring service is active
      ansible.builtin.assert:
        that:
          - nyxmon_monitor_service_state.stdout | trim == "active"
        fail_msg: "{{ nyxmon_monitoring_service_name }}.service is not active in Molecule verify"

    - name: Verify | Virtualenv python exists
      ansible.builtin.stat:
        path: "{{ nyxmon_venv_python }}"
      register: nyxmon_venv

    - name: Verify | Assert venv python present
      ansible.builtin.assert:
        that:
          - nyxmon_venv.stat.exists
        fail_msg: "Nyxmon venv python missing at {{ nyxmon_venv_python }}"
