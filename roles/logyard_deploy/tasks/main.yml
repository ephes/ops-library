---
- name: main | Skip role when disabled
  ansible.builtin.meta: end_host
  when: not logyard_enabled | bool

- name: main | Validate required variables
  ansible.builtin.assert:
    that:
      - logyard_deploy_method in ["rsync", "git"]
      - logyard_loki_image | length > 0
      - logyard_loki_container_name | length > 0
      - logyard_docker_network_name | length > 0
      - logyard_retention_period | length > 0
      - logyard_health_selector | length > 0
      - not logyard_grafana_enabled | bool or logyard_grafana_container_name | length > 0
      - not logyard_grafana_enabled | bool or logyard_grafana_datasource_path | length > 0
      - not logyard_grafana_enabled | bool or logyard_grafana_dashboards_root | length > 0
    fail_msg: >-
      Invalid logyard_deploy configuration. Ensure deploy method, Loki image/container/network,
      retention period, and Grafana paths are set.

- name: main | Validate rsync-specific requirements
  ansible.builtin.assert:
    that:
      - logyard_source_path is defined
      - logyard_source_path | length > 0
    fail_msg: "logyard_source_path must be set when logyard_deploy_method=rsync"
  when: logyard_deploy_method == "rsync"

- name: main | Ensure Docker Engine + Compose are available
  ansible.builtin.import_role:
    name: local.ops_library.docker_install

- name: main | Ensure logyard user and directories
  ansible.builtin.import_tasks: user.yml

- name: main | Sync service assets
  ansible.builtin.include_tasks: "source_{{ logyard_deploy_method }}.yml"

- name: main | Render Loki config and compose files
  ansible.builtin.import_tasks: runtime.yml

- name: main | Wire Grafana datasource and dashboard assets
  ansible.builtin.import_tasks: grafana.yml
  when: logyard_grafana_enabled | bool

- name: main | Deploy Logyard health endpoint
  ansible.builtin.import_tasks: health_endpoint.yml
  when: logyard_health_enabled | bool

- name: main | Apply handlers before verification
  ansible.builtin.meta: flush_handlers

- name: main | Run Logyard health checks
  ansible.builtin.import_tasks: verify.yml
  when: logyard_healthcheck_enabled | bool
