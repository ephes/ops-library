---
- name: user | Ensure logyard group exists
  ansible.builtin.group:
    name: "{{ logyard_group }}"
    state: present

- name: user | Ensure logyard user exists
  ansible.builtin.user:
    name: "{{ logyard_user }}"
    group: "{{ logyard_group }}"
    home: "{{ logyard_home }}"
    create_home: false
    shell: /usr/sbin/nologin
    system: true
    state: present

- name: user | Ensure Logyard directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(logyard_user) }}"
    group: "{{ item.group | default(logyard_group) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ logyard_home }}" }
    - { path: "{{ logyard_site_path }}" }
    - { path: "{{ logyard_env_dir }}", owner: root, group: root, mode: "0755" }

- name: user | Ensure Loki data directory ownership matches container user
  ansible.builtin.file:
    path: "{{ logyard_loki_data_dir }}"
    state: directory
    owner: "{{ logyard_loki_data_owner }}"
    group: "{{ logyard_loki_data_group }}"
    mode: "0755"
    recurse: true
