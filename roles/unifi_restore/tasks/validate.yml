- name: Ensure required packages are installed
  ansible.builtin.package:
    name: "{{ unifi_restore_required_packages }}"
    state: present

- name: Detect installed UniFi version
  ansible.builtin.command: dpkg-query -W -f='${Version}' unifi
  register: unifi_restore_installed_version_cmd
  changed_when: false
  failed_when: false

- name: Resolve UniFi restore artifact and snapshot
  ansible.builtin.include_role:
    name: local.ops_library.restore_pilot_internal
    tasks_from: host_local_validate
  vars:
    restore_pilot_internal_role_label: UniFi
    restore_pilot_internal_archive: "{{ unifi_restore_archive }}"
    restore_pilot_internal_archive_search_root: "{{ unifi_restore_archive_search_root }}"
    restore_pilot_internal_stage_dir: "{{ unifi_restore_staging_dir }}"
    restore_pilot_internal_stage_reset: true
    restore_pilot_internal_stage_mode: "0700"
    restore_pilot_internal_validate_checksums: "{{ unifi_restore_validate_checksums | bool }}"
    restore_pilot_internal_resolved_artifact_path_var: unifi_restore_archive_path
    restore_pilot_internal_resolved_is_archive_var: unifi_restore_resolved_is_archive
    restore_pilot_internal_snapshot_dir_var: unifi_restore_extracted_dir
    restore_pilot_internal_extracted_archive_var: unifi_restore_extracted_archive
    restore_pilot_internal_metadata_var: unifi_restore_metadata

- name: Evaluate version compatibility
  ansible.builtin.set_fact:
    unifi_restore_backup_version: "{{ unifi_restore_metadata.get('unifi_version', 'unknown') }}"
    unifi_restore_installed_version: "{{ unifi_restore_installed_version_cmd.stdout | default('unknown') | trim }}"
    unifi_restore_backup_major: "{{ (unifi_restore_metadata.get('unifi_version', '')) | regex_search('^([0-9]+)') | default('') }}"
    unifi_restore_installed_major: "{{ (unifi_restore_installed_version_cmd.stdout | default('') | trim) | regex_search('^([0-9]+)') | default('') }}"

- name: Assert UniFi major versions are compatible
  ansible.builtin.assert:
    that:
      - unifi_restore_backup_major == '' or unifi_restore_installed_major == '' or unifi_restore_backup_major == unifi_restore_installed_major
    fail_msg: >-
      Backup version {{ unifi_restore_backup_version }} (major {{ unifi_restore_backup_major }})
      does not match installed version {{ unifi_restore_installed_version }} (major {{ unifi_restore_installed_major }}).
      Install a compatible UniFi release before restoring.
  when: unifi_restore_check_version_compatibility | bool
