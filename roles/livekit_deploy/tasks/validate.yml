---
- name: validate | LiveKit API credentials are set
  ansible.builtin.assert:
    that:
      - livekit_api_key | length > 0
      - livekit_api_key != 'CHANGEME'
      - livekit_api_secret | length > 0
      - livekit_api_secret != 'CHANGEME'
    fail_msg: >-
      livekit_api_key and livekit_api_secret are required.
      Set them in the playbook or via SOPS secrets.

- name: validate | LiveKit node IP is set
  ansible.builtin.assert:
    that:
      - livekit_node_ip | length > 0
      - livekit_node_ip is regex('^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$')
    fail_msg: >-
      livekit_node_ip is required (e.g. "192.168.178.94").
      Set it to the host LAN IP so WebRTC ICE candidates are reachable by clients.

- name: validate | S3 credentials are set
  ansible.builtin.assert:
    that:
      - livekit_s3_access_key | length > 0
      - livekit_s3_access_key != 'CHANGEME'
      - livekit_s3_secret_key | length > 0
      - livekit_s3_secret_key != 'CHANGEME'
    fail_msg: >-
      livekit_s3_access_key and livekit_s3_secret_key are required for egress S3 storage.
      Set them in the playbook or via SOPS secrets.

- name: validate | Traefik host is set when Traefik is enabled
  ansible.builtin.assert:
    that:
      - livekit_traefik_host | length > 0
      - livekit_traefik_config_path | length > 0
    fail_msg: >-
      livekit_traefik_host and livekit_traefik_config_path are required when
      livekit_traefik_enabled is true.
  when: livekit_traefik_enabled | bool
