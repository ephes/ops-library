---
- name: validate | Ensure target host is macOS
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Darwin'
    fail_msg: "voxhelm_deploy only supports macOS targets."

- name: validate | Ensure required variables are configured
  ansible.builtin.assert:
    that:
      - voxhelm_source_path | trim | length > 0
      - voxhelm_django_secret_key | trim | length > 0
      - voxhelm_django_secret_key != "CHANGEME"
      - voxhelm_bearer_tokens_env | trim | length > 0
      - "'CHANGEME' not in voxhelm_bearer_tokens_env"
      - voxhelm_bootstrap_operator_username | trim | length > 0
      - voxhelm_bootstrap_operator_username != "CHANGEME"
      - voxhelm_bootstrap_operator_password | trim | length > 0
      - voxhelm_bootstrap_operator_password != "CHANGEME"
      - voxhelm_app_port | int > 0
      - voxhelm_uv_bin | trim | length > 0
      - voxhelm_tts_backend | trim | length > 0
      - voxhelm_piper_voices | length > 0
      - voxhelm_piper_default_voice | trim | length > 0
    fail_msg: >-
      Voxhelm deployment is missing required configuration. Check source path,
      Django secret key, bearer token config, bootstrap operator credentials,
      port, uv binary path, and Piper voice config.

- name: validate | Normalize transcription execution mode
  ansible.builtin.set_fact:
    voxhelm_transcription_execution_mode_normalized: "{{ voxhelm_transcription_execution_mode | string | trim | lower }}"

- name: validate | Ensure transcription execution mode is supported
  ansible.builtin.assert:
    that:
      - voxhelm_transcription_execution_mode_normalized in ["django_tasks", "remote_pull"]
      - voxhelm_remote_worker_lease_seconds | int > 0
      - voxhelm_remote_worker_poll_seconds | int > 0
      - voxhelm_remote_worker_max_attempts | int > 0
    fail_msg: >-
      Voxhelm transcription execution mode must be django_tasks or remote_pull,
      and remote worker lease/poll/max-attempt settings must be positive.

- name: validate | Ensure remote-pull transcription is claimable and cross-host safe
  ansible.builtin.assert:
    that:
      - voxhelm_worker_tokens_env | string | trim | length > 0
      - "'CHANGEME' not in voxhelm_worker_tokens_env"
      - voxhelm_artifact_backend | string | trim | lower == "s3"
      - voxhelm_artifact_bucket | string | trim | length > 0
      - voxhelm_artifact_s3_endpoint_url | string | trim | length > 0
      - voxhelm_artifact_s3_access_key_id | string | trim | length > 0
      - voxhelm_artifact_s3_secret_access_key | string | trim | length > 0
    fail_msg: >-
      Voxhelm remote_pull mode requires at least one worker token and complete
      shared S3 artifact configuration.
  when: voxhelm_transcription_execution_mode_normalized == "remote_pull"

- name: validate | Normalize diarization backend
  ansible.builtin.set_fact:
    voxhelm_diarization_backend_normalized: "{{ voxhelm_diarization_backend | string | trim | lower }}"

- name: validate | Ensure diarization backend is supported
  ansible.builtin.assert:
    that:
      - voxhelm_diarization_backend_normalized in ["none", "pyannote"]
    fail_msg: >-
      Unsupported Voxhelm diarization backend '{{ voxhelm_diarization_backend }}'.
      Supported values: none, pyannote.

- name: validate | Ensure pyannote diarization secrets are configured
  ansible.builtin.assert:
    that:
      - voxhelm_pyannote_model | string | trim | length > 0
      - voxhelm_huggingface_token | string | trim | length > 0
      - voxhelm_huggingface_token != "CHANGEME"
    fail_msg: >-
      Voxhelm pyannote diarization is enabled, but the pyannote model or
      Hugging Face token is missing. Set voxhelm_pyannote_model and pass
      voxhelm_huggingface_token from encrypted ops secrets.
  when: voxhelm_diarization_backend_normalized == "pyannote"
