---
- name: config | Render Voxhelm environment file
  ansible.builtin.template:
    src: voxhelm.env.j2
    dest: "{{ voxhelm_config_dir }}/voxhelm.env"
    owner: root
    group: wheel
    mode: "0640"
  register: voxhelm_env_template
  no_log: true

- name: config | Render Voxhelm launcher script
  ansible.builtin.template:
    src: start.sh.j2
    dest: "{{ voxhelm_start_script_path }}"
    owner: root
    group: wheel
    mode: "0755"
  register: voxhelm_start_script_template

- name: config | Render Voxhelm worker script
  ansible.builtin.template:
    src: worker.sh.j2
    dest: "{{ voxhelm_worker_script_path }}"
    owner: root
    group: wheel
    mode: "0755"
  register: voxhelm_worker_script_template
  when: voxhelm_worker_enabled | bool

- name: config | Render Voxhelm Wyoming STT script
  ansible.builtin.template:
    src: wyoming-stt.sh.j2
    dest: "{{ voxhelm_wyoming_stt_script_path }}"
    owner: root
    group: wheel
    mode: "0755"
  register: voxhelm_wyoming_stt_script_template
  when: voxhelm_wyoming_stt_enabled | bool

- name: config | Render Voxhelm WhisperKit script
  ansible.builtin.template:
    src: whisperkit.sh.j2
    dest: "{{ voxhelm_whisperkit_script_path }}"
    owner: root
    group: wheel
    mode: "0755"
  register: voxhelm_whisperkit_script_template
  when: voxhelm_whisperkit_enabled | bool
