---
- name: uv_sync_args | Resolve uv extras for Voxhelm
  ansible.builtin.set_fact:
    voxhelm_uv_extras_resolved: >-
      {{
        (
          voxhelm_uv_extras
          + (
            ['diarization']
            if (voxhelm_diarization_backend | string | trim | lower) == 'pyannote'
            else []
          )
        ) | unique | list
      }}

- name: uv_sync_args | Initialize uv extra arguments for Voxhelm
  ansible.builtin.set_fact:
    voxhelm_uv_extra_args_resolved: []

- name: uv_sync_args | Resolve uv extra arguments for Voxhelm
  ansible.builtin.set_fact:
    voxhelm_uv_extra_args_resolved: >-
      {{ voxhelm_uv_extra_args_resolved + ['--extra', item] }}
  loop: "{{ voxhelm_uv_extras_resolved }}"

- name: uv_sync_args | Resolve uv sync arguments for Voxhelm
  ansible.builtin.set_fact:
    voxhelm_uv_sync_args: >-
      {{
        ['sync', '--frozen', '--no-dev']
        + (voxhelm_uv_extra_args_resolved | default([]))
      }}
