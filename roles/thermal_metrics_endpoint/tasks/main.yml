---
- name: Skip thermal_metrics_endpoint when disabled
  ansible.builtin.debug:
    msg: "thermal_metrics_endpoint role skipped (thermal_metrics_endpoint_enabled=false)."
  when: not thermal_metrics_endpoint_enabled | bool

- name: Deploy thermal metrics endpoint
  when: thermal_metrics_endpoint_enabled | bool
  block:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - thermal_metrics_endpoint_auth_user is defined
          - thermal_metrics_endpoint_auth_user != "CHANGE_ME"
          - thermal_metrics_endpoint_auth_user | length > 0
          - thermal_metrics_endpoint_auth_password is defined
          - thermal_metrics_endpoint_auth_password != "CHANGE_ME"
          - thermal_metrics_endpoint_auth_password | length > 0
        fail_msg: >-
          thermal_metrics_endpoint auth values are missing or still set to CHANGE_ME.
          Set thermal_metrics_endpoint_auth_user/password via ops-control vault before enabling.

    - name: Validate exporter script exists
      ansible.builtin.stat:
        path: "{{ thermal_metrics_endpoint_exporter_path }}"
      register: _thermal_exporter_stat

    - name: Fail if exporter script not found
      ansible.builtin.fail:
        msg: >-
          Thermal metrics exporter script not found at {{ thermal_metrics_endpoint_exporter_path }}.
          Ensure the thermal_metrics_exporter role has been deployed first.
      when: not _thermal_exporter_stat.stat.exists

    - name: Install dependencies for thermal metrics endpoint
      ansible.builtin.package:
        name: "{{ thermal_metrics_endpoint_packages }}"
        state: present

    - name: Create metrics system group
      ansible.builtin.group:
        name: "{{ thermal_metrics_endpoint_group }}"
        system: true
        state: present

    - name: Create metrics system user
      ansible.builtin.user:
        name: "{{ thermal_metrics_endpoint_user }}"
        group: "{{ thermal_metrics_endpoint_group }}"
        shell: /usr/sbin/nologin
        create_home: false
        system: true
        state: present

    - name: Ensure data directory exists
      ansible.builtin.file:
        path: "{{ thermal_metrics_endpoint_data_dir }}"
        state: directory
        owner: root
        group: "{{ thermal_metrics_endpoint_group }}"
        mode: "0750"

    - name: Ensure htpasswd directory exists
      ansible.builtin.file:
        path: "{{ thermal_metrics_endpoint_htpasswd_dir }}"
        state: directory
        owner: root
        group: "{{ thermal_metrics_endpoint_group }}"
        mode: "0750"

    - name: Deploy HTTP server script
      ansible.builtin.template:
        src: thermal_metrics_httpd.py.j2
        dest: "{{ thermal_metrics_endpoint_server_path }}"
        owner: root
        group: root
        mode: "0755"
      notify: restart thermal-metrics-endpoint

    - name: Verify existing htpasswd credentials
      ansible.builtin.command: >-
        htpasswd -viB {{ thermal_metrics_endpoint_htpasswd_path }} {{ thermal_metrics_endpoint_auth_user }}
      args:
        stdin: "{{ thermal_metrics_endpoint_auth_password }}"
      register: _thermal_htpasswd_verify
      changed_when: false
      failed_when: false
      no_log: true

    - name: Generate htpasswd entry
      ansible.builtin.command: "htpasswd -niB {{ thermal_metrics_endpoint_auth_user }}"
      args:
        stdin: "{{ thermal_metrics_endpoint_auth_password }}"
      register: _thermal_htpasswd_entry
      changed_when: false
      when: _thermal_htpasswd_verify.rc != 0
      no_log: true

    - name: Write htpasswd file
      ansible.builtin.copy:
        dest: "{{ thermal_metrics_endpoint_htpasswd_path }}"
        content: "{{ _thermal_htpasswd_entry.stdout }}\n"
        owner: root
        group: "{{ thermal_metrics_endpoint_group }}"
        mode: "0640"
      notify: restart thermal-metrics-endpoint
      when: _thermal_htpasswd_verify.rc != 0
      no_log: true

    - name: Create collector service unit
      ansible.builtin.template:
        src: thermal-metrics-collector.service.j2
        dest: "/etc/systemd/system/{{ thermal_metrics_endpoint_timer_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd

    - name: Create collector timer unit
      ansible.builtin.template:
        src: thermal-metrics-collector.timer.j2
        dest: "/etc/systemd/system/{{ thermal_metrics_endpoint_timer_name }}.timer"
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - restart thermal-metrics-collector-timer

    - name: Create HTTP server service unit
      ansible.builtin.template:
        src: thermal-metrics-endpoint.service.j2
        dest: "/etc/systemd/system/{{ thermal_metrics_endpoint_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - restart thermal-metrics-endpoint

    - name: Flush handlers to ensure units are registered
      ansible.builtin.meta: flush_handlers

    - name: Run collector once to create initial metrics file
      ansible.builtin.systemd:
        name: "{{ thermal_metrics_endpoint_timer_name }}.service"
        state: started
      changed_when: false

    - name: Ensure collector timer is enabled and started
      ansible.builtin.systemd:
        name: "{{ thermal_metrics_endpoint_timer_name }}.timer"
        enabled: true
        state: started
        daemon_reload: true

    - name: Ensure HTTP server is enabled and running
      ansible.builtin.systemd:
        name: "{{ thermal_metrics_endpoint_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
